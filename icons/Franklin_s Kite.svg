<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" stroke="#1a1a2e" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- kite diamond shape -->
  <path d="M40 10 L62 36 L40 56 L18 36 Z" stroke-width="1.8" fill="#e8e4dc"/>
  <!-- kite cross struts -->
  <line x1="40" y1="10" x2="40" y2="56" stroke-width="1.2"/>
  <line x1="18" y1="36" x2="62" y2="36" stroke-width="1.2"/>
  <!-- tail ribbon -->
  <path d="M40 56 Q44 62 40 68 Q36 74 40 78" stroke-width="1.4"/>
  <!-- string going down -->
  <path d="M40 56 Q46 62 44 72" stroke-width="1.3" stroke-dasharray="2,2"/>
  <!-- key on string -->
  <circle cx="44" cy="72" r="3" stroke-width="1.4" fill="#e8e4dc"/>
  <rect x="43" y="72" width="2" height="5" rx="0" stroke-width="1.1" fill="#e8e4dc"/>
  <!-- cloud forming around kite -->
  <path d="M56 22 Q60 16 66 20 Q70 20 70 26 Q70 32 64 32 Q60 32 58 28" stroke-width="1.3" stroke-dasharray="2,2"/>
  <!-- lightning from cloud -->
  <path d="M66 32 L62 40 L66 40 L60 50" stroke-width="1.4"/>
</svg>