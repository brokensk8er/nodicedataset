<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" stroke="#1a1a2e" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- flower pot -->
  <path d="M22 52 L26 74 L54 74 L58 52 Z" stroke-width="1.8" fill="#e8e4dc"/>
  <!-- pot rim -->
  <ellipse cx="40" cy="52" rx="18" ry="5" stroke-width="1.6" fill="#e8e4dc"/>
  <!-- dirt -->
  <ellipse cx="40" cy="52" rx="14" ry="3" stroke-width="1.1" fill="#e8e4dc"/>
  <!-- growing plant with fruits -->
  <line x1="40" y1="52" x2="40" y2="32" stroke-width="1.6"/>
  <line x1="40" y1="40" x2="30" y2="30" stroke-width="1.4"/>
  <line x1="40" y1="36" x2="50" y2="26" stroke-width="1.4"/>
  <!-- leaves -->
  <path d="M34 34 Q28 28 32 24 Q36 28 34 34" stroke-width="1.2" fill="#e8e4dc"/>
  <path d="M46 30 Q52 24 48 20 Q44 24 46 30" stroke-width="1.2" fill="#e8e4dc"/>
  <!-- fruits (copies of original object — shown as small identical cubes) -->
  <rect x="36" y="26" width="8" height="7" rx="1" stroke-width="1.2" fill="#e8e4dc"/>
  <rect x="26" y="22" width="7" height="6" rx="1" stroke-width="1.2" fill="#e8e4dc"/>
  <rect x="48" y="18" width="7" height="6" rx="1" stroke-width="1.2" fill="#e8e4dc"/>
</svg>