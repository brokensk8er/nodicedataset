<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" stroke="#1a1a2e" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- coat hanger hook -->
  <path d="M40 12 Q40 6 44 6 Q48 6 48 10 Q48 14 40 18" stroke-width="1.8"/>
  <!-- hanger bar -->
  <line x1="14" y1="26" x2="66" y2="26" stroke-width="1.8"/>
  <!-- hanger diagonal sides -->
  <line x1="14" y1="26" x2="24" y2="18" stroke-width="1.6"/>
  <line x1="66" y1="26" x2="56" y2="18" stroke-width="1.6"/>
  <line x1="24" y1="18" x2="56" y2="18" stroke-width="1.6"/>
  <!-- coat/clothes on hanger, animated (arms outstretched like alive) -->
  <path d="M24 26 Q16 30 10 42 L14 44 Q18 36 24 34 L24 66 Q24 70 40 70 Q56 70 56 66 L56 34 Q62 36 66 44 L70 42 Q64 30 56 26" stroke-width="1.6" fill="#e8e4dc"/>
  <!-- collar -->
  <path d="M30 26 L40 32 L50 26" stroke-width="1.3"/>
  <!-- button line -->
  <line x1="40" y1="32" x2="40" y2="62" stroke-width="1.1"/>
  <circle cx="40" cy="38" r="1.5" fill="#1a1a2e" stroke="none"/>
  <circle cx="40" cy="46" r="1.5" fill="#1a1a2e" stroke="none"/>
  <circle cx="40" cy="54" r="1.5" fill="#1a1a2e" stroke="none"/>
  <!-- footprints below (it's walking) -->
  <ellipse cx="32" cy="74" rx="4" ry="2" stroke-width="1.2" fill="#e8e4dc"/>
  <ellipse cx="48" cy="76" rx="4" ry="2" stroke-width="1.2" fill="#e8e4dc"/>
</svg>