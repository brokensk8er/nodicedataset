<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" stroke="#1a1a2e" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- stamp handle -->
  <rect x="34" y="10" width="12" height="20" rx="3" stroke-width="1.8" fill="#e8e4dc"/>
  <!-- stamp body -->
  <rect x="22" y="28" width="36" height="20" rx="2" stroke-width="1.8" fill="#e8e4dc"/>
  <!-- stamp face — official seal star -->
  <polygon points="40,32 42,38 48,38 43,42 45,48 40,44 35,48 37,42 32,38 38,38" stroke-width="1.4" fill="#e8e4dc"/>
  <!-- document below with impression -->
  <rect x="14" y="50" width="52" height="22" rx="2" stroke-width="1.4" fill="#e8e4dc"/>
  <line x1="22" y1="58" x2="58" y2="58" stroke-width="1.1"/>
  <line x1="22" y1="63" x2="50" y2="63" stroke-width="1.1"/>
  <!-- impact lines -->
  <line x1="16" y1="44" x2="12" y2="40" stroke-width="1.3"/>
  <line x1="64" y1="44" x2="68" y2="40" stroke-width="1.3"/>
</svg>