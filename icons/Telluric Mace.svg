<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" stroke="#1a1a2e" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- mace handle -->
  <rect x="36" y="44" width="8" height="28" rx="2" stroke-width="1.8" fill="#e8e4dc"/>
  <!-- globe head -->
  <circle cx="40" cy="30" r="18" stroke-width="1.8" fill="#e8e4dc"/>
  <!-- globe lat/long lines -->
  <ellipse cx="40" cy="30" rx="18" ry="8" stroke-width="1.1"/>
  <path d="M40 12 Q48 20 48 30 Q48 40 40 48" stroke-width="1.1"/>
  <path d="M40 12 Q32 20 32 30 Q32 40 40 48" stroke-width="1.1"/>
  <!-- teleport arc from globe -->
  <path d="M56 22 Q70 14 72 28" stroke-width="1.3" stroke-dasharray="2,2"/>
  <!-- person appearing at destination -->
  <circle cx="72" cy="32" r="3" stroke-width="1.2" fill="#e8e4dc"/>
  <line x1="72" y1="35" x2="72" y2="44" stroke-width="1.3"/>
  <!-- sparkle at destination -->
  <line x1="66" y1="28" x2="64" y2="24" stroke-width="1.1"/>
  <line x1="70" y1="26" x2="70" y2="22" stroke-width="1.1"/>
  <line x1="76" y1="26" x2="78" y2="22" stroke-width="1.1"/>
</svg>