<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" stroke="#1a1a2e" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- lipstick case (bone shape at base) -->
  <path d="M34 74 Q28 74 28 68 L28 56 L52 56 L52 68 Q52 74 46 74 Z" stroke-width="1.8" fill="#e8e4dc"/>
  <!-- case detail lines -->
  <line x1="28" y1="64" x2="52" y2="64" stroke-width="1.2"/>
  <line x1="28" y1="60" x2="52" y2="60" stroke-width="1.1"/>
  <!-- lipstick bullet -->
  <rect x="32" y="36" width="16" height="22" rx="2" stroke-width="1.6" fill="#e8e4dc"/>
  <!-- lipstick pointed tip -->
  <path d="M32 36 Q40 24 48 36" stroke-width="1.6" fill="#e8e4dc"/>
  <!-- kiss mark / melting left -->
  <path d="M18 28 Q14 22 18 16 Q22 12 26 16 Q22 22 26 28" stroke-width="1.4" fill="#e8e4dc"/>
  <!-- melting drip -->
  <path d="M18 28 Q16 36 18 42 Q22 38 22 44" stroke-width="1.3" stroke-dasharray="2,1.5"/>
  <!-- sparkle from tip -->
  <line x1="48" y1="28" x2="54" y2="22" stroke-width="1.2"/>
  <line x1="52" y1="32" x2="58" y2="30" stroke-width="1.2"/>
</svg>