<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" stroke="#1a1a2e" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- wooden sword blade -->
  <path d="M38 10 L42 10 L46 54 L40 58 L34 54 Z" stroke-width="1.8" fill="#e8e4dc"/>
  <!-- wood grain lines -->
  <path d="M39 14 Q40 20 39 26 Q40 32 39 38" stroke-width="0.9"/>
  <path d="M41 14 Q42 20 41 26 Q42 32 41 38" stroke-width="0.9"/>
  <!-- crossguard -->
  <line x1="28" y1="52" x2="52" y2="52" stroke-width="2"/>
  <!-- handle -->
  <rect x="36" y="58" width="8" height="14" rx="2" stroke-width="1.6" fill="#e8e4dc"/>
  <!-- splinters flying out on impact -->
  <line x1="52" y1="36" x2="60" y2="30" stroke-width="1.2"/>
  <line x1="54" y1="42" x2="64" y2="40" stroke-width="1.2"/>
  <line x1="50" y1="30" x2="56" y2="22" stroke-width="1.2"/>
  <line x1="56" y1="48" x2="66" y2="50" stroke-width="1.2"/>
  <!-- small splinters -->
  <line x1="58" y1="34" x2="62" y2="28" stroke-width="0.9"/>
  <line x1="62" y1="44" x2="68" y2="42" stroke-width="0.9"/>
</svg>