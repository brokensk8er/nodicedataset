<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" stroke="#1a1a2e" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- slingshot Y fork handle -->
  <line x1="40" y1="72" x2="40" y2="46" stroke-width="2.4"/>
  <line x1="40" y1="46" x2="26" y2="30" stroke-width="2.2"/>
  <line x1="40" y1="46" x2="54" y2="30" stroke-width="2.2"/>
  <!-- rubber band stretched back -->
  <path d="M26 30 Q30 44 40 48 Q50 44 54 30" stroke-width="1.4" stroke-dasharray="2,1"/>
  <!-- projectile in pouch -->
  <circle cx="40" cy="50" r="4" stroke-width="1.4" fill="#e8e4dc"/>
  <!-- ornate architecture target (statue on a plinth) -->
  <rect x="58" y="54" width="14" height="20" rx="1" stroke-width="1.3" fill="#e8e4dc"/>
  <!-- decorative cornice -->
  <line x1="56" y1="54" x2="74" y2="54" stroke-width="1.4"/>
  <!-- statue on top -->
  <circle cx="65" cy="50" r="3" stroke-width="1.2" fill="#e8e4dc"/>
  <line x1="65" y1="53" x2="65" y2="60" stroke-width="1.2"/>
  <!-- triple damage stars hitting architecture -->
  <path d="M62 44 L64 38 L66 44 L72 42 L68 48 L72 52 L64 50 Z" stroke-width="1.2"/>
</svg>