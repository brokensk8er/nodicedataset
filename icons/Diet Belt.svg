<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" stroke="#1a1a2e" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- belt strap -->
  <path d="M10 38 L64 38 L64 46 L10 46 Z" stroke-width="1.6" fill="#e8e4dc"/>
  <!-- buckle with dial -->
  <rect x="32" y="34" width="16" height="16" rx="2" stroke-width="1.8" fill="#e8e4dc"/>
  <!-- dial on buckle -->
  <circle cx="40" cy="42" r="5" stroke-width="1.4"/>
  <line x1="40" y1="37" x2="40" y2="39" stroke-width="1.2"/>
  <line x1="44" y1="40" x2="43" y2="40" stroke-width="1.2"/>
  <line x1="40" y1="46" x2="40" y2="44" stroke-width="1.2"/>
  <line x1="36" y1="40" x2="37" y2="40" stroke-width="1.2"/>
  <!-- pointer on dial -->
  <line x1="40" y1="42" x2="43" y2="39" stroke-width="1.4"/>
  <!-- before/after figures either side -->
  <!-- wide figure left -->
  <circle cx="16" cy="22" r="5" stroke-width="1.3" fill="#e8e4dc"/>
  <path d="M10 28 Q10 36 16 38 Q22 36 22 28 Q22 22 16 22" stroke-width="1.4" fill="#e8e4dc"/>
  <!-- slim figure right -->
  <circle cx="64" cy="22" r="4" stroke-width="1.3" fill="#e8e4dc"/>
  <line x1="64" y1="26" x2="64" y2="36" stroke-width="1.6"/>
  <line x1="60" y1="30" x2="68" y2="30" stroke-width="1.4"/>
  <!-- arrow between them -->
  <line x1="24" y1="28" x2="56" y2="28" stroke-width="1.1"/>
  <path d="M54 25 L58 28 L54 31" stroke-width="1.1"/>
</svg>