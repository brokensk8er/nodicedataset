<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" stroke="#1a1a2e" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- anchor shaft -->
  <line x1="40" y1="18" x2="40" y2="62" stroke-width="2.2"/>
  <!-- anchor ring at top -->
  <circle cx="40" cy="14" r="6" stroke-width="1.8"/>
  <!-- anchor crossbar -->
  <line x1="24" y1="30" x2="56" y2="30" stroke-width="2"/>
  <!-- anchor flukes -->
  <path d="M40 62 Q28 68 22 62 Q22 56 28 56" stroke-width="1.8"/>
  <path d="M40 62 Q52 68 58 62 Q58 56 52 56" stroke-width="1.8"/>
  <!-- ground/gravity lines below figure -->
  <line x1="20" y1="72" x2="60" y2="72" stroke-width="2"/>
  <!-- stuck feet lines (weight lines) -->
  <line x1="34" y1="72" x2="32" y2="80" stroke-width="1.6"/>
  <line x1="46" y1="72" x2="48" y2="80" stroke-width="1.6"/>
  <!-- weight radiating from base -->
  <line x1="28" y1="68" x2="22" y2="76" stroke-width="1.2"/>
  <line x1="52" y1="68" x2="58" y2="76" stroke-width="1.2"/>
</svg>