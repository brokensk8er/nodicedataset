<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" stroke="#1a1a2e" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- wide brim -->
  <ellipse cx="40" cy="58" rx="30" ry="6" stroke-width="1.8" fill="#e8e4dc"/>
  <!-- tall cylindrical crown -->
  <rect x="26" y="16" width="28" height="44" rx="2" stroke-width="1.8" fill="#e8e4dc"/>
  <!-- hatband with valve -->
  <line x1="26" y1="50" x2="54" y2="50" stroke-width="1.6"/>
  <!-- valve circle on band -->
  <circle cx="42" cy="50" r="4" stroke-width="1.4" fill="#e8e4dc"/>
  <line x1="42" y1="46" x2="42" y2="44" stroke-width="1.3"/>
  <!-- hatch opening at top with steam -->
  <line x1="26" y1="20" x2="54" y2="20" stroke-width="1.4" stroke-dasharray="3,2"/>
  <!-- steam clouds pouring out top -->
  <path d="M30 16 Q28 10 32 8 Q36 10 34 16" stroke-width="1.3" fill="#e8e4dc"/>
  <path d="M38 14 Q36 6 40 4 Q44 6 42 14" stroke-width="1.4" fill="#e8e4dc"/>
  <path d="M46 16 Q44 10 48 8 Q52 10 50 16" stroke-width="1.3" fill="#e8e4dc"/>
</svg>