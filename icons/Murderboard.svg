<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" stroke="#1a1a2e" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- mortarboard flat top -->
  <rect x="14" y="30" width="52" height="6" rx="1" stroke-width="1.8" fill="#e8e4dc"/>
  <!-- cap body under board -->
  <path d="M24 36 Q24 44 40 46 Q56 44 56 36" stroke-width="1.6" fill="#e8e4dc"/>
  <!-- noose instead of tassel -->
  <line x1="40" y1="30" x2="40" y2="16" stroke-width="1.4"/>
  <!-- noose loop at end of tassel -->
  <path d="M36 12 Q36 6 40 6 Q44 6 44 10 Q44 14 40 14 Q36 14 36 18 Q36 22 40 22 Q44 22 44 18" stroke-width="1.6"/>
  <!-- knot -->
  <circle cx="40" cy="22" r="2.5" stroke-width="1.3" fill="#e8e4dc"/>
  <!-- comprehension lines radiating (understanding connections) -->
  <line x1="18" y1="54" x2="12" y2="60" stroke-width="1.1" stroke-dasharray="1.5,1.5"/>
  <line x1="26" y1="56" x2="22" y2="64" stroke-width="1.1" stroke-dasharray="1.5,1.5"/>
  <line x1="40" y1="46" x2="40" y2="56" stroke-width="1.1" stroke-dasharray="1.5,1.5"/>
  <line x1="54" y1="56" x2="58" y2="64" stroke-width="1.1" stroke-dasharray="1.5,1.5"/>
  <line x1="62" y1="54" x2="68" y2="60" stroke-width="1.1" stroke-dasharray="1.5,1.5"/>
  <!-- small crime scene nodes at ends -->
  <circle cx="12" cy="62" r="2" stroke-width="1.1" fill="#e8e4dc"/>
  <circle cx="22" cy="66" r="2" stroke-width="1.1" fill="#e8e4dc"/>
  <circle cx="40" cy="58" r="2" stroke-width="1.1" fill="#e8e4dc"/>
  <circle cx="58" cy="66" r="2" stroke-width="1.1" fill="#e8e4dc"/>
  <circle cx="68" cy="62" r="2" stroke-width="1.1" fill="#e8e4dc"/>
</svg>