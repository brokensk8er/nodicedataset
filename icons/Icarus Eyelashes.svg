<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" stroke="#1a1a2e" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- eye shape -->
  <path d="M12 40 Q26 24 40 24 Q54 24 68 40 Q54 56 40 56 Q26 56 12 40 Z" stroke-width="1.8" fill="#e8e4dc"/>
  <!-- iris -->
  <circle cx="40" cy="40" r="10" stroke-width="1.4"/>
  <!-- pupil -->
  <circle cx="40" cy="40" r="4" fill="#1a1a2e" stroke="none"/>
  <!-- very long dramatic eyelashes fluttering up -->
  <line x1="26" y1="28" x2="20" y2="12" stroke-width="1.6"/>
  <line x1="32" y1="24" x2="28" y2="8" stroke-width="1.6"/>
  <line x1="40" y1="24" x2="38" y2="8" stroke-width="1.6"/>
  <line x1="48" y1="24" x2="50" y2="8" stroke-width="1.6"/>
  <line x1="54" y1="28" x2="60" y2="12" stroke-width="1.6"/>
  <!-- lashes have flutter curves -->
  <path d="M20 12 Q18 8 22 6" stroke-width="1.2"/>
  <path d="M28 8 Q28 4 32 4" stroke-width="1.2"/>
  <path d="M38 8 Q38 4 40 2" stroke-width="1.2"/>
  <!-- small figure rising into air (the wearer) -->
  <circle cx="40" cy="66" r="3" stroke-width="1.3" fill="#e8e4dc"/>
  <line x1="40" y1="69" x2="40" y2="76" stroke-width="1.3"/>
  <line x1="36" y1="72" x2="44" y2="72" stroke-width="1.3"/>
</svg>