<!DOCTYPE html>
<html lang="en" data-theme="nodice">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <title>No Dice — Fate's Flip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --parchment: #000; --card-bg: #000; --ink: rgba(255,255,255,1);
      --border: rgba(235,46,46,1); --muted: rgba(180,180,180,1);
      --gold: rgba(156,123,46,1); --gold-dim: rgba(120,95,35,1);
      --pass-grn: rgba(0,166,81,1); --fail-red: rgba(235,46,46,1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Lato', sans-serif; background: #000; color: var(--ink);
      min-height: 100dvh; display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    body::before {
      content: ''; position: fixed; bottom: 0; left: 0; right: 0; height: 65vh;
      pointer-events: none; z-index: 1; opacity: 0;
      transition: opacity 0.9s ease;
    }
    body[data-result="pass"]::before {
      background: radial-gradient(ellipse 90% 70% at 50% 100%, rgba(0,166,81,0.42) 0%, transparent 100%);
      opacity: 1;
    }
    body[data-result="fail"]::before {
      background: radial-gradient(ellipse 90% 70% at 50% 100%, rgba(235,46,46,0.42) 0%, transparent 100%);
      opacity: 1;
    }
    .smoke-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 2; overflow: hidden; }
    .smoke { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0; }
    .s1 { width: 60vw; height: 38vh; bottom: -8%; left: 12%;
      background: radial-gradient(ellipse, rgba(255,255,255,0.055) 0%, transparent 70%);
      animation: smokeRise 18s ease-in-out infinite; }
    .s2 { width: 48vw; height: 30vh; bottom: -6%; left: 42%;
      background: radial-gradient(ellipse, rgba(255,255,255,0.038) 0%, transparent 70%);
      animation: smokeRise 22s ease-in-out infinite -7s; }
    .s3 { width: 36vw; height: 24vh; bottom: -10%; left: 62%;
      background: radial-gradient(ellipse, rgba(255,255,255,0.028) 0%, transparent 70%);
      animation: smokeRise 26s ease-in-out infinite -13s; }
    @keyframes smokeRise {
      0% { opacity: 0; transform: translateY(0) scaleX(1); }
      20% { opacity: 1; }
      65% { opacity: 0.5; transform: translateY(-22%) scaleX(1.18); }
      100% { opacity: 0; transform: translateY(-40%) scaleX(0.88); }
    }
    .stage { display: flex; flex-direction: column; align-items: center;
      gap: 1.5rem; position: relative; z-index: 3; }
    .coin-stage { width: min(80vw, 80vh); height: min(80vw, 80vh); position: relative; }
    .coin { width: 100%; height: 100%; position: relative; cursor: default; }
    .face { position: absolute; inset: 0; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; overflow: hidden; transition: none; }
    .face-mystery { background: radial-gradient(circle at 38% 32%, #e2bc6a, var(--gold) 55%, var(--gold-dim));
      box-shadow: inset 0 0 0 6px rgba(255,255,255,.18), inset 0 -8px 24px rgba(0,0,0,.3), 0 6px 28px rgba(201,168,76,.5); }
    .face-fail { background: #000; box-shadow: 0 6px 32px rgba(235,46,46,.55); }
    .face-pass { background: #000; box-shadow: 0 6px 28px rgba(0,166,81,.55); }
    .face::before { content: ''; position: absolute; inset: 5px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,.18); pointer-events: none; z-index: 1; }
    .face img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; position: relative; z-index: 2; }
    .face-mystery svg { width: 100%; height: 100%; position: relative; z-index: 2; }
    @keyframes coinFlip {
      0% { transform: scaleX(1); }
      50% { transform: scaleX(0); }
      100% { transform: scaleX(1); }
    }
    .coin.spinning { animation: coinFlip var(--half-duration, 0.2s) ease-in-out var(--flip-count, 8) forwards; }
    @keyframes wobble {
      0%, 100% { transform: scaleX(1) rotateZ(0deg); }
      20% { transform: scaleX(1) rotateZ(2deg); }
      40% { transform: scaleX(1) rotateZ(-1.5deg); }
      60% { transform: scaleX(1) rotateZ(1deg); }
    }
    .coin.wobbling { animation: wobble .5s ease-out forwards; }
    .result-banner { font-family: 'Cinzel', serif; font-size: clamp(1.6rem, 4.5vw, 3.2rem);
      font-weight: 700; letter-spacing: .14em; text-transform: uppercase; opacity: 0;
      transform: translateY(8px); transition: opacity .35s ease, transform .35s ease; min-height: 1em; text-align: center; }
    .result-banner.visible { opacity: 1; transform: translateY(0); }
    .result-banner.fail { color: var(--fail-red); }
    .result-banner.pass { color: var(--pass-grn); }
    .result-sub { font-size: clamp(.85rem, 2vw, 1.35rem); font-weight: 300; font-family: 'Lato', sans-serif;
      letter-spacing: .08em; color: var(--muted); min-height: 1.2em; text-align: center; opacity: 0; transition: opacity .35s .15s ease; }
    .result-sub.visible { opacity: 1; }
  </style>
</head>
<body class="coinflip-page">

<div class="smoke-wrap" aria-hidden="true">
  <div class="smoke s1"></div>
  <div class="smoke s2"></div>
  <div class="smoke s3"></div>
</div>

<div class="stage">
  <div class="coin-stage" aria-live="polite" aria-label="Coin result">
    <div class="coin" id="coin">
      <div class="face face-mystery" id="coinFace" aria-hidden="true">
        <svg viewBox="0 0 110 110" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="55,22 86,39 86,71 55,88 24,71 24,39"
            stroke="rgba(255,255,255,0.20)" stroke-width="1.5" fill="none"/>
          <text x="55" y="70" text-anchor="middle"
            font-family="Georgia, serif" font-size="52" font-weight="bold"
            fill="rgba(26,26,46,0.75)">?</text>
        </svg>
      </div>
    </div>
  </div>

  <div>
    <p class="result-banner" id="resultBanner">&nbsp;</p>
    <p class="result-sub"   id="resultSub">&nbsp;</p>
  </div>
</div>

<canvas id="confettiCanvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999;"></canvas>

<script type="module">
import { setFaceMystery, setFaceFail, setFacePass } from './coin-asset.js';
  const coin     = document.getElementById('coin');
  const coinFace = document.getElementById('coinFace');
  const banner   = document.getElementById('resultBanner');
  const sub      = document.getElementById('resultSub');

  // ── TRIGGER CONFIG ──────────────────────────────────────────────────────
  // Change FLIP_KEY to remap the trigger key. USB HID button keycodes can be
  // found by logging e.key in the console after pressing the button.
  const FLIP_KEY = '\\'; // ← Backslash; change this to remap
  // ────────────────────────────────────────────────────────────────────────

  const PASS_LINES = [
    "The fates smile upon thee.",
    "Fortune favours the bold.",
    "Against all odds, glory.",
    "The dice gods are pleased.",
    "A hero's moment — take it.",
    "Even the bards saw that coming.",
    "The stars aligned for you.",
    "Destiny bends to your will.",
    "The realm rejoices in your name.",
    "Boldness rewarded. Press on.",
    "The fates have spoken — loudly.",
    "Victory tastes sweet today.",
    "Not luck. Greatness.",
    "The gods nod in your favour.",
    "Written in the stars, apparently.",
    "Your legend grows.",
  ];

  const FAIL_LINES = [
    "The fates are unmoved.",
    "Even heroes stumble.",
    "The dice gods demand drama.",
    "Not today, adventurer.",
    "A bold attempt, poorly executed.",
    "The tavern will hear of this.",
    "The stars were otherwise engaged.",
    "Destiny had other plans.",
    "The realm weeps. Briefly.",
    "Boldness penalised. Regroup.",
    "The fates have spoken — curtly.",
    "Defeat tastes bitter today.",
    "Not greatness. Not yet.",
    "The gods look away.",
    "Perhaps next time, adventurer.",
    "Your legend… continues building.",
  ];

  function pickResult() {
    return Math.random() < 0.5 ? 'pass' : 'fail';
  }

  let isSpinning = false;

  function rand(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function flip() {
    if (isSpinning) return;
    isSpinning = true;

    banner.className = 'result-banner';
    sub.className    = 'result-sub';
    banner.textContent = '\u00a0';
    sub.textContent    = '\u00a0';
    document.body.removeAttribute('data-result');

    const result = pickResult();

    playFlipSound();
    setFaceMystery(coinFace);

    const flips   = 5 + Math.floor(Math.random() * 4);
    const halfDur = 0.13 + Math.random() * 0.04;
    const iters   = flips - 0.5;

    coin.style.setProperty('--half-duration', halfDur + 's');
    coin.style.setProperty('--flip-count', iters);

    coin.classList.remove('spinning', 'wobbling');
    void coin.offsetWidth;
    coin.classList.add('spinning');

    coin.addEventListener('animationend', function onSpinEnd() {
      coin.removeEventListener('animationend', onSpinEnd);
      coin.classList.remove('spinning');

      if (result === 'fail') setFaceFail(coinFace);
      else                   setFacePass(coinFace);

      coin.style.transition = `transform ${halfDur}s ease-in-out`;
      coin.style.transform  = 'scaleX(1)';

      setTimeout(() => {
        coin.style.transition = '';
        coin.classList.add('wobbling');

        if (result === 'pass') {
          banner.textContent = 'Go Time';
          banner.className   = 'result-banner visible pass';
          document.body.setAttribute('data-result', 'pass');
          sub.textContent    = rand(PASS_LINES);
          sub.className      = 'result-sub visible';
          launchConfetti();
          playCoinSound();
        } else {
          banner.textContent = 'No Time';
          banner.className   = 'result-banner visible fail';
          document.body.setAttribute('data-result', 'fail');
          sub.textContent    = rand(FAIL_LINES);
          sub.className      = 'result-sub visible';
          playWompWomp();
        }

        setTimeout(() => {
          coin.classList.remove('wobbling');
          isSpinning = false;
        }, 520);

      }, halfDur * 1000);
    });
  }

  document.addEventListener('keydown', (e) => { if (e.key === FLIP_KEY) { e.preventDefault(); flip(); } });

  // ── CONFETTI ────────────────────────────────────────────────────────────
  const canvas  = document.getElementById('confettiCanvas');
  const ctx     = canvas.getContext('2d');
  let particles = [];
  let rafId     = null;

  const COLORS = ['#c9a84c','#e2bc6a','#27ae60','#2ecc71','#ffffff','#faf7f2','#a0d8a0','#f0c040'];

  function resizeCanvas() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  function makeParticle(x, angleDeg) {
    const angleRad = angleDeg * Math.PI / 180;
    const speed    = 12 + Math.random() * 14;
    return {
      x, y: canvas.height,
      vx: Math.cos(angleRad) * speed,
      vy: -Math.sin(angleRad) * speed,
      w: 5 + Math.random() * 7,
      h: 3 + Math.random() * 4,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      rot: Math.random() * 360,
      rotV: (Math.random() - 0.5) * 10,
      gravity: 0.25 + Math.random() * 0.15,
      life: 1,
      decay: 0.005 + Math.random() * 0.005,
    };
  }

  function launchConfetti() {
    resizeCanvas();
    particles = [];
    const W = canvas.width;
    const cannons = [
      { x: 0,       minAngle: 20,  maxAngle: 70  },
      { x: W * 0.25, minAngle: 40,  maxAngle: 85  },
      { x: W * 0.5,  minAngle: 60,  maxAngle: 120 },
      { x: W * 0.75, minAngle: 95,  maxAngle: 140 },
      { x: W,        minAngle: 110, maxAngle: 160 },
    ];
    for (const cannon of cannons) {
      for (let i = 0; i < 60; i++) {
        const angleDeg = cannon.minAngle + Math.random() * (cannon.maxAngle - cannon.minAngle);
        particles.push(makeParticle(cannon.x, angleDeg));
      }
    }
    if (rafId) cancelAnimationFrame(rafId);
    animateConfetti();
  }

  function animateConfetti() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles = particles.filter(p => p.life > 0);

    for (const p of particles) {
      p.x   += p.vx;
      p.y   += p.vy;
      p.vy  += p.gravity;
      p.rot += p.rotV;
      p.life -= p.decay;

      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    }

    if (particles.length > 0) {
      rafId = requestAnimationFrame(animateConfetti);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }

  // ── AUDIO ───────────────────────────────────────────────────────────────
  function playFlipSound() {
    const ac  = new (window.AudioContext || window.webkitAudioContext)();
    const t   = ac.currentTime;

    const tickBuf = ac.createBuffer(1, ac.sampleRate * 0.04, ac.sampleRate);
    const tickData = tickBuf.getChannelData(0);
    for (let i = 0; i < tickData.length; i++) tickData[i] = (Math.random() * 2 - 1);
    const tick     = ac.createBufferSource();
    tick.buffer    = tickBuf;
    const tickHp   = ac.createBiquadFilter();
    tickHp.type    = 'highpass';
    tickHp.frequency.value = 3000;
    const tickGain = ac.createGain();
    tickGain.gain.setValueAtTime(0.55, t);
    tickGain.gain.exponentialRampToValueAtTime(0.001, t + 0.035);
    tick.connect(tickHp);
    tickHp.connect(tickGain);
    tickGain.connect(ac.destination);
    tick.start(t);

    const spinDur   = 0.72;
    const numClicks = 14;
    for (let i = 0; i < numClicks; i++) {
      const progress = i / numClicks;
      const interval = 0.025 + progress * 0.07;
      const clickAt  = 0.04 + i * interval - (progress * progress * 0.04);

      const buf  = ac.createBuffer(1, ac.sampleRate * 0.018, ac.sampleRate);
      const data = buf.getChannelData(0);
      for (let j = 0; j < data.length; j++) data[j] = (Math.random() * 2 - 1);

      const src  = ac.createBufferSource();
      src.buffer = buf;

      const hp   = ac.createBiquadFilter();
      hp.type    = 'bandpass';
      hp.frequency.value = 2200 - progress * 800;
      hp.Q.value = 1.2;

      const g    = ac.createGain();
      const vol  = 0.18 * (1 - progress * 0.5);
      g.gain.setValueAtTime(vol, t + clickAt);
      g.gain.exponentialRampToValueAtTime(0.001, t + clickAt + 0.016);

      src.connect(hp);
      hp.connect(g);
      g.connect(ac.destination);
      src.start(t + clickAt);
    }

    const thudBuf  = ac.createBuffer(1, ac.sampleRate * 0.12, ac.sampleRate);
    const thudData = thudBuf.getChannelData(0);
    for (let i = 0; i < thudData.length; i++) thudData[i] = (Math.random() * 2 - 1);
    const thud     = ac.createBufferSource();
    thud.buffer    = thudBuf;
    const thudLp   = ac.createBiquadFilter();
    thudLp.type    = 'lowpass';
    thudLp.frequency.value = 280;
    const thudGain = ac.createGain();
    const thudAt   = spinDur;
    thudGain.gain.setValueAtTime(0.5, t + thudAt);
    thudGain.gain.exponentialRampToValueAtTime(0.001, t + thudAt + 0.09);
    thud.connect(thudLp);
    thudLp.connect(thudGain);
    thudGain.connect(ac.destination);
    thud.start(t + thudAt);

    setTimeout(() => ac.close(), 1200);
  }

  function playCoinSound() {
    const ac  = new (window.AudioContext || window.webkitAudioContext)();
    const vol = ac.createGain();
    vol.gain.setValueAtTime(0.042, ac.currentTime);
    vol.connect(ac.destination);

    const notes = [
      { freq: 988,  start: 0,    dur: 0.08 },
      { freq: 1319, start: 0.07, dur: 0.18 },
    ];

    notes.forEach(({ freq, start, dur }) => {
      const osc  = ac.createOscillator();
      const gain = ac.createGain();

      osc.type = 'square';
      osc.frequency.setValueAtTime(freq, ac.currentTime + start);
      osc.frequency.linearRampToValueAtTime(freq * 1.06, ac.currentTime + start + dur);

      gain.gain.setValueAtTime(0, ac.currentTime + start);
      gain.gain.linearRampToValueAtTime(1, ac.currentTime + start + 0.01);
      gain.gain.setValueAtTime(1,  ac.currentTime + start + dur * 0.6);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + start + dur);

      osc.connect(gain);
      gain.connect(vol);
      osc.start(ac.currentTime + start);
      osc.stop(ac.currentTime + start + dur + 0.02);
    });

    setTimeout(() => ac.close(), 600);
  }

  function playWompWomp() {
    const ac  = new (window.AudioContext || window.webkitAudioContext)();
    const vol = ac.createGain();
    vol.gain.setValueAtTime(0.042, ac.currentTime);
    vol.connect(ac.destination);

    const blats = [
      { start: 0,    freqStart: 440, freqEnd: 220, dur: 0.55 },
      { start: 0.45, freqStart: 330, freqEnd: 110, dur: 0.75 },
    ];

    blats.forEach(({ start, freqStart, freqEnd, dur }) => {
      const osc  = ac.createOscillator();
      const gain = ac.createGain();

      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(freqStart, ac.currentTime + start);
      osc.frequency.exponentialRampToValueAtTime(freqEnd, ac.currentTime + start + dur);

      const lfo  = ac.createOscillator();
      const lfoG = ac.createGain();
      lfo.frequency.value  = 5.5;
      lfoG.gain.value      = 8;
      lfo.connect(lfoG);
      lfoG.connect(osc.frequency);
      lfo.start(ac.currentTime + start);
      lfo.stop(ac.currentTime + start + dur);

      gain.gain.setValueAtTime(0, ac.currentTime + start);
      gain.gain.linearRampToValueAtTime(1, ac.currentTime + start + 0.04);
      gain.gain.setValueAtTime(1, ac.currentTime + start + dur - 0.12);
      gain.gain.linearRampToValueAtTime(0, ac.currentTime + start + dur);

      osc.connect(gain);
      gain.connect(vol);
      osc.start(ac.currentTime + start);
      osc.stop(ac.currentTime + start + dur + 0.05);
    });

    setTimeout(() => ac.close(), 1600);
  }

</script>
</body>
</html>
