<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>No Dice — Loot Table</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<!-- Shared styles (colours, fonts, buttons, badges, animations) -->
<link rel="stylesheet" href="styles.css">
<!-- Prevent theme flash: apply saved theme before first paint -->
<script>try{var _t=localStorage.getItem('vaultTheme')||'dark';document.documentElement.setAttribute('data-theme',_t);}catch(e){document.documentElement.setAttribute('data-theme','dark');}</script>
<style>
  /* ── Page layout ── */
  html, body { height: 100%; }

  body {
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  /* ── Header ── */
  /* .site-label, header h1, .subtitle come from styles.css */
  header {
    text-align: center;
    padding: 10px 16px 6px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px 16px 8px;
    min-height: 0;
  }

  .loot-card {
    width: 100%;
    max-width: 440px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px 24px 24px;
    box-shadow: 0 6px 32px var(--shadow);
    display: flex;
    flex-direction: column;
    gap: 14px;
    animation: cardIn .5s cubic-bezier(.22,1,.36,1) both;
  }

  .item-image-slot {
    width: 100%;
    border-radius: 10px;
    background: linear-gradient(135deg, #f0ebe3 0%, #e8e2d9 100%);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    overflow: hidden;
    position: relative;
    min-height: 60px;
  }

  .item-image-slot.has-image {
    background: none;
    border-color: var(--border);
  }

  .item-image-slot.has-image img {
    width: 100%;
    height: auto;
    display: block;
  }

  .item-image-slot .slot-icon {
    font-size: 2rem;
    opacity: 0.5;
    line-height: 1;
  }

  .item-image-slot .slot-hash {
    font-family: 'Lato', monospace;
    font-size: 0.58rem;
    letter-spacing: .1em;
    color: var(--gold-dim);
    opacity: 0.7;
    text-transform: uppercase;
  }

  /* placeholder icon and hash text inside slot */

  .item-name-label {
    font-family: 'Cinzel', serif;
    font-size: .6rem;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: .14em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .item-name {
    font-family: 'Cinzel', serif;
    font-size: 1.35rem;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.25;
    letter-spacing: .02em;
    transition: opacity .15s;
  }

  .item-flavour-label {
    font-family: 'Cinzel', serif;
    font-size: .6rem;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: .14em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .item-flavour {
    font-size: .95rem;
    font-weight: 300;
    line-height: 1.55;
    color: var(--ink);
    font-style: italic;
    transition: opacity .15s;
  }

  .item-name.fading,
  .item-flavour.fading { opacity: 0; }

  .card-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
  }

  /* .source-badge base + .live/.fallback come from styles.css */
  /* align-self: center is local override for loot layout */
  .source-badge { align-self: center; }

  /* Diagnostic badge — expanded to show error detail */
  .source-badge.diag {
    flex-direction: column;
    align-items: flex-start;
    border-radius: 10px;
    padding: 6px 10px;
    gap: 3px;
    max-width: 100%;
    word-break: break-word;
    align-self: stretch;
  }

  .badge-row {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .badge-error {
    font-size: 0.60rem;
    color: #c0392b;
    letter-spacing: .02em;
    text-transform: none;
    font-style: italic;
    padding-left: 10px;
  }

  /* .card-footer comes from styles.css
     Padding is 9px 0 10px here (no side padding) — overrides shared value */
  .card-footer { padding: 16px 0 10px; }

  /* .pull-btn comes from styles.css */

  /* .loading + .loading .spinner come from styles.css */

  /* .nav-link comes from styles.css */
  footer {
    padding-bottom: 1.5rem;
    text-align: center;
  }

  /* @keyframes cardIn + @keyframes spin come from styles.css */
</style>
</head>
<body>

<!-- Theme toggle — sun/moon light/dark switch (CSS in styles.css) -->
<button id="themeBtn" class="theme-toggle-btn" onclick="toggleTheme()" aria-label="Toggle light/dark mode"></button>

<!-- ============================================
     HEADER
     Edit: site-label eyebrow, h1 title, subtitle.
     The gold word in h1 is wrapped in a <span>.
     ============================================ -->
<header>
  <p class="site-label">No Dice &mdash; Improv RPG</p>
  <h1>The <span>Loot</span> Table</h1>
  <p class="subtitle">Reach into the pile. See what fate provides.</p>
</header>

<!-- ============================================
     MAIN CONTENT
     JavaScript renders the loot card into this
     element. The loading spinner shows until
     data is fetched. Do not add static content.
     ============================================ -->
<main id="main">
  <div class="loading">
    <span class="spinner">💰</span><br>
    Rifling through the dungeon&hellip;
  </div>
</main>

<!-- ============================================
     FOOTER
     ← Back to the Vault nav link.
     ============================================ -->
<footer>
  <a class="nav-link" href="index.html">← Back to the Vault</a>
</footer>

<script>
// ============================================================
//  CONFIGURATION
//  ► SHEET_ID + API_KEY: same as chargen.html.
//  ► TAB: the sheet tab to read from.
//    Column A: Item Name
//    Column B: Flavour description
//    Column C: Image (SVG or data URI — optional)
// ============================================================
const CONFIG = {
  SHEET_ID: '1IAbZc7e47S4u28E2gT1QCVxid1s5Y3bvxu_a0-82KTs',
  API_KEY:  'AIzaSyCntxgMGOCFW34wA-AUYWMgafS-A44UXr0',
  TAB:      'Loot',
};

// ============================================================
//  FALLBACK DATA
// ============================================================
const FALLBACK_ITEMS = [
  ["The Sword of Mild Inconvenience",
   "A finely crafted blade that, upon striking an enemy, causes them to briefly remember an embarrassing moment from their past. Effective, but not for the reasons the wielder expects."],
  ["Boots of Confident Striding",
   "These boots do not make you faster. They simply make you look like you know exactly where you're going, even when you absolutely do not."],
  ["The Amulet of Someone Else's Problem",
   "Once per day, the wearer may designate any ongoing situation as definitively someone else's problem. The situation does not change. Their attitude toward it does."],
  ["Gloves of Excessive Gesturing",
   "Enchanted gauntlets that compel the wearer to use sweeping, dramatic hand movements when speaking. Intimidation checks are made with advantage. Being taken seriously is made with disadvantage."],
  ["The Ring of Plausible Deniability",
   "A plain silver band that, when worn, ensures there is always just enough doubt. Witnesses become uncertain. Evidence becomes ambiguous. Nobody can quite put their finger on it."],
  ["Cloak of Mild Weatherproofing",
   "Keeps out light drizzle. Completely ineffective in heavy rain. Surprisingly warm. Smells faintly of cinnamon. Previous owner unknown."],
  ["The Lantern of Inconvenient Truth",
   "Illuminates the truth in a ten-foot radius. Users report this is significantly less helpful than advertised, and considerably more awkward."],
  ["Bracers of Delayed Reaction",
   "When the wearer is attacked, these bracers activate — providing +3 to AC about three seconds after the blow has already landed. The enchanter's notes suggest this was 'not the intended behaviour'."],
  ["The Pouch of Exact Change",
   "This coin purse always contains the precise amount of money needed for any purchase, down to the copper. It never has more than that. Financial planning becomes simultaneously easier and deeply frustrating."],
  ["Helm of Remembered Names",
   "Whispers the name of everyone the wearer has ever met directly into their ear at slightly the wrong moment. Beloved at reunions. Catastrophic in stealth situations."],
  ["The Spoon of Distant Soups",
   "Once per long rest, this ornate silver spoon allows the user to taste any soup currently being prepared within a one-mile radius. Its original purpose remains a subject of intense scholarly debate."],
  ["Staff of Mild Weather Prediction",
   "Accurately predicts weather patterns eighteen to twenty-four hours in advance for a localised area. Completely useless in a dungeon. Invaluable for farmers. Unclear why it's in a dungeon."],
  ["The Mirror of Honest Opinion",
   "Shows the viewer exactly what they look like, then provides a brief, unsolicited, and distressingly accurate assessment of their recent decisions. Cannot be turned to face a wall — it will turn back."],
  ["Dagger of Pointed Commentary",
   "A razor-sharp blade that, when thrown, delivers both a wound and a brief but incisive critique of the target's recent tactical choices. Enemies have described it as 'fair, but unkind'."],
  ["The Compass of Sunk Cost",
   "Always points toward whatever the party has spent the most time on so far this adventure, regardless of whether that direction is useful. Previous owners found it compelling. Historians find it instructive."],
];

// ============================================================
//  STATE
//  Runtime variables — do not edit these directly.
//  ITEMS holds the loaded item array; current is the last pull.
// ============================================================
let ITEMS       = null;
let dataSource  = 'fallback';
let diagError   = null;   // exact error for on-screen display
let current     = null;
let isAnimating = false;

// ============================================================
//  STABLE HASH
// ============================================================
function itemHash(name) {
  let h = 5381;
  for (let i = 0; i < name.length; i++) {
    h = ((h << 5) + h) ^ name.charCodeAt(i);
    h = h >>> 0;
  }
  return 'item_' + h.toString(16).padStart(8, '0');
}

// ============================================================
//  DATA LOADING
// ============================================================
function isConfigured() {
  return CONFIG.SHEET_ID !== 'YOUR_SHEET_ID_HERE' &&
         CONFIG.API_KEY  !== 'YOUR_API_KEY_HERE';
}

async function loadData() {
  if (!isConfigured()) {
    buildItemsFromFallback();
    dataSource = 'fallback';
    return;
  }
  try {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}`
              + `/values/${encodeURIComponent(CONFIG.TAB)}!A:C?key=${CONFIG.API_KEY}`;
    const res = await fetch(url);
    if (!res.ok) {
      // Read the full API error body so we can show it on screen
      const errJson = await res.json().catch(() => ({}));
      const apiMsg  = (errJson.error && errJson.error.message) || '(no message)';
      diagError = `HTTP ${res.status} — ${apiMsg}`;
      throw new Error(diagError);
    }
    const json = await res.json();
    const rows = (json.values || []).filter(r => r[0] && r[0].trim());
    if (rows.length === 0) {
      diagError = 'Tab "Loot" was found but contains no data rows';
      throw new Error(diagError);
    }
    ITEMS = rows.map(r => ({
      name:    (r[0] || '').trim(),
      flavour: (r[1] || '').trim(),
      image:   (r[2] || '').trim(),
      hash:    itemHash((r[0] || '').trim()),
    }));
    dataSource = 'live';
  } catch (err) {
    console.warn('Loot sheet fetch failed — using fallback data.', err);
    if (!diagError) diagError = err.message;
    buildItemsFromFallback();
    dataSource = 'fallback';
  }
}

function buildItemsFromFallback() {
  ITEMS = FALLBACK_ITEMS.map(([name, flavour]) => ({
    name,
    flavour,
    image:   '',
    hash: itemHash(name),
  }));
}

// ============================================================
//  PICK — SHUFFLE-BAG ALGORITHM
//  Ensures no item repeats until every item has been shown.
//  Fills bag with shuffled indices; pops one per pull.
// ============================================================
let bag = [];

function pickItem() {
  if (bag.length === 0) {
    bag = ITEMS.map((_, i) => i);
    for (let i = bag.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [bag[i], bag[j]] = [bag[j], bag[i]];
    }
  }
  if (current && bag.length > 1 && ITEMS[bag[bag.length - 1]] === current) {
    const idx = bag.pop();
    bag.unshift(idx);
  }
  return ITEMS[bag.pop()];
}

// ============================================================
//  SOURCE BADGE — shows full error detail when unreachable
// ============================================================
function sourceBadgeHTML() {
  if (dataSource === 'live') {
    return `<div class="source-badge live"><span class="dot"></span>Live from Google Sheets</div>`;
  }
  if (diagError) {
    return `<div class="source-badge fallback diag">
      <div class="badge-row"><span class="dot"></span>Sheet unreachable &mdash; built-in data</div>
      <div class="badge-error">&#9888; ${escHtml(diagError)}</div>
    </div>`;
  }
  return `<div class="source-badge fallback"><span class="dot"></span>Using built-in data</div>`;
}

// ============================================================
//  RENDER
//  render(item) — builds and injects the loot card into #main.
//  pull()       — picks a new item, animates the name/flavour
//                 fade, then calls render() with the new item.
//  To change the card layout, edit render() template literals.
// ============================================================
function imgSlotHTML(item) {
  if (item.image) {
    return `<div class="item-image-slot has-image" id="img-slot">
      <img src="${item.image}" alt="${escHtml(item.name)}" />
    </div>`;
  }
  return `<div class="item-image-slot" id="img-slot">
    <span class="slot-icon">&#10024;</span>
    <span class="slot-hash">${item.hash}</span>
  </div>`;
}

function render(item) {
  current = item;
  const m = document.getElementById('main');
  m.innerHTML = `
    <div class="loot-card" id="loot-card">
      ${imgSlotHTML(item)}
      <div>
        <div class="item-name-label">Magic Item</div>
        <div class="item-name" id="item-name">${escHtml(item.name)}</div>
      </div>
      <div class="card-divider"></div>
      <div>
        <div class="item-flavour-label">Description</div>
        <div class="item-flavour" id="item-flavour">${escHtml(item.flavour)}</div>
      </div>
      <div class="card-footer">
        <button class="pull-btn" id="pull-btn" onclick="doPull()">&#128176; Pull Another Item</button>
        ${sourceBadgeHTML()}
      </div>
    </div>`;
}

// ============================================================
//  PULL — animated swap
// ============================================================
function doPull() {
  if (isAnimating) return;
  isAnimating = true;

  const nameEl  = document.getElementById('item-name');
  const flavEl  = document.getElementById('item-flavour');
  const imgSlot = document.getElementById('img-slot');
  const btn     = document.getElementById('pull-btn');
  btn.disabled  = true;

  nameEl.classList.add('fading');
  flavEl.classList.add('fading');

  setTimeout(() => {
    const next = pickItem();
    current = next;

    nameEl.textContent = next.name;
    flavEl.textContent = next.flavour;

    imgSlot.outerHTML = imgSlotHTML(next);

    nameEl.classList.remove('fading');
    flavEl.classList.remove('fading');

    btn.disabled = false;
    isAnimating  = false;
  }, 180);
}

// ============================================================
//  ESCAPE HTML — security helper
//  Sanitises any text before inserting it into innerHTML.
//  Always use this when rendering user-supplied or API data.
// ============================================================
function escHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ============================================================
//  BOOT
//  Entry point. Loads loot data from Sheets (or fallback),
//  then renders the first item automatically.
// ============================================================
loadData().then(() => {
  render(pickItem());
});

// ── Theme toggle ──────────────────────────────
function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  try { localStorage.setItem('vaultTheme', next); } catch(e) {}
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️' : '🌙';
}
(function(){
  const t = document.documentElement.getAttribute('data-theme') || 'dark';
  const btn = document.getElementById('themeBtn');
  if (btn) btn.textContent = t === 'dark' ? '☀️' : '🌙';
})();
</script>
</body>
</html>
