<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>No Dice — Character Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --parchment: #faf7f2;
    --gold: #c9a84c;
    --muted: #6b6676;
    --card-bg: #ffffff;
    --border: #e8e2d9;
    --shadow: 0 1px 8px rgba(26,26,46,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    background: var(--parchment);
    color: var(--ink);
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  header {
    text-align: center;
    padding: 10px 16px 6px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    position: relative;
  }

  header h1 {
    font-family: 'Cinzel', serif;
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    line-height: 1.2;
  }

  header .subtitle {
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .source-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.68rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 8px;
    margin-top: 4px;
  }

  .source-badge .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .source-badge.live .dot      { background: #2d7a5e; }
  .source-badge.fallback .dot  { background: #b8860b; }

  .mulligan-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 5px 0 3px;
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .pip-row { display: flex; gap: 5px; }

  .pip {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--gold);
    transition: background 0.3s, transform 0.2s;
  }

  .pip.spent { background: var(--border); transform: scale(0.85); }

  #app {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 0 12px 6px;
    min-height: 0;
  }

  .loading {
    text-align: center;
    padding: 40px 24px;
    color: var(--muted);
    font-size: 0.9rem;
    letter-spacing: 0.05em;
  }

  .loading .spinner {
    font-size: 2rem;
    margin-bottom: 12px;
    display: inline-block;
    animation: spin 1.2s linear infinite;
  }

  .container {
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex: 1;
    min-height: 0;
  }

  .field-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px 10px 5px;
    box-shadow: var(--shadow);
    position: relative;
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    animation: slideUp 0.3s ease both;
  }

  .field-card:nth-child(1) { animation-delay: 0.03s; }
  .field-card:nth-child(2) { animation-delay: 0.06s; }
  .field-card:nth-child(3) { animation-delay: 0.09s; }
  .field-card:nth-child(4) { animation-delay: 0.12s; }
  .field-card:nth-child(5) { animation-delay: 0.15s; }
  .field-card:nth-child(6) { animation-delay: 0.18s; }

  .field-label {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 2px;
    line-height: 1;
  }

  .field-value {
    font-size: 0.95rem;
    font-weight: 400;
    line-height: 1.35;
    color: var(--ink);
    padding-right: 62px;
    transition: opacity 0.15s;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .field-value.fading { opacity: 0; }

  .reroll-btn {
    position: absolute;
    top: 50%;
    right: 8px;
    transform: translateY(-50%);
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 8px;
    font-family: 'Lato', sans-serif;
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    display: flex;
    align-items: center;
    gap: 3px;
    white-space: nowrap;
  }

  .reroll-btn:hover:not(:disabled) {
    border-color: var(--gold);
    color: var(--gold);
    background: #fffdf5;
  }

  .reroll-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .reroll-btn .die { font-size: 0.85rem; }

  .cta-area {
    display: flex;
    flex-direction: column;
    gap: 5px;
    align-items: center;
    padding-top: 4px;
    flex-shrink: 0;
  }

  .roll-btn {
    width: 100%;
    background: var(--ink);
    color: var(--parchment);
    border: none;
    border-radius: 8px;
    padding: 11px;
    font-family: 'Cinzel', serif;
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .roll-btn:hover:not(:disabled) { background: #2e2e4a; }
  .roll-btn:active { transform: scale(0.98); }
  .roll-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  footer {
    text-align: center;
    padding: 4px 0 6px;
    flex-shrink: 0;
  }

  .nav-link {
    font-family: 'Cinzel', serif;
    font-size: 0.58rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color .2s, color .2s;
    opacity: 0.8;
  }
  .nav-link:hover {
    color: var(--gold);
    border-color: var(--gold);
    opacity: 1;
  }

  .lock-notice {
    width: 100%;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    cursor: default;
  }

  .lock-notice .lock-msg {
    font-family: 'Lato', sans-serif;
    font-size: 0.78rem;
    font-weight: 400;
    letter-spacing: 0.02em;
    color: var(--muted);
  }

  .lock-notice .lock-countdown {
    font-family: 'Cinzel', serif;
    font-size: 0.88rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--ink);
    white-space: nowrap;
    flex-shrink: 0;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .die.spinning { animation: spin 0.35s ease; }

  .reset-btn {
    position: absolute;
    top: 50%;
    right: 12px;
    transform: translateY(-50%);
    background: none;
    border: 1px solid #c0392b;
    border-radius: 5px;
    padding: 3px 8px;
    font-family: 'Lato', sans-serif;
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #c0392b;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .reset-btn:hover { opacity: 1; }
</style>
</head>
<body>

<header>
  <h1>Roll Your Character</h1>
  <div class="subtitle">Improv D&amp;D · Fate is waiting</div>
</header>

<div id="app">
  <div class="loading">
    <span class="spinner">🎲</span><br>
    Consulting the dice gods…
  </div>
</div>

<footer>
  <a class="nav-link" href="index.html">← Back to the Vault</a>
</footer>

<script>
const CONFIG = {
  SHEET_ID: '1IAbZc7e47S4u28E2gT1QCVxid1s5Y3bvxu_a0-82KTs',
  API_KEY:  'AIzaSyCntxgMGOCFW34wA-AUYWMgafS-A44UXr0',

  TABS: [
    { key: 'firstNames',  sheetTab: 'First Names'  },
    { key: 'lastNames',   sheetTab: 'Last Names'   },
    { key: 'races',       sheetTab: 'Races'        },
    { key: 'classes',     sheetTab: 'Classes'      },
    { key: 'backstories', sheetTab: 'Backstories'  },
    { key: 'quirks',      sheetTab: 'Quirks'       },
    { key: 'secrets',     sheetTab: 'Secrets'      },
  ]
};

const FALLBACK = {
  firstNames: [
    "Glorb","Twinkle","Mungus","Brisket","Fleeb","Wumbo","Snorgle","Dinglebert",
    "Pambula","Gornak","Smitch","Quibble","Florp","Nutwig","Dravox","Grumblina",
    "Zorp","Weeble","Crunchy","Pflop","Thumdar","Snibbly","Ruckus","Blorfen",
    "Twonk","Gundula","Snazzle","Murphbert","Clobba","Flibnor"
  ],
  lastNames: [
    "Puddlesnort","the Adequate","Bonesworth","McFlumps","of the Bog","Cracklefingers",
    "Thunderbutt","Noodlearm","Spigotface","the Slightly Heroic","Wobbleheim",
    "Crumblewick","Snorkleson","Dinglebottom","of Questionable Origin","Fumblegrip",
    "the Unready","Blunderpants","Gnarlytoe","Wobblechin","the Forgettable",
    "Toadsworth","Bumbleshire","Flapjaw","of Nowhere in Particular"
  ],
  races: [
    "A Halfling who insists they're actually a Gnome",
    "A very small Dragon in a trenchcoat",
    "An Elf who has never once been on time",
    "A Dwarf with a surprisingly lovely singing voice",
    "A Tiefling who keeps getting mistaken for the villain",
    "A Human who is absolutely convinced they have magic powers (they don't)",
    "A Goblin with an extensive collection of spoons",
    "An Orc who trained as a pastry chef",
    "A Gnome who is 400 years old and still described as 'gifted'",
    "A Skeleton who hasn't told anyone yet",
    "A Centaur who refuses to go anywhere that has stairs",
    "A Merfolk out of water, extremely inconvenienced",
    "A Were-Accountant (transforms at quarter-end, not full moon)",
    "A Vampire who is very lactose intolerant",
    "A Rock Golem who has recently discovered feelings",
    "A Cloud Giant who has shrunk in the wash",
    "A Fairy who lost their wings in a card game"
  ],
  classes: [
    "Barbarian (specialises in strongly-worded letters)",
    "Bard (knows three chords, extremely confident)",
    "Cleric of a god they've never actually met",
    "Druid who mostly just turns into a slightly larger dog",
    "Fighter who brings a clipboard to every battle",
    "Monk whose vow of silence only applies to Tuesdays",
    "Paladin who is really into morally grey areas actually",
    "Ranger who gets lost indoors",
    "Rogue who is an absolutely terrible liar",
    "Sorcerer who got their powers from a particularly weird sneeze",
    "Warlock in a very awkward contractual situation",
    "Wizard who still hasn't returned their library books",
    "Artificer who insists everything is 'in beta'",
    "Blood Hunter who just found out what that means",
    "Necromancer with excellent customer service skills",
    "Illusionist who can't turn it off when nervous",
    "Cavalier who lost their horse in a bet"
  ],
  backstories: [
    "Fled their hometown after accidentally winning a yodeling competition and the expectations became too much",
    "Was raised by wolves, but normal wolves — they were very supportive and helped with homework",
    "Worked for ten years as a professional adventurer reviewer; decided to try it themselves",
    "Left a promising career in cheese-making after a prophetic dream that was almost certainly just indigestion",
    "Was turned into a frog for three years. Won't say by whom. Still angry",
    "Inherited a map to treasure, but the treasure turned out to be 'self-belief' and they are furious",
    "Joined the adventure after losing a bet to a seagull. Long story",
    "Spent seven years as an apprentice to a wizard who turned out to be a raccoon in a hat",
    "Former town crier who got tired of only reporting bad news",
    "Accidentally married royalty during a festival, quietly left before breakfast",
    "Was a professional monster bait for three seasons — looking to try a different role now",
    "Woke up one day knowing sword skills with no memory of learning them. Went with it",
    "Started adventuring to return a borrowed book; it escalated",
    "Exiled from their village for consistently giving unsolicited quest advice",
    "Has been chasing the same cart for six years. Nobody knows why"
  ],
  quirks: [
    "Narrates their own actions in third person at dramatic moments",
    "Cannot resist correcting people's grammar mid-combat",
    "Insists on taking meeting minutes during every dungeon encounter",
    "Has given a nickname to every door they've ever opened",
    "Always speaks in rhyme when they lie, completely unaware of it",
    "Refuses to be surprised. Will loudly claim they 'knew about this'",
    "Applauds after every spell, including enemies'",
    "Has never once walked into a room without pausing for effect",
    "Keeps a journal but only writes the boring parts",
    "Maintains extremely strong opinions about inn ratings",
    "Asks 'but what's their motivation?' about every monster",
    "Dramatically misremembers every adventure they've been on",
    "Refers to all taverns as 'the office'",
    "Cannot physically leave a room without saying goodbye to furniture",
    "Insists on a brief debrief after every combat"
  ],
  secrets: [
    "Has never actually read the spell they claim is their signature move",
    "Secretly fluent in three additional languages but finds it easier to pretend otherwise",
    "The legendary sword was found in a bin. The bin was outside a blacksmith's. It had a 'free' sign on it",
    "Is on the run from a bakers' guild for reasons they decline to specify",
    "Secretly writes a serialised adventure novel featuring a thinly-veiled version of the party",
    "Has a wanted poster — looks nothing like them, but they're still worried",
    "Owes money to a god. Not a lot of money. Still very inconvenient",
    "Was once a villain. Briefly. Didn't care for it",
    "Their impressive backstory was purchased from a retired bard for 40 gold",
    "Cannot actually read maps. Has been winging it the entire time",
    "Adopted by mistake — was handed to their family at a festival, chaos ensued, nobody corrected it",
    "Their mortal enemy is a duck. They don't want to talk about it",
    "Has a whole other name they use in different towns. Keeping them apart is getting complicated",
    "Once accidentally became mayor of a small village and just... never resigned",
    "Their weapon has a name. The weapon does not like the name they gave it"
  ]
};

const FIELDS = [
  { key: 'name',       label: 'Name',              pool: null          },
  { key: 'race',       label: 'Race / Species',    pool: 'races'       },
  { key: 'class',      label: 'Class',             pool: 'classes'     },
  { key: 'backstory',  label: 'Backstory',         pool: 'backstories' },
  { key: 'quirk',      label: 'Personality Quirk', pool: 'quirks'      },
  { key: 'secret',     label: 'Secret / Flaw',     pool: 'secrets'     },
];

const MAX_MULLIGANS  = 3;
const LOCK_DURATION  = 60 * 60 * 1000;
const STORAGE_KEY    = 'nodice_chargen_session';

let DATA       = null;
let dataSource = 'fallback';
let state      = { rolled: false, mulligans: MAX_MULLIGANS, values: {}, lockedAt: null };
let countdownInterval = null;

function saveSession() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function loadSession() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const saved = JSON.parse(raw);
    if (!saved.values || typeof saved.mulligans !== 'number') return false;
    if (saved.lockedAt) {
      const elapsed = Date.now() - saved.lockedAt;
      if (elapsed >= LOCK_DURATION) {
        localStorage.removeItem(STORAGE_KEY);
        return false;
      }
    }
    state = saved;
    return true;
  } catch(e) { return false; }
}

function clearSession() {
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
}

function isConfigured() {
  return CONFIG.SHEET_ID !== 'YOUR_SHEET_ID_HERE' &&
         CONFIG.API_KEY  !== 'YOUR_API_KEY_HERE';
}

async function fetchTab(tabName) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}`
            + `/values/${encodeURIComponent(tabName)}!A:A?key=${CONFIG.API_KEY}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Tab "${tabName}" returned HTTP ${res.status}`);
  const json = await res.json();
  return (json.values || []).flat().map(v => v.trim()).filter(Boolean);
}

async function loadData() {
  if (!isConfigured()) {
    DATA = FALLBACK;
    dataSource = 'fallback';
    return;
  }
  try {
    const results = await Promise.all(CONFIG.TABS.map(t => fetchTab(t.sheetTab)));
    DATA = {};
    CONFIG.TABS.forEach((t, i) => { DATA[t.key] = results[i]; });
    dataSource = 'live';
  } catch (err) {
    console.warn('Sheets fetch failed — using fallback data.', err);
    DATA = FALLBACK;
    dataSource = 'fallback';
  }
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function generateName() { return pick(DATA.firstNames) + ' ' + pick(DATA.lastNames); }

function generateAll() {
  const v = { name: generateName() };
  FIELDS.forEach(f => { if (f.pool) v[f.key] = pick(DATA[f.pool]); });
  return v;
}

function sourceBadgeHTML() {
  const cls  = dataSource === 'live' ? 'live' : 'fallback';
  const text = dataSource === 'live'
    ? 'Live from Google Sheets'
    : isConfigured() ? 'Sheet unreachable — built-in data' : 'Using built-in data';
  return `<div class="source-badge ${cls}"><span class="dot"></span>${text}</div>`;
}

function isLocked() { return state.lockedAt !== null; }

function formatCountdown(ms) {
  if (ms <= 0) return '00:00';
  const totalSec = Math.ceil(ms / 1000);
  const mins = Math.floor(totalSec / 60).toString().padStart(2, '0');
  const secs = (totalSec % 60).toString().padStart(2, '0');
  return `${mins}:${secs}`;
}

function startCountdown() {
  if (countdownInterval) clearInterval(countdownInterval);
  countdownInterval = setInterval(() => {
    const el = document.getElementById('lock-countdown');
    if (!el) { clearInterval(countdownInterval); return; }
    const remaining = LOCK_DURATION - (Date.now() - state.lockedAt);
    if (remaining <= 0) {
      clearInterval(countdownInterval);
      clearSession();
      state = { rolled: false, mulligans: MAX_MULLIGANS, values: {}, lockedAt: null };
      doRoll();
    } else {
      el.textContent = formatCountdown(remaining);
    }
  }, 1000);
}

function render() {
  const app = document.getElementById('app');
  const locked = isLocked();

  const pips = Array.from({length: MAX_MULLIGANS}, (_, i) =>
    `<div class="pip${i >= state.mulligans ? ' spent' : ''}"></div>`
  ).join('');

  const cards = FIELDS.map(f => {
    const canReroll = state.mulligans > 0 && !locked;
    return `
      <div class="field-card" id="card-${f.key}">
        <div class="field-label">${f.label}</div>
        <div class="field-value" id="val-${f.key}">${state.values[f.key] || ''}</div>
        <button class="reroll-btn" onclick="rerollField('${f.key}')"
          ${canReroll ? '' : 'disabled'} id="btn-${f.key}">
          <span class="die" id="die-${f.key}">⚄</span> Reroll
        </button>
      </div>`;
  }).join('');

  const ctaBtn = locked ? (() => {
    const remaining = LOCK_DURATION - (Date.now() - state.lockedAt);
    return `<div class="lock-notice">
      <span class="lock-msg">Out of rolls! Check back in</span>
      <span class="lock-countdown" id="lock-countdown">${formatCountdown(remaining)}</span>
    </div>`;
  })() : `<button class="roll-btn" onclick="doRoll()"
      ${state.mulligans > 0 ? '' : 'disabled'}>🎲 Roll New Character</button>`;

  app.innerHTML = `
    <div class="mulligan-bar">
      Mulligans &nbsp;
      <div class="pip-row">${pips}</div>
    </div>
    <div class="container">
      ${cards}
      <div class="cta-area">
        ${ctaBtn}
        ${sourceBadgeHTML()}
      </div>
    </div>`;

  if (locked) {
    startCountdown();
    const hdr = document.querySelector('header');
    if (hdr && !hdr.querySelector('.reset-btn')) {
      const btn = document.createElement('button');
      btn.className = 'reset-btn';
      btn.textContent = 'Reset';
      btn.onclick = devReset;
      hdr.appendChild(btn);
    }
  } else {
    const existing = document.querySelector('.reset-btn');
    if (existing) existing.remove();
  }
}

function doRoll() {
  if (isLocked()) return;
  if (state.rolled && state.mulligans <= 0) return;
  if (state.rolled) state.mulligans--;
  state.rolled = true;
  state.values = generateAll();
  if (state.mulligans === 0) state.lockedAt = Date.now();
  saveSession();
  render();
}

function rerollField(key) {
  if (isLocked() || state.mulligans <= 0) return;
  state.mulligans--;

  const valEl = document.getElementById('val-' + key);
  const dieEl = document.getElementById('die-' + key);
  valEl.classList.add('fading');
  dieEl.classList.add('spinning');

  setTimeout(() => {
    state.values[key] = (key === 'name')
      ? generateName()
      : pick(DATA[FIELDS.find(f => f.key === key).pool]);

    valEl.textContent = state.values[key];
    valEl.classList.remove('fading');
    dieEl.classList.remove('spinning');

    if (state.mulligans === 0) state.lockedAt = Date.now();

    saveSession();

    if (isLocked()) {
      render();
    } else {
      document.querySelectorAll('.pip')
        .forEach((p, i) => p.classList.toggle('spent', i >= state.mulligans));
      document.querySelectorAll('.reroll-btn, .roll-btn')
        .forEach(b => { b.disabled = state.mulligans === 0; });
    }
  }, 160);
}

function devReset() {
  clearInterval(countdownInterval);
  clearSession();
  state = { rolled: false, mulligans: MAX_MULLIGANS, values: {}, lockedAt: null };
  const existing = document.querySelector('.reset-btn');
  if (existing) existing.remove();
  doRoll();
}

loadData().then(() => {
  const restored = loadSession();
  if (restored) { render(); } else { doRoll(); }
});
</script>
</body>
</html>
