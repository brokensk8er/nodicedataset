<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>No Dice — Character Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<!-- Shared styles (colours, fonts, buttons, badges, animations) -->
<link rel="stylesheet" href="styles.css">
<!-- Prevent theme flash: apply saved theme before first paint -->
<script>try{var _t=localStorage.getItem('vaultTheme')||'dark';document.documentElement.setAttribute('data-theme',_t);}catch(e){document.documentElement.setAttribute('data-theme','dark');}</script>
<style>
  /* ── Page layout ── */
  html, body { height: 100%; }

  body {
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }h

  /* ── Desktop wrapper — .page-frame base + media query come from styles.css ── */
  @media (min-width: 600px) {
    .page-frame { max-height: 860px; }
  }

  /* ── Header ── */
  /* .site-label, header h1, .subtitle come from styles.css */
  header {
    text-align: center;
    padding: 10px 16px 6px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    position: relative;
    background-color: var(--parchment);
  }

  /* .mulligan-bar, .pip-row, .pip, .pip.spent come from styles.css */

  /* ── Main scrollable area ── */
  #app {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 0 12px 6px;
    min-height: 0;
    background-color: var(--parchment);
  }

  /* .loading + .loading .spinner come from styles.css */

  /* ── Single white card that holds everything ── */
  .character-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: 0 4px 24px var(--shadow);
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    overflow: hidden;
    animation: cardIn .45s cubic-bezier(.22,1,.36,1) both;
  }

  /* Scrollable field area inside the card */
  .fields-scroll {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .fields-scroll::-webkit-scrollbar { width: 4px; }
  .fields-scroll::-webkit-scrollbar-track { background: transparent; }
  .fields-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Each field row inside the card ── */
  .field-row {
    display: flex;
    align-items: flex-start;
    padding: 0 14px;
    min-height: 52px;
    position: relative;
  }

  .field-row:nth-child(even) {
    background: rgba(201,168,76,.03);
  }

  .field-row + .field-row::before {
    content: '';
    position: absolute;
    top: 0; left: 14px; right: 14px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border) 20%, var(--border) 80%, transparent);
  }

  .field-text {
    flex: 1;
    min-width: 0;
    padding: 7px 0;
  }

  .field-label {
    font-family: 'Cinzel', serif;
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    line-height: 1;
    margin-bottom: 3px;
  }

  .field-value {
    font-size: 0.92rem;
    font-weight: 400;
    line-height: 1.3;
    color: var(--ink);
    transition: opacity 0.15s;
  }

  .field-value.fading { opacity: 0; }

  /* ── Reroll button ── */
  .reroll-btn {
    flex-shrink: 0;
    margin-left: 10px;
    margin-top: 18px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 8px;
    font-family: 'Lato', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    display: flex;
    align-items: center;
    gap: 3px;
    white-space: nowrap;
  }

  .reroll-btn:hover:not(:disabled) {
    border-color: var(--gold);
    color: var(--gold);
    background: var(--gold-bg);
  }

  .reroll-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .reroll-btn .die { font-size: 0.82rem; }

  /* .card-footer comes from styles.css */
  /* .roll-btn, .roll-btn:hover, :active, :disabled come from styles.css */
  /* .lock-notice + children come from styles.css */
  /* .source-badge + .dot + .live/.fallback come from styles.css */

  /* ── Footer nav ── */
  /* .nav-link comes from styles.css */
  footer {
    text-align: center;
    padding: 5px 0 7px;
    flex-shrink: 0;
    background-color: var(--parchment);
  }

  /* ── Dev reset button ── */
  .reset-btn {
    position: absolute;
    top: 50%;
    right: 12px;
    transform: translateY(-50%);
    background: none;
    border: 1px solid #c0392b;
    border-radius: 5px;
    padding: 3px 8px;
    font-family: 'Lato', sans-serif;
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #c0392b;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .reset-btn:hover { opacity: 1; }

  /* @keyframes cardIn and @keyframes spin come from styles.css */
  .die.spinning { animation: spin 0.35s ease; }
</style>
</head>
<body>

<!-- Theme toggle — sun/moon light/dark switch (CSS in styles.css) -->
<button id="themeBtn" class="theme-toggle-btn" onclick="toggleTheme()" aria-label="Toggle light/dark mode"></button>

<div class="page-frame">

  <!-- ============================================
       HEADER
       Edit: site-label eyebrow text, h1 title,
       subtitle. The gold word in h1 is in <span>.
       ============================================ -->
  <header>
    <p class="site-label">No Dice &mdash; Improv D&amp;D</p>
    <h1>Roll Your <span>Character</span></h1>
    <p class="subtitle">Fate is waiting</p>
  </header>

  <!-- ============================================
       APP ROOT
       JavaScript injects the .mulligan-bar and
       .character-card here via render().
       The loading spinner shows until data loads.
       Do not put static content in this div.
       ============================================ -->
  <div id="app">
    <div class="loading">
      <span class="spinner">🎲</span><br>
      Consulting the dice gods…
    </div>
  </div>

  <!-- ============================================
       FOOTER
       ← Back to the Vault nav link.
       ============================================ -->
  <footer>
    <a class="nav-link" href="index.html">← Back to the Vault</a>
  </footer>

</div>

<script>
// ============================================================

  API_KEY:  'AIzaSyCntxgMGOCFW34wA-AUYWMgafS-A44UXr0',

  TABS: [
    { key: 'firstNames',  sheetTab: 'First Names'  },
    { key: 'lastNames',   sheetTab: 'Last Names'   },
    { key: 'races',       sheetTab: 'Races'        },

// ============================================================
//  FALLBACK DATA
//  Used when the Google Sheets API is unreachable (offline,

// ============================================================

  ],

    "Thunderbutt","Noodlearm","Spigotface","the Slightly Heroic","Wobbleheim",
    "Crumblewick","Snorkleson","Dinglebottom","of Questionable Origin","Fumblegrip",
    "the Unready","Blunderpants","Gnarlytoe","Wobblechin","the Forgettable",
    "Toadsworth","Bumbleshire","Flapjaw","of Nowhere in Particular"
  ],
  races: [
    "A Halfling who insists they're actually a Gnome",
    "A very small Dragon in a trenchcoat",
    "An Elf who has never once been on time",
    "A Dwarf with a surprisingly lovely singing voice",
    "A Tiefling who keeps getting mistaken for the villain",
    "A Human who is absolutely convinced they have magic powers (they don't)",
    "A Goblin with an extensive collection of spoons",
    "An Orc who trained as a pastry chef",

    "A Skeleton who hasn't told anyone yet",

    "Woke up one day knowing sword skills with no memory of learning them. Went with it",

  ],
  quirks: [

    "Insists on taking meeting minutes during every dungeon encounter",

    "Always speaks in rhyme when they lie, completely unaware of it",

  ],
  secrets: [

    "Secretly fluent in three additional languages but finds it easier to pretend otherwise",

    "Is on the run from a bakers' guild for reasons they decline to specify",
    "Secretly writes a serialised adventure novel featuring a thinly-veiled version of the party",
    "Has a wanted poster — looks nothing like them, but they're still worried",
    "Owes money to a god. Not a lot of money. Still very inconvenient",
    "Was once a villain. Briefly. Didn't care for it",
    "Their impressive backstory was purchased from a retired bard for 40 gold",
    "Cannot actually read maps. Has been winging it the entire time",
    "Adopted by mistake — was handed to their family at a festival, chaos ensued, nobody corrected it",
    "Their mortal enemy is a duck. They don't want to talk about it",
    "Has a whole other name they use in different towns. Keeping them apart is getting complicated",
    "Once accidentally became mayor of a small village and just... never resigned",
    "Their weapon has a name. The weapon does not like the name they gave it"

};

// ============================================================
//  FIELD CONFIG
//  The 6 rows shown on the character card.
//  label: text shown in the card header for that row.
//  pool:  key in FALLBACK (and in DATA from Sheets) to draw from.
//  null pool = name field, generated from firstNames + lastNames.
// ============================================================
const FIELDS = [
  { key: 'name',      label: 'Name',              pool: null          },
  { key: 'race',      label: 'Race / Species',    pool: 'races'       },
  { key: 'class',     label: 'Class',             pool: 'classes'     },
  { key: 'backstory', label: 'Backstory',         pool: 'backstories' },
  { key: 'quirk',     label: 'Personality Quirk', pool: 'quirks'      },
  { key: 'secret',    label: 'Secret / Flaw',     pool: 'secrets'     },
];

const MAX_MULLIGANS = 3;
const LOCK_DURATION = 60 * 60 * 1000;
const STORAGE_KEY   = 'nodice_chargen_session';

let DATA       = null;
let dataSource = 'fallback';
let state      = { rolled: false, mulligans: MAX_MULLIGANS, values: {}, lockedAt: null };
let countdownInterval = null;

// ============================================================
//  SESSION PERSISTENCE
//  Saves/loads roll state to localStorage so players can
//  close the tab and return within the 1-hour window.
// ============================================================
function saveSession() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function loadSession() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const saved = JSON.parse(raw);
    if (!saved.values || typeof saved.mulligans !== 'number') return false;
    if (saved.lockedAt) {
      if (Date.now() - saved.lockedAt >= LOCK_DURATION) {
        localStorage.removeItem(STORAGE_KEY);
        return false;
      }
    }
    state = saved;
    return true;
  } catch(e) { return false; }
}

function clearSession() {
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
}

// ============================================================
//  DATA LOADING
//  Fetches each character field from its own Google Sheets tab.
//  Falls back to FALLBACK arrays if the API call fails.
// ============================================================
function isConfigured() {
  return CONFIG.SHEET_ID !== 'YOUR_SHEET_ID_HERE' &&
         CONFIG.API_KEY  !== 'YOUR_API_KEY_HERE';
}

async function fetchTab(tabName) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}`
            + `/values/${encodeURIComponent(tabName)}!A2:A?key=${CONFIG.API_KEY}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Tab "${tabName}" returned HTTP ${res.status}`);
  const json = await res.json();
  return (json.values || []).flat().map(v => v.trim()).filter(Boolean);
}

async function loadData() {
  if (!isConfigured()) {
    DATA = FALLBACK; dataSource = 'fallback'; return;
  }
  try {
    const results = await Promise.all(CONFIG.TABS.map(t => fetchTab(t.sheetTab)));
    DATA = {};
    CONFIG.TABS.forEach((t, i) => { DATA[t.key] = results[i]; });
    dataSource = 'live';
  } catch (err) {
    console.warn('Sheets fetch failed — using fallback data.', err);
    DATA = FALLBACK; dataSource = 'fallback';
  }
}

// ============================================================
//  HELPERS
//  pick()       — returns a random element from an array.
//  generateAll() — builds a full set of character field values.
//  sourceBadgeHTML() — returns the live/fallback badge markup.
// ============================================================
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function generateName() { return pick(DATA.firstNames) + ' ' + pick(DATA.lastNames); }

function generateAll() {
  const v = { name: generateName() };
  FIELDS.forEach(f => { if (f.pool) v[f.key] = pick(DATA[f.pool]); });
  return v;
}

function sourceBadgeHTML() {
  const cls  = dataSource === 'live' ? 'live' : 'fallback';
  const text = dataSource === 'live'
    ? 'Live from Google Sheets'
    : isConfigured() ? 'Sheet unreachable — built-in data' : 'Using built-in data';
  return `<div class="source-badge ${cls}"><span class="dot"></span>${text}</div>`;
}

function isLocked() { return state.lockedAt !== null; }

function formatCountdown(ms) {
  if (ms <= 0) return '00:00';
  const s = Math.ceil(ms / 1000);
  return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
}

// ============================================================
//  COUNTDOWN
//  Runs a 1-second interval ticking down the lock timer.
//  When it hits zero, clears the session and auto-rolls.
// ============================================================
function startCountdown() {
  if (countdownInterval) clearInterval(countdownInterval);
  countdownInterval = setInterval(() => {
    const el = document.getElementById('lock-countdown');
    if (!el) { clearInterval(countdownInterval); return; }
    const remaining = LOCK_DURATION - (Date.now() - state.lockedAt);
    if (remaining <= 0) {
      clearInterval(countdownInterval);
      clearSession();
      state = { rolled: false, mulligans: MAX_MULLIGANS, values: {}, lockedAt: null };
      doRoll();
    } else {
      el.textContent = formatCountdown(remaining);
    }
  }, 1000);
}

// ============================================================
//  RENDER
//  Builds the entire card DOM from the current state object
//  and writes it into #app. Called after every state change.
//  To change the card layout, edit the template literals here.
// ============================================================
function render() {
  const app    = document.getElementById('app');
  const locked = isLocked();

  const pips = Array.from({length: MAX_MULLIGANS}, (_, i) =>
    `<div class="pip${i >= state.mulligans ? ' spent' : ''}"></div>`
  ).join('');

  const rows = FIELDS.map(f => {
    const canReroll = state.mulligans > 0 && !locked;
    return `
      <div class="field-row">
        <div class="field-text">
          <div class="field-label">${f.label}</div>
          <div class="field-value" id="val-${f.key}">${state.values[f.key] || ''}</div>
        </div>
        <button class="reroll-btn" onclick="rerollField('${f.key}')"
          ${canReroll ? '' : 'disabled'} id="btn-${f.key}">
          <span class="die" id="die-${f.key}">⚄</span> Reroll
        </button>
      </div>`;
  }).join('');

  const ctaBtn = locked ? (() => {
    const remaining = LOCK_DURATION - (Date.now() - state.lockedAt);
    return `<div class="lock-notice">
      <span class="lock-msg">Out of rolls! Check back in</span>
      <span class="lock-countdown" id="lock-countdown">${formatCountdown(remaining)}</span>
    </div>`;
  })() : `<button class="roll-btn" onclick="doRoll()"
      ${state.mulligans > 0 ? '' : 'disabled'}>🎲 Roll New Character</button>`;

  app.innerHTML = `
    <div class="mulligan-bar">
      Mulligans &nbsp;<div class="pip-row">${pips}</div>
    </div>
    <div class="character-card">
      <div class="fields-scroll">
        ${rows}
      </div>
      <div class="card-footer">
        ${ctaBtn}
        ${sourceBadgeHTML()}
      </div>
    </div>`;

  if (locked) {
    startCountdown();
    const hdr = document.querySelector('header');
    if (hdr && !hdr.querySelector('.reset-btn')) {
      const btn = document.createElement('button');
      btn.className = 'reset-btn';
      btn.textContent = 'Reset';
      btn.onclick = devReset;
      hdr.appendChild(btn);
    }
  } else {
    const existing = document.querySelector('.reset-btn');
    if (existing) existing.remove();
  }
}

// ============================================================
//  ACTIONS
//  doRoll()       — rolls a fresh full character.
//  rerollField()  — rerolls one field, spends one mulligan.
//  devReset()     — dev-only: wipes session and re-rolls.
// ============================================================
function doRoll() {
  if (isLocked()) return;
  if (state.rolled && state.mulligans <= 0) return;
  if (state.rolled) state.mulligans--;
  state.rolled  = true;
  state.values  = generateAll();
  if (state.mulligans === 0) state.lockedAt = Date.now();
  saveSession();
  render();
}

function rerollField(key) {
  if (isLocked() || state.mulligans <= 0) return;
  state.mulligans--;

  const valEl = document.getElementById('val-' + key);
  const dieEl = document.getElementById('die-' + key);
  valEl.classList.add('fading');
  dieEl.classList.add('spinning');

  setTimeout(() => {
    state.values[key] = (key === 'name')
      ? generateName()
      : pick(DATA[FIELDS.find(f => f.key === key).pool]);

    valEl.textContent = state.values[key];
    valEl.classList.remove('fading');
    dieEl.classList.remove('spinning');

    if (state.mulligans === 0) state.lockedAt = Date.now();
    saveSession();

    if (isLocked()) {
      render();
    } else {
      document.querySelectorAll('.pip')
        .forEach((p, i) => p.classList.toggle('spent', i >= state.mulligans));
      document.querySelectorAll('.reroll-btn, .roll-btn')
        .forEach(b => { b.disabled = state.mulligans === 0; });
    }
  }, 160);
}

function devReset() {
  clearInterval(countdownInterval);
  clearSession();
  state = { rolled: false, mulligans: MAX_MULLIGANS, values: {}, lockedAt: null };
  const existing = document.querySelector('.reset-btn');
  if (existing) existing.remove();
  doRoll();
}

// ============================================================
//  BOOT
//  Entry point. Loads data, then either restores the previous
//  session from localStorage or auto-rolls a fresh character.
// ============================================================
loadData().then(() => {
  const restored = loadSession();
  if (restored) { render(); } else { doRoll(); }
});

// ── Theme toggle ──────────────────────────────
function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  try { localStorage.setItem('vaultTheme', next); } catch(e) {}
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️' : '🌙';
}
(function(){
  const t = document.documentElement.getAttribute('data-theme') || 'dark';
  const btn = document.getElementById('themeBtn');
  if (btn) btn.textContent = t === 'dark' ? '☀️' : '🌙';
})();
</script>
