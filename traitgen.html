<style>
  /* ── Page layout ── */
  html, body { height: 100%; }

  body {
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  /* ── Desktop wrapper — .page-frame base + media query come from styles.css ── */
  @media (min-width: 600px) {
    .page-frame { max-height: 820px; }
  }

  /* ── Header ── */
  /* .site-label, header h1, .subtitle come from styles.css */
  header {
    text-align: center;
    padding: 10px 16px 6px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    position: relative;
    background-color: var(--parchment);
  }

  /* .mulligan-bar, .pip-row, .pip, .pip.spent come from styles.css
     (they are identical to chargen.html — now centralised) */

  /* ── Main area ── */
  #app {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 0 12px 6px;
    min-height: 0;
    background-color: var(--parchment);
  }

  /* .loading + .loading .spinner come from styles.css */

  /* ── White card ── */
  .trait-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: 0 4px 24px var(--shadow);
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    overflow: hidden;
    animation: cardIn .45s cubic-bezier(.22,1,.36,1) both;
  }

  /* ── Scrollable inner area (needed when loot expands the card) ── */
  .trait-scroll {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .trait-scroll::-webkit-scrollbar { width: 4px; }
  .trait-scroll::-webkit-scrollbar-track { background: transparent; }
  .trait-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Standard trait display (non-loot) ── */
  .trait-display {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 28px;
    gap: 16px;
    min-height: 100%;
    transition: opacity 0.2s ease;
  }

  .trait-display.fading { opacity: 0; }

  .trait-label {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  /* The big trait text — large and prominent for phone screens */
  .trait-value {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.45rem, 5vw, 2rem);
    font-weight: 700;
    color: var(--ink);
    line-height: 1.3;
    letter-spacing: 0.02em;
    text-align: center;
  }

  /* Gold divider under the trait text */
  .trait-divider {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    flex-shrink: 0;
  }

  /* Sheet source label */
  .trait-source {
    font-family: 'Lato', sans-serif;
    font-size: 0.65rem;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-align: center;
    min-height: 1rem;
  }

  /* ── Loot display ──────────────────────────────────────────
     Rendered instead of .trait-display when the rolled entry
     comes from CONFIG.LOOT_TAB. Mirrors loot.html exactly.
  ────────────────────────────────────────────────────────── */
  .loot-display {
    display: flex;
    flex-direction: column;
    padding: 20px 20px 16px;
    gap: 12px;
    transition: opacity 0.2s ease;
  }

  .loot-display.fading { opacity: 0; }

  /* Image slot — mirrors loot.html .item-image-slot */
  .loot-image-slot {
    width: 100%;
    border-radius: 10px;
    background: linear-gradient(135deg, #f0ebe3 0%, #e8e2d9 100%);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    overflow: hidden;
    min-height: 60px;
  }

  .loot-image-slot.has-image {
    background: none;
    padding: 8px;
  }

  .loot-image-slot.has-image img {
    width: 100%;
    max-width: 160px;
    height: auto;
    display: block;
    margin: 0 auto;
  }

  .loot-image-slot .slot-icon {
    font-size: 2rem;
    opacity: 0.5;
    line-height: 1;
  }

  /* Item name — large, matches .trait-value prominence */
  .loot-name-label {
    font-family: 'Cinzel', serif;
    font-size: .6rem;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: .14em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .loot-name {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.2rem, 4.5vw, 1.6rem);
    font-weight: 700;
    color: var(--ink);
    line-height: 1.25;
    letter-spacing: .02em;
  }

  .loot-card-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
  }

  /* Flavour text — mirrors loot.html .item-flavour */
  .loot-flavour-label {
    font-family: 'Cinzel', serif;
    font-size: .6rem;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: .14em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .loot-flavour {
    font-size: .93rem;
    font-weight: 300;
    line-height: 1.55;
    color: var(--ink);
    font-style: italic;
  }

  /* Source tag at foot of loot block */
  .loot-source {
    font-family: 'Lato', sans-serif;
    font-size: 0.65rem;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-align: center;
  }

  /* .card-footer comes from styles.css */
  /* .roll-btn + all states come from styles.css */
  /* .lock-notice + .lock-msg + .lock-countdown come from styles.css */
  /* .source-badge + .dot + .live/.fallback come from styles.css */

  /* ── Footer nav ── */
  /* .nav-link comes from styles.css */
  footer {
    text-align: center;
    padding: 5px 0 7px;
    flex-shrink: 0;
    background-color: var(--parchment);
  }

  /* ================================================================
     DEV RESET BUTTON
     Remove or hide this before a live show — it is for testing only.
     To remove: delete the .reset-btn rule below AND the
     devReset() function AND the injection block inside render().
  ================================================================ */
  .reset-btn {
    position: absolute;
    top: 50%;
    right: 12px;
    transform: translateY(-50%);
    background: none;
    border: 1px solid #c0392b;
    border-radius: 5px;
    padding: 3px 8px;
    font-family: 'Lato', sans-serif;
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #c0392b;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .reset-btn:hover { opacity: 1; }
  /* ================================================================
     END DEV RESET BUTTON STYLES
  ================================================================ */

  /* @keyframes cardIn and @keyframes spin come from styles.css */
  .die.spinning { animation: spin 0.35s ease; }
</style>

<script>
// ============================================================
//  CONFIGURATION
//  ► Change SHEET_ID + API_KEY to point to your own sheet.
//  ► EXCLUDE_TABS: tab names to skip entirely (case-sensitive).
//  ► LOOT_TAB: the one tab fetched with image + flavour columns.
// ============================================================
const CONFIG = {
  SHEET_ID: '1IAbZc7e47S4u28E2gT1QCVxid1s5Y3bvxu_a0-82KTs',
  API_KEY:  'AIzaSyCntxgMGOCFW34wA-AUYWMgafS-A44UXr0',

  // ── Tab exclusion list ──────────────────────────────────
  // Any tab whose name appears here is skipped entirely.
  // Names are case-sensitive and must match the Sheet tab exactly.
  // Add more tab names here as needed — no other code changes required.
  EXCLUDE_TABS: [
    'First Names',
    'Last Names',
  ],

  // ── Loot tab name ───────────────────────────────────────
  // This tab is fetched differently from all others:
  // columns A (name), B (flavour text), and C (SVG/image data URI)
  // are all read, and rolling a loot entry shows the full
  // item card layout instead of the standard big-text trait view.
  // Change this string if your loot tab has a different name.
  LOOT_TAB: 'Loot',
};

// ============================================================
//  FALLBACK DATA
//  Used when the Google Sheet is unreachable.
//  Each entry: { value, sheet, flavour?, image? }
//  Loot entries carry flavour so the offline loot card still works.
// ============================================================
const FALLBACK_TRAITS = [
  { value: "Cannot physically leave a room without saying goodbye to furniture",       sheet: "Quirks"      },
  { value: "Narrates their own actions in third person at dramatic moments",            sheet: "Quirks"      },
  { value: "Cannot resist correcting people's grammar mid-combat",                     sheet: "Quirks"      },
  { value: "Insists on taking meeting minutes during every dungeon encounter",          sheet: "Quirks"      },
  { value: "Always speaks in rhyme when they lie, completely unaware of it",           sheet: "Quirks"      },
  { value: "Refuses to be surprised. Will loudly claim they knew about this",          sheet: "Quirks"      },
  { value: "Applauds after every spell, including enemies'",                            sheet: "Quirks"      },
  { value: "Has never once walked into a room without pausing for effect",             sheet: "Quirks"      },
  { value: "Maintains extremely strong opinions about inn ratings",                    sheet: "Quirks"      },
  { value: "Asks 'but what's their motivation?' about every monster",                  sheet: "Quirks"      },
  { value: "Dramatically misremembers every adventure they've been on",                sheet: "Quirks"      },
  { value: "Their mortal enemy is a duck. They don't want to talk about it",           sheet: "Secrets"     },
  { value: "Has never actually read the spell they claim is their signature move",     sheet: "Secrets"     },
  { value: "The legendary sword was found in a bin",                                   sheet: "Secrets"     },
  { value: "Owes money to a god. Not a lot of money. Still very inconvenient",         sheet: "Secrets"     },
  { value: "Cannot actually read maps. Has been winging it the entire time",           sheet: "Secrets"     },
  { value: "Was once a villain. Briefly. Didn't care for it",                          sheet: "Secrets"     },
  { value: "Has a wanted poster — looks nothing like them, but they're still worried", sheet: "Secrets"     },
  { value: "Once accidentally became mayor of a small village and never resigned",     sheet: "Secrets"     },
  { value: "Their weapon has a name. The weapon does not like the name they gave it",  sheet: "Secrets"     },
  { value: "A very small Dragon in a trenchcoat",                                      sheet: "Races"       },
  { value: "A Skeleton who hasn't told anyone yet",                                    sheet: "Races"       },
  { value: "A Were-Accountant (transforms at quarter-end, not full moon)",             sheet: "Races"       },
  { value: "A Vampire who is very lactose intolerant",                                 sheet: "Races"       },
  { value: "A Rock Golem who has recently discovered feelings",                        sheet: "Races"       },
  { value: "Ranger who gets lost indoors",                                              sheet: "Classes"     },
  { value: "Rogue who is an absolutely terrible liar",                                 sheet: "Classes"     },
  { value: "Wizard who still hasn't returned their library books",                     sheet: "Classes"     },
  { value: "Warlock in a very awkward contractual situation",                          sheet: "Classes"     },
  { value: "Joined the adventure after losing a bet to a seagull. Long story",         sheet: "Backstories" },
  { value: "Started adventuring to return a borrowed book; it escalated",              sheet: "Backstories" },
  { value: "Was turned into a frog for three years. Won't say by whom. Still angry",  sheet: "Backstories" },
  // Loot fallback entries — flavour text included so the loot card renders offline
  {
    value:   "The Amulet of Someone Else's Problem",
    sheet:   "Loot",
    flavour: "Once per day, the wearer may designate any ongoing situation as definitively someone else's problem. The situation does not change. Their attitude toward it does.",
    image:   '',
  },
  {
    value:   "Boots of Confident Striding",
    sheet:   "Loot",
    flavour: "These boots do not make you faster. They simply make you look like you know exactly where you're going, even when you absolutely do not.",
    image:   '',
  },
  {
    value:   "The Ring of Plausible Deniability",
    sheet:   "Loot",
    flavour: "A plain silver band that, when worn, ensures there is always just enough doubt. Witnesses become uncertain. Evidence becomes ambiguous.",
    image:   '',
  },
];

// ============================================================
//  MULLIGAN / LOCKOUT CONSTANTS — identical to chargen.html
// ============================================================
const MAX_MULLIGANS = 3;
const LOCK_DURATION = 60 * 60 * 1000; // 1 hour in ms
const STORAGE_KEY   = 'nodice_traitgen_session';

// ============================================================
//  STATE
//  flavour and image are populated only when a Loot entry is active.
// ============================================================
let ALL_TRAITS = null;
let dataSource = 'fallback';

let state = {
  rolled:    false,
  mulligans: MAX_MULLIGANS,
  value:     '',
  sheet:     '',
  flavour:   '',
  image:     '',
  lockedAt:  null,
};

let countdownInterval = null;

// ============================================================
//  SESSION PERSISTENCE — copied exactly from chargen.html
// ============================================================
function saveSession() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function loadSession() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const saved = JSON.parse(raw);
    if (typeof saved.mulligans !== 'number') return false;
    if (saved.lockedAt) {
      if (Date.now() - saved.lockedAt >= LOCK_DURATION) {
        localStorage.removeItem(STORAGE_KEY);
        return false;
      }
    }
    state = saved;
    return true;
  } catch(e) { return false; }
}

function clearSession() {
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
}

// ============================================================
//  DATA LOADING
//  1. Discover all tab names via the spreadsheet metadata endpoint.
//  2. Remove any tab in CONFIG.EXCLUDE_TABS.
//  3. For CONFIG.LOOT_TAB: fetch columns A:C (name, flavour, image).
//  4. For all other tabs: fetch column A only.
//  5. Flatten everything into ALL_TRAITS.
// ============================================================
function isConfigured() {
  return CONFIG.SHEET_ID !== 'YOUR_SHEET_ID_HERE' &&
         CONFIG.API_KEY  !== 'YOUR_API_KEY_HERE';
}

async function fetchSheetNames() {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}`
            + `?key=${CONFIG.API_KEY}&fields=sheets.properties.title`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Metadata fetch returned HTTP ${res.status}`);
  const json = await res.json();
  return (json.sheets || []).map(s => s.properties.title);
}

async function fetchColumnA(tabName) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}`
            + `/values/${encodeURIComponent(tabName)}!A:A?key=${CONFIG.API_KEY}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Tab "${tabName}" returned HTTP ${res.status}`);
  const json = await res.json();
  return (json.values || []).flat().map(v => String(v).trim()).filter(Boolean);
}

async function fetchLootTab(tabName) {
  // Fetches columns A:C to capture name, flavour text, and image data URI
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}`
            + `/values/${encodeURIComponent(tabName)}!A:C?key=${CONFIG.API_KEY}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Loot tab "${tabName}" returned HTTP ${res.status}`);
  const json = await res.json();
  return (json.values || [])
    .filter(row => row[0] && String(row[0]).trim())
    .map(row => ({
      value:   String(row[0] || '').trim(),
      sheet:   tabName,
      flavour: String(row[1] || '').trim(),
      image:   String(row[2] || '').trim(),
    }));
}

async function loadData() {
  if (!isConfigured()) {
    ALL_TRAITS = FALLBACK_TRAITS;
    dataSource = 'fallback';
    return;
  }
  try {
    const allTabNames = await fetchSheetNames();
    if (!allTabNames.length) throw new Error('No sheet tabs found');

    // Apply exclusion list
    const tabNames = allTabNames.filter(t => !CONFIG.EXCLUDE_TABS.includes(t));
    if (!tabNames.length) throw new Error('All tabs are excluded');

    // Split into loot tab and regular tabs
    const lootTabName = tabNames.find(t => t === CONFIG.LOOT_TAB);
    const otherTabs   = tabNames.filter(t => t !== CONFIG.LOOT_TAB);

    // Fetch everything in parallel
    const [lootEntries, ...otherResults] = await Promise.all([
      lootTabName ? fetchLootTab(lootTabName) : Promise.resolve([]),
      ...otherTabs.map(tab => fetchColumnA(tab)),
    ]);

    ALL_TRAITS = [];

    // Regular tabs — col A only, no extra fields
    otherTabs.forEach((tab, i) => {
      otherResults[i].forEach(val =>
        ALL_TRAITS.push({ value: val, sheet: tab, flavour: '', image: '' })
      );
    });

    // Loot tab — already shaped with flavour + image
    lootEntries.forEach(entry => ALL_TRAITS.push(entry));

    if (ALL_TRAITS.length === 0) throw new Error('All tabs were empty after filtering');
    dataSource = 'live';

  } catch (err) {
    console.warn('Sheets fetch failed — using fallback data.', err);
    ALL_TRAITS = FALLBACK_TRAITS;
    dataSource = 'fallback';
  }
}

// ============================================================
//  HELPERS
//  pickTrait() — random draw from ALL_TRAITS.
//  escHtml()   — sanitises text before inserting into innerHTML.
//  sourceBadgeHTML() — builds the live/fallback badge markup.
//  isLocked() / formatCountdown() — lockout state helpers.
// ============================================================
function pickTrait() {
  return ALL_TRAITS[Math.floor(Math.random() * ALL_TRAITS.length)];
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function sourceBadgeHTML() {
  const cls  = dataSource === 'live' ? 'live' : 'fallback';
  const text = dataSource === 'live'
    ? 'Live from Google Sheets'
    : isConfigured() ? 'Sheet unreachable — built-in data' : 'Using built-in data';
  return `<div class="source-badge ${cls}"><span class="dot"></span>${text}</div>`;
}

function isLocked() { return state.lockedAt !== null; }

function formatCountdown(ms) {
  if (ms <= 0) return '00:00';
  const s = Math.ceil(ms / 1000);
  return `${Math.floor(s / 60).toString().padStart(2, '0')}:${(s % 60).toString().padStart(2, '0')}`;
}

// ============================================================
//  INNER CONTENT HTML
//  Returns the HTML for inside .trait-scroll.
//  Switches between the standard big-text layout and the
//  full loot card layout depending on the current state.sheet.
// ============================================================
function innerContentHTML() {
  if (!state.value) {
    return `<div class="trait-display">
      <div class="trait-value">&nbsp;</div>
      <div class="trait-divider"></div>
      <div class="trait-source">&nbsp;</div>
    </div>`;
  }

  if (state.sheet === CONFIG.LOOT_TAB) {
    // ── Loot entry: show image + name + flavour text ──────
    const imgSlot = state.image
      ? `<div class="loot-image-slot has-image">
           <img src="${state.image}" alt="${escHtml(state.value)}" />
         </div>`
      : `<div class="loot-image-slot">
           <span class="slot-icon">✨</span>
         </div>`;

    const flavourBlock = state.flavour
      ? `<div>
           <div class="loot-flavour-label">Description</div>
           <div class="loot-flavour">${escHtml(state.flavour)}</div>
         </div>`
      : '';

    return `<div class="loot-display">
      ${imgSlot}
      <div>
        <div class="loot-name-label">Magic Item</div>
        <div class="loot-name">${escHtml(state.value)}</div>
      </div>
      <div class="loot-card-divider"></div>
      ${flavourBlock}
      <div class="loot-source">from: ${escHtml(state.sheet)}</div>
    </div>`;
  }

  // ── Standard trait entry: big centred text ────────────
  return `<div class="trait-display">
    <div class="trait-value">${escHtml(state.value)}</div>
    <div class="trait-divider"></div>
    <div class="trait-source">from: ${escHtml(state.sheet)}</div>
  </div>`;
}

// ============================================================
//  COUNTDOWN — copied exactly from chargen.html
// ============================================================
function startCountdown() {
  if (countdownInterval) clearInterval(countdownInterval);
  countdownInterval = setInterval(() => {
    const el = document.getElementById('lock-countdown');
    if (!el) { clearInterval(countdownInterval); return; }
    const remaining = LOCK_DURATION - (Date.now() - state.lockedAt);
    if (remaining <= 0) {
      clearInterval(countdownInterval);
      clearSession();
      state = { rolled: false, mulligans: MAX_MULLIGANS, value: '', sheet: '', flavour: '', image: '', lockedAt: null };
      doRoll();
    } else {
      el.textContent = formatCountdown(remaining);
    }
  }, 1000);
}

// ============================================================
//  RENDER
//  Builds the entire DOM from state and writes to #app.
//  Switches layout between standard trait text and loot card
//  depending on whether the current roll is from CONFIG.LOOT_TAB.
//  To change the card layout, edit the template literals here.
// ============================================================
function render() {
  const app    = document.getElementById('app');
  const locked = isLocked();

  const pips = Array.from({ length: MAX_MULLIGANS }, (_, i) =>
    `<div class="pip${i >= state.mulligans ? ' spent' : ''}"></div>`
  ).join('');

  let ctaHTML;
  if (locked) {
    const remaining = LOCK_DURATION - (Date.now() - state.lockedAt);
    ctaHTML = `<div class="lock-notice">
      <span class="lock-msg">Out of rolls! Check back in</span>
      <span class="lock-countdown" id="lock-countdown">${formatCountdown(remaining)}</span>
    </div>`;
  } else {
    ctaHTML = `<button class="roll-btn" id="roll-btn" onclick="doRoll()"
      ${state.mulligans > 0 ? '' : 'disabled'}>
      <span class="die" id="die-icon">⚄</span>&nbsp; Draw a Trait
    </button>`;
  }

  app.innerHTML = `
    <div class="mulligan-bar">
      Mulligans &nbsp;<div class="pip-row">${pips}</div>
    </div>
    <div class="trait-card">
      <div class="trait-scroll" id="trait-scroll">
        ${innerContentHTML()}
      </div>
      <div class="card-footer">
        ${ctaHTML}
        ${sourceBadgeHTML()}
      </div>
    </div>`;

  if (locked) {
    startCountdown();
    // ================================================================
    // DEV: Inject Reset button into header while locked.
    // To remove: delete this entire block.
    // ================================================================
    const hdr = document.querySelector('header');
    if (hdr && !hdr.querySelector('.reset-btn')) {
      const btn = document.createElement('button');
      btn.className   = 'reset-btn';
      btn.textContent = 'Reset';
      btn.onclick     = devReset;
      hdr.appendChild(btn);
    }
    // ================================================================
    // END DEV RESET INJECTION
    // ================================================================
  } else {
    const existing = document.querySelector('.reset-btn');
    if (existing) existing.remove();
  }
}

// ============================================================
//  ACTIONS
//  doRoll()  — picks a trait, decrements mulligan, saves session.
//  devReset() — dev-only: wipes session and re-rolls immediately.
// ============================================================
function doRoll() {
  if (isLocked()) return;
  if (state.rolled && state.mulligans <= 0) return;

  if (state.rolled) state.mulligans--;

  // Fade out whatever is currently showing, then swap
  const scrollEl  = document.getElementById('trait-scroll');
  const fadeTarget = scrollEl
    ? scrollEl.querySelector('.trait-display, .loot-display')
    : null;
  const dieEl = document.getElementById('die-icon');

  if (fadeTarget) fadeTarget.classList.add('fading');
  if (dieEl)      dieEl.classList.add('spinning');

  setTimeout(() => {
    const picked  = pickTrait();
    state.rolled  = true;
    state.value   = picked.value;
    state.sheet   = picked.sheet;
    state.flavour = picked.flavour || '';
    state.image   = picked.image   || '';
    if (state.mulligans === 0) state.lockedAt = Date.now();
    saveSession();

    // Full re-render so the layout can switch between trait and loot views
    render();

    // Scroll back to top in case a loot entry was taller than the screen
    const newScroll = document.getElementById('trait-scroll');
    if (newScroll) newScroll.scrollTop = 0;

  }, 200);
}

// ================================================================
// DEV RESET FUNCTION
// Remove this function (and .reset-btn CSS and injection block) before live show.
// ================================================================
function devReset() {
  clearInterval(countdownInterval);
  clearSession();
  state = { rolled: false, mulligans: MAX_MULLIGANS, value: '', sheet: '', flavour: '', image: '', lockedAt: null };
  const existing = document.querySelector('.reset-btn');
  if (existing) existing.remove();
  doRoll();
}
// ================================================================
// END DEV RESET FUNCTION
// ================================================================

// ============================================================
//  BOOT
//  Entry point. Loads data, then restores session or auto-rolls.
// ============================================================
loadData().then(() => {
  const restored = loadSession();
  if (restored) {
    render();
    if (isLocked()) startCountdown();
  } else {
    doRoll();
  }
});

// ── Theme toggle ──────────────────────────────
function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  try { localStorage.setItem('vaultTheme', next); } catch(e) {}
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️' : '🌙';
}
(function(){
  const t = document.documentElement.getAttribute('data-theme') || 'dark';
  const btn = document.getElementById('themeBtn');
  if (btn) btn.textContent = t === 'dark' ? '☀️' : '🌙';
})();
</script>
