<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<title>No Dice &mdash; Combat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<!-- Shared styles (colours, fonts, buttons, badges, animations) -->
<link rel="stylesheet" href="styles.css">
<!-- Prevent theme flash: apply saved theme before first paint -->
<script>try{var _t=localStorage.getItem('vaultTheme')||'dark';if(_t!=='dark'&&_t!=='light'&&_t!=='nodice')_t='dark';document.documentElement.setAttribute('data-theme',_t);}catch(e){document.documentElement.setAttribute('data-theme','dark');}</script>

<style>
  /* ─────────────────────────────────────────────────
     FIXED FRAME LAYOUT
     One outer frame. Never resizes. All screens live
     inside it as flex children filling the full height.
     The combat log in each screen takes flex:1 so it
     absorbs leftover space rather than pushing the frame.
  ───────────────────────────────────────────────── */
  html, body {
    height: 100%;
    margin: 0;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 12px 14px;
  }

  /* The frame — fixed dimensions, never redraws */
  .combat-frame {
    width: min(480px, 100%);
    height: min(700px, calc(100dvh - 24px));
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: 0 2px 14px var(--shadow);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    flex-shrink: 0;
  }

  /* Header — inside the frame, never varies */
  .frame-header {
    flex-shrink: 0;
    text-align: center;
    padding: 10px 14px 6px;
    background: var(--card-bg);
    position: relative;
  }
  /* Full-bleed divider — pseudo-element ignores padding, runs edge to edge */
  .frame-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: var(--border);
  }
  /* .site-label, h1 span, .subtitle come from styles.css */
  .frame-header h1 { font-size: 1rem; }

  /* Footer — inside the frame, pinned to bottom */
  .frame-footer {
    flex-shrink: 0;
    text-align: center;
    padding: 6px 0 8px;
    background: var(--card-bg);
    position: relative;
  }
  .frame-footer::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: var(--border);
  }

  /* Screens — each fills all remaining frame space */
  .screen {
    display: none;
    flex: 1;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }
  .screen.active { display: flex; }

  /* combat-card-body: the gold-tinted upper section */
  .combat-card-body {
    background: rgba(201,168,76,.05);
    flex-shrink: 0;
  }

  /* .card-footer — pinned at bottom of each screen */
  .card-footer {
    flex-shrink: 0;
    padding: 10px 14px 12px;
    border-top: 1px solid var(--border);
    background: var(--card-bg);
  }

  /* ────────────────────────────────────────────────
     HUB SCREEN — centered in frame
  ──────────────────────────────────────────────── */
  #hubScreen {
    justify-content: center;
    padding: 24px 0;
    background: rgba(201,168,76,.03);
  }
  .hub-actions {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 26px 22px 18px;
  }
  .btn-large {
    width: 100%;
    padding: 16px 14px;
    font-size: 1rem;
  }
  .vs-player-btn {
    opacity: 0.4;
    cursor: not-allowed;
    position: relative;
  }
  .vs-player-btn::after {
    content: 'v2';
    position: absolute;
    top: 6px; right: 10px;
    font-size: 0.55rem;
    background: var(--gold);
    color: var(--ink);
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .kill-tally {
    text-align: center;
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    background: rgba(201,168,76,.04);
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .kill-tally strong {
    color: var(--gold);
    font-size: 1.1rem;
    margin-left: 8px;
  }

  /* ────────────────────────────────────────────────
     COMBATANT REVEAL — compact top strip
  ──────────────────────────────────────────────── */
  .combatant-reveal {
    text-align: center;
    padding: 14px 14px 6px;
    position: relative;
  }
  .enemy-emoji {
    font-size: 2.8rem;
    display: inline-block;
    line-height: 1;
    margin-bottom: 6px;
    animation: slideUp .4s ease both;
    transition: transform .25s ease, opacity .25s ease;
  }
  .enemy-emoji.hit { animation: hitJitter .35s ease; }
  .enemy-emoji.fallen {
    animation: hitJitter .45s ease, deathFade .6s ease .45s forwards;
  }
  @keyframes hitJitter {
    0%,100% { transform: translateX(0) rotate(0); }
    15%     { transform: translateX(-6px) rotate(-4deg); }
    30%     { transform: translateX(5px) rotate(3deg); }
    45%     { transform: translateX(-4px) rotate(-2deg); }
    60%     { transform: translateX(3px) rotate(2deg); }
    80%     { transform: translateX(-1px) rotate(0); }
  }
  @keyframes deathFade {
    0%   { opacity: 1; filter: none; }
    100% { opacity: 0.55; filter: grayscale(0.6); }
  }
  .enemy-name {
    font-family: 'Cinzel', serif;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 0.03em;
    line-height: 1.2;
  }
  .enemy-name.fallen { color: var(--muted); text-decoration: line-through; text-decoration-color: rgba(201,168,76,0.4); }
  .kill-counter-inline {
    position: absolute;
    top: 8px; right: 12px;
    font-family: 'Cinzel', serif;
    font-size: 0.58rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 3px 8px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--card-bg);
  }
  .kill-counter-inline strong { color: var(--gold); margin-left: 4px; }

  .turn-label {
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    text-align: center;
    min-height: 0.9rem;
    margin-top: 2px;
  }
  .subtext {
    font-family: 'Lato', sans-serif;
    font-style: italic;
    font-size: 0.72rem;
    color: var(--muted);
    text-align: center;
  }

  /* ── HP display (coin pips) ── */
  .hp-display {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 6px 12px;
    min-height: 26px;
  }
  .hp-label {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-right: 6px;
  }
  .hp-coin {
    display: inline-block;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #e2bc6a, var(--gold) 60%, var(--gold-dim));
    box-shadow: 0 1px 3px rgba(201,168,76,0.35), inset 0 1px 0 rgba(255,255,255,0.25);
    transition: opacity 0.35s, transform 0.35s, background 0.35s, box-shadow 0.35s;
  }
  .hp-coin.lost {
    background: transparent;
    box-shadow: inset 0 0 0 1.5px var(--border);
    transform: scale(0.75);
  }

  /* ────────────────────────────────────────────────
     COIN STAGE + ANIMATION
     Coin rests on the rolling actor's HP pip between turns.
     JS transitions (getBoundingClientRect) drive all travel;
     the .animating class only triggers the inner face-flip.
  ──────────────────────────────────────────────── */
  .coin-stage {
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0;
    position: relative;
    overflow: visible;
  }
  .combat-coin {
    width: 90px;
    height: 90px;
    position: relative;
    transform-origin: center;
  }
  .combat-coin.animating .face {
    animation: coinFlip 0.11s linear 4;
    animation-fill-mode: forwards;
  }

  .face {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .face::before {
    content: ''; position: absolute; inset: 3px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,.18);
    pointer-events: none; z-index: 1;
  }
  .face-mystery {
    background: radial-gradient(circle at 38% 32%, #e2bc6a, var(--gold) 55%, var(--gold-dim));
    box-shadow: inset 0 0 0 4px rgba(255,255,255,.15), 0 4px 18px rgba(201,168,76,.4);
  }
  .face-fail {
    background: #000;
    box-shadow: 0 4px 18px rgba(192,57,43,.45);
  }
  .face-pass {
    background: #000;
    box-shadow: 0 4px 18px rgba(39,174,96,.45);
  }
  .face img {
    width: 100%; height: 100%;
    object-fit: cover; border-radius: 50%;
    position: relative; z-index: 2;
    display: block;
  }
  .face-mystery svg { width: 100%; height: 100%; position: relative; z-index: 2; }

  @keyframes coinFlip {
    0%   { transform: scaleX(1); }
    50%  { transform: scaleX(0); }
    100% { transform: scaleX(1); }
  }

  /* ── Result banner (Go Time / No Time) ── */
  .result-banner {
    font-family: 'Cinzel', serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    min-height: 1.3rem;
    text-align: center;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.35s, transform 0.35s;
  }
  .result-banner.visible { opacity: 1; transform: translateY(0); }
  .result-banner.pass { color: var(--pass-grn); }
  .result-banner.fail { color: var(--fail-red); }

  /* ────────────────────────────────────────────────
     COMBAT LOG — fills all remaining frame space
     flex:1 + min-height:0 is the key: the log grows
     to fill whatever height is left after fixed-height
     siblings, and scrolls internally rather than
     pushing the frame taller.
  ──────────────────────────────────────────────── */
  /* ────────────────────────────────────────────────
     COMBAT LOG — title pinned above scroll area
     .combat-log       = outer flex column, no scroll
     .combat-log-title = static header, never scrolls
     .combat-log-entries = the only scrolling element
  ──────────────────────────────────────────────── */
  .combat-log {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    background: var(--card-bg);
  }
  .combat-log-title {
    flex-shrink: 0;
    font-family: 'Cinzel', serif;
    font-size: 0.56rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--gold-dim);
    padding: 8px 14px 6px;
    border-bottom: 1px solid var(--border);
    background: var(--card-bg);
  }
  .combat-log-entries {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 8px 14px 10px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .combat-log-entries::-webkit-scrollbar { width: 4px; }
  .combat-log-entries::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .combat-log-entry {
    font-family: 'Lato', sans-serif;
    font-size: 0.78rem;
    font-weight: 400;
    color: var(--muted);
    line-height: 1.4;
    padding: 3px 0;
    animation: logEntryIn .3s ease both;
  }
  .combat-log-entry .actor {
    font-weight: 700;
    color: var(--ink);
  }
  .combat-log-entry.system {
    font-style: italic;
    color: var(--gold-dim);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
  }
  .combat-log-entry.hit  .outcome { color: var(--pass-grn); font-weight: 700; }
  .combat-log-entry.miss .outcome { color: var(--fail-red); font-weight: 700; }
  .combat-log-entry.death {
    font-weight: 700;
    color: var(--ink);
    border-left: 3px solid var(--gold);
    padding: 5px 8px;
    background: rgba(201,168,76,0.08);
    border-radius: 0 4px 4px 0;
    margin: 2px 0;
  }
  .combat-log-entry.killing-blow {
    border-left-color: var(--fail-red);
    background: rgba(192,57,43,0.06);
  }
  .combat-log-entry.killing-blow .actor { color: var(--fail-red); }
  @keyframes logEntryIn {
    0%   { opacity: 0; transform: translateY(6px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* ────────────────────────────────────────────────
     DEATH SCREENS
  ──────────────────────────────────────────────── */
  .death-card {
    text-align: center;
    padding: 26px 22px 18px;
  }
  .death-icon {
    font-size: 3.6rem;
    margin-bottom: 8px;
    display: block;
    animation: slideUp .5s ease both;
  }
  .death-title {
    font-family: 'Cinzel', serif;
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: 0.03em;
    margin-bottom: 8px;
  }
  .death-title.player { color: var(--fail-red); }
  .death-title.enemy  { color: var(--gold); }
  .death-subtitle {
    font-family: 'Lato', sans-serif;
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.5;
    margin-bottom: 10px;
  }
  .death-subtitle strong { color: var(--gold); font-weight: 700; }

  .killing-blow-box {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    margin: 10px 0 0;
    background: var(--gold-bg);
    text-align: left;
  }
  .killing-blow-box .label {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 4px;
  }
  .killing-blow-box .text {
    font-family: 'Lato', sans-serif;
    font-size: 0.85rem;
    color: var(--ink);
    line-height: 1.45;
  }

  /* ── Rise Again button — holy glow ── */
  .btn-rise-again {
    width: 100%;
    position: relative;
    background: linear-gradient(135deg, var(--gold) 0%, #e2bc6a 50%, var(--gold) 100%);
    color: var(--ink);
    border: none;
    border-radius: 10px;
    padding: 14px 18px;
    font-family: 'Cinzel', serif;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.2s ease;
  }
  .btn-rise-again.visible {
    opacity: 1;
    pointer-events: auto;
    animation: holyGlow 2.4s ease-in-out infinite;
  }
  @keyframes holyGlow {
    0%, 100% {
      box-shadow:
        0 0 20px rgba(201,168,76,0.55),
        0 0 40px rgba(201,168,76,0.28),
        inset 0 1px 0 rgba(255,255,255,0.4);
    }
    50% {
      box-shadow:
        0 0 32px rgba(201,168,76,0.85),
        0 0 64px rgba(201,168,76,0.45),
        inset 0 1px 0 rgba(255,255,255,0.5);
    }
  }

  /* ── Source badge (from styles.css) + local position ── */
  .source-badge { align-self: center; margin-top: 4px; }

  /* Roll button — gold gradient when active, same visual weight as Rise Again.
     Overrides btn-primary's ink background so it's unmissable in both themes. */
  #btnCombatRoll:not(:disabled) {
    background: linear-gradient(135deg, var(--gold) 0%, #e2bc6a 50%, var(--gold) 100%);
    color: #1a1a2e;
    box-shadow: 0 3px 10px rgba(201,168,76,.35), inset 0 1px 0 rgba(255,255,255,.4);
    transition: opacity .2s, transform .1s, box-shadow .2s;
  }
  #btnCombatRoll:not(:disabled):hover {
    box-shadow: 0 5px 16px rgba(201,168,76,.5), inset 0 1px 0 rgba(255,255,255,.4);
    transform: translateY(-1px);
  }
  #btnCombatRoll:not(:disabled):active { transform: scale(.98); }

  /* ── Inline spinner (for button loading state) ── */
  .spinner-inline {
    display: inline-block;
    width: 0.9em; height: 0.9em;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: -2px;
    margin-right: 6px;
  }

  /* ── Footer ── */
  /* .nav-link comes from styles.css */
  footer {
    padding: 8px 0 14px;
    text-align: center;
  }

  /* @keyframes cardIn, spin, slideUp come from styles.css */
</style>
</head>
<body>

<!-- Theme toggle — sun/moon light/dark switch (CSS in styles.css) -->
<button id="themeBtn" class="theme-toggle-btn" onclick="toggleTheme()" aria-label="Toggle light/dark mode"></button>

<!-- ============================================
     COMBAT FRAME — one fixed container.
     All screens live inside here. It never resizes.
     ============================================ -->
<div class="combat-frame">

  <!-- ── Frame header — always visible ── -->
  <header class="frame-header">
    <p class="site-label">No Dice &mdash; Improv RPG</p>
    <h1><span>Combat</span></h1>
    <p class="subtitle">Rise. Fight. Fall.</p>
  </header>

  <!-- ============================================
       HUB SCREEN — entry point
       ============================================ -->
  <section id="hubScreen" class="screen active">
    <div class="hub-actions">
      <button id="btnBegin" class="btn-primary btn-large">Begin Combat</button>
      <button class="btn-primary btn-large vs-player-btn" disabled>VS. Player</button>
    </div>
    <div class="kill-tally">
      Enemies Felled<strong id="hubKillCount">0</strong>
    </div>
  </section>

  <!-- ============================================
       COMBAT SCREEN — unified initiative + active combat
       ============================================ -->
  <section id="combatScreen" class="screen">
    <div class="combat-card-body">
      <div class="combatant-reveal">
        <div class="kill-counter-inline">Felled<strong id="combatKillCount">0</strong></div>
        <span class="enemy-emoji" id="combatEmoji">🧌</span>
        <div class="enemy-name" id="combatName">Goblin</div>
      </div>
      <div class="hp-display" id="enemyHP">
        <span class="hp-label">HP</span>
      </div>
      <div class="coin-stage">
        <div class="combat-coin" id="combatCoin">
          <div class="face face-mystery" id="combatCoinFace"></div>
        </div>
      </div>
      <div class="turn-label" id="combatTurnLabel">Rolling for initiative</div>
      <div class="result-banner" id="combatResult"></div>
      <div class="hp-display" id="playerHP">
        <span class="hp-label">You</span>
      </div>
    </div>
    <div class="combat-log">
      <div class="combat-log-title">Combat Log</div>
      <div class="combat-log-entries" id="combatLogEntries"></div>
    </div>
    <div class="card-footer">
      <button id="btnCombatRoll" class="btn-primary">Roll for Initiative</button>
      <div id="combatSourceBadge"></div>
    </div>
  </section>

  <!-- ============================================
       PLAYER DEATH SCREEN
       ============================================ -->
  <section id="playerDeathScreen" class="screen">
    <div class="death-card">
      <span class="death-icon">☠️</span>
      <div class="death-title player">You Have Fallen</div>
      <div class="death-subtitle">
        Enemies felled this session: <strong id="pdKillCount">0</strong>
      </div>
      <div class="killing-blow-box">
        <div class="label">Killing Blow</div>
        <div class="text" id="killingBlowText">&mdash;</div>
      </div>
    </div>
    <div class="combat-log">
      <div class="combat-log-title">Combat Log</div>
      <div class="combat-log-entries" id="playerDeathLog"></div>
    </div>
    <div class="card-footer">
      <button id="btnRiseAgain" class="btn-rise-again">Rise, Again!</button>
    </div>
  </section>

  <!-- ── Frame footer — always visible ── -->
  <footer class="frame-footer">
    <a class="nav-link" href="index.html">&larr; Back to the Vault</a>
  </footer>

</div>

<script>
// ============================================================
//  NO DICE — COMBAT ENGINE v1
//  Turn-based d2 combat. Player vs random enemy.
//  Google Sheets primary source · hardcoded fallback.
//  Firebase (v2) will enable Vs. Player multiplayer.
// ============================================================

// ============================================================
//  CONFIGURATION
//  ► Change SHEET_ID + API_KEY to point to your own sheet.
//  ► Expected tab: `Enemies`
//  ► Columns: A = Name, B = Coins (1-9), C = Artwork (emoji or URL)
//  ► If unconfigured or fetch fails, ENEMY_ROSTER_FALLBACK is used.
// ============================================================
const CONFIG = {
  SHEET_ID: 'YOUR_SHEET_ID_HERE',
  API_KEY:  'YOUR_API_KEY_HERE',

// ============================================================
//  ENEMY ROSTER — HARDCODED FALLBACK
//  Used if Google Sheets is unreachable or not configured.
//  Matches the v1 starter roster (5 enemies, spread 1–4 coins).
// ============================================================
const ENEMY_ROSTER_FALLBACK = [
  { name: 'Goblin',    coins: 1, artwork: '🧌' },
  { name: 'Skeleton',  coins: 1, artwork: '💀' },
  { name: 'Orc',       coins: 2, artwork: '👹' },
  { name: 'Dire Wolf', coins: 2, artwork: '🐺' },
  { name: 'Dragon',    coins: 4, artwork: '🐉' },
];

// ============================================================
//  STATE
// ============================================================
let ENEMY_ROSTER   = null;        // populated by loadRoster()
let rosterSource   = 'fallback';  // 'live' | 'fallback'
let rosterLoaded   = false;       // session cache — fetch once

let combatState = createFreshState();

function createFreshState() {
  return {
    player: { maxCoins: 1, currentCoins: 1, isAlive: true },
    enemy:  { name: '', coins: 1, artwork: '', maxCoins: 1, currentCoins: 1, isAlive: true },
    phase: 'initiative',          // 'initiative' | 'active'
    currentTurn: 'player',
    initiativeWinner: null,
    combatLog: [],
    enemiesKilled: 0,
    isRolling: false,
  };
}


// ============================================================
//  GOOGLE SHEETS FETCH (primary source)
//  Pattern matches chargen.html / traitgen.html.
//  Fetched ONCE per session (rosterLoaded cache), not per combat.
// ============================================================
function isConfigured() {
  return CONFIG.SHEET_ID !== 'YOUR_SHEET_ID_HERE' &&
         CONFIG.API_KEY  !== 'YOUR_API_KEY_HERE';
}

async function fetchEnemyRoster() {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}`
            + `/values/${encodeURIComponent(CONFIG.TAB)}!A2:C?key=${CONFIG.API_KEY}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  const rows = json.values || [];
  const roster = rows
    .filter(r => r[0] && String(r[0]).trim())
    .map(r => ({
      name:    String(r[0] || '').trim(),
      coins:   Math.max(1, Math.min(9, parseInt(r[1]) || 1)),
      artwork: String(r[2] || '').trim() || '❓',
    }));
  if (!roster.length) throw new Error('Empty roster');
  return roster;
}

async function loadRoster() {
  if (rosterLoaded) return;
  if (!isConfigured()) {
    ENEMY_ROSTER = ENEMY_ROSTER_FALLBACK;
    rosterSource = 'fallback';
    rosterLoaded = true;
    return;
  }
  try {
    ENEMY_ROSTER = await fetchEnemyRoster();
    rosterSource = 'live';
  } catch (err) {
    console.warn('Sheets fetch failed — using fallback roster.', err);
    ENEMY_ROSTER = ENEMY_ROSTER_FALLBACK;
    rosterSource = 'fallback';
  }
  rosterLoaded = true;
}

function sourceBadgeHTML() {
  const cls = rosterSource === 'live' ? 'live' : 'fallback';
  const text = rosterSource === 'live'
    ? 'Live from Google Sheets'
    : isConfigured() ? 'Sheet unreachable — built-in roster' : 'Using built-in roster';
  return `<div class="source-badge ${cls}"><span class="dot"></span>${text}</div>`;
}

function selectRandomEnemy() {
  const pool = ENEMY_ROSTER || ENEMY_ROSTER_FALLBACK;
  return { ...pool[Math.floor(Math.random() * pool.length)] };
}

// ============================================================
//  HELPERS
// ============================================================
function sleep(ms) { return new Promise(res => setTimeout(res, ms)); }

function rollD2() { return Math.random() < 0.5 ? 'pass' : 'fail'; }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ============================================================
//  COIN ANIMATION + FACES
// ============================================================
function setFace(el, outcome) {
  el.className = 'face';
  if (outcome === 'pass') {
    el.classList.add('face-pass');
    el.innerHTML = `<img src="${PASS_IMG}" alt="Go Time">`;
  } else if (outcome === 'fail') {
    el.classList.add('face-fail');
    el.innerHTML = `<img src="${FAIL_IMG}" alt="No Time">`;
  } else {
    el.classList.add('face-mystery');
    el.innerHTML = MYSTERY_SVG;
  }
}

// Returns {dx, dy, scale} needed to place the coin's centre over the first
// alive HP pip for the given actor.  Falls back to {0,0,1} (stage centre)
// if no pip exists yet (e.g. called before renderHP).
function getPipOffset(actor) {
  const coinEl = document.getElementById('combatCoin');
  const hpId   = actor === 'player' ? 'playerHP' : 'enemyHP';
  const pip    = document.querySelector(`#${hpId} .hp-coin:not(.lost)`)
              || document.querySelector(`#${hpId} .hp-coin`);
  if (!pip) return { dx: 0, dy: 0, scale: 1 };
  const cr = coinEl.getBoundingClientRect();
  const pr = pip.getBoundingClientRect();
  return {
    dx:    (pr.left + pr.width  / 2) - (cr.left + cr.width  / 2),
    dy:    (pr.top  + pr.height / 2) - (cr.top  + cr.height / 2),
    scale: pr.width / cr.width,
  };
}

// Instantly parks the coin over the actor's HP pip (no animation).
// Call after renderHP so the pip elements exist in the DOM.
function snapCoinToPip(actor) {
  const coinEl = document.getElementById('combatCoin');
  const { dx, dy, scale } = getPipOffset(actor);
  coinEl.style.transition = 'none';
  coinEl.style.transform  = `translate(${dx}px,${dy}px) scale(${scale})`;
}

// Coin lifts from the actor's HP pip → travels to the centre stage →
// holds showing the result face → returns to the pip.  Total ≈ 1.28 s.
function animateCoinRoll(coinEl, faceEl, outcome, actor = 'player') {
  const TRAVEL_IN  = 420;   // ms  pip → centre (coin grows, spins)
  const HOLD       = 520;   // ms  held at centre showing result face
  const TRAVEL_OUT = 340;   // ms  centre → pip (coin shrinks back)

  return new Promise((resolve) => {
    // Snap to pip start position (instant, no transition)
    const { dx, dy, scale } = getPipOffset(actor);
    coinEl.style.transition = 'none';
    coinEl.style.transform  = `translate(${dx}px,${dy}px) scale(${scale})`;

    setFace(faceEl, 'mystery');
    coinEl.classList.remove('animating');
    void coinEl.offsetWidth; // flush reflow so CSS animation re-triggers

    // .animating kicks off the 4-flip face-flip CSS animation
    coinEl.classList.add('animating');

    // Phase 1 — fly to centre stage (two rAF ticks let the snap settle first)
    requestAnimationFrame(() => requestAnimationFrame(() => {
      coinEl.style.transition = `transform ${TRAVEL_IN}ms cubic-bezier(0.22,1,0.36,1)`;
      coinEl.style.transform  = 'translate(0,0) scale(1)';
    }));

    // Reveal result face at ~75 % of travel (coin is edge-on mid-flip)
    setTimeout(() => setFace(faceEl, outcome), (TRAVEL_IN * 0.75) | 0);

    // Phase 2 → Phase 3 — after hold, return to pip
    setTimeout(() => {
      const { dx: rx, dy: ry, scale: rs } = getPipOffset(actor);
      coinEl.style.transition = `transform ${TRAVEL_OUT}ms cubic-bezier(0.64,0,0.78,0)`;
      coinEl.style.transform  = `translate(${rx}px,${ry}px) scale(${rs})`;

      setTimeout(() => {
        coinEl.classList.remove('animating');
        coinEl.style.transition = '';
        resolve();
      }, TRAVEL_OUT);
    }, TRAVEL_IN + HOLD);
  });
}

function showResultBanner(bannerEl, outcome) {
  bannerEl.className = 'result-banner visible ' + outcome;
  bannerEl.textContent = outcome === 'pass' ? 'Go Time!' : 'No Time.';
}

function hideResultBanner(bannerEl) {
  bannerEl.className = 'result-banner';
  bannerEl.textContent = '';
}

// ============================================================
//  HP DISPLAY
//  Renders coin pips into the given container, preserving any
//  existing .hp-label child.
// ============================================================
function renderHP(containerId, current, max) {
  const el = document.getElementById(containerId);
  el.querySelectorAll('.hp-coin').forEach(c => c.remove());
  for (let i = 0; i < max; i++) {
    const coin = document.createElement('span');
    coin.className = 'hp-coin' + (i >= current ? ' lost' : '');
    el.appendChild(coin);
  }
}

// ============================================================
//  COMBAT LOG — rich entry system
//  Entries flow up from the bottom. Last 12 kept in memory
//  (log is scrollable so we can show more than before).
//
//  Entry shape: { kind, html, isKillingBlow? }
//    kind: 'system' | 'action' | 'hit' | 'miss' | 'death' | 'killing-blow'
// ============================================================
const LOG_MAX = 12;

function log(kind, html, isKillingBlow = false) {
  combatState.combatLog.push({ kind, html, isKillingBlow });
  if (combatState.combatLog.length > LOG_MAX) combatState.combatLog.shift();
  renderCombatLog('combatLogEntries');
}

// Semantic helpers — call these throughout combat for consistent phrasing.
const playerName = () => 'You';
const enemyName  = () => combatState.enemy.name || 'the foe';

function logSystem(text) {
  log('system', text);
}
function logBattleBegin() {
  log('system', `Battle begins &mdash; <span class="actor">${enemyName()}</span> approaches!`);
}
function logInitiativeCall() {
  log('system', 'Roll for initiative!');
}
function logInitiativeRoll(actor, outcome) {
  const name = actor === 'player' ? playerName() : enemyName();
  const faceText = outcome === 'pass' ? 'Go Time' : 'No Time';
  log('action', `<span class="actor">${name}</span> rolled <span class="outcome">${faceText}</span> for initiative.`);
}
function logInitiativeWinner(winner) {
  const name = winner === 'player' ? playerName() : enemyName();
  const verb = winner === 'player' ? 'strike' : 'strikes';
  log('system', `<span class="actor">${name}</span> ${verb} first!`);
}
function logAttack(actor) {
  const name = actor === 'player' ? playerName() : enemyName();
  const verb = actor === 'player' ? 'attacks' : 'swings';
  log('action', `<span class="actor">${name}</span> ${verb}!`);
}
function logRoll(actor, outcome, damage) {
  const name = actor === 'player' ? playerName() : enemyName();
  if (outcome === 'pass') {
    log('hit', `<span class="actor">${name}</span> rolled <span class="outcome">Go Time</span> &mdash; hit for ${damage}!`);
  } else {
    log('miss', `<span class="actor">${name}</span> rolled <span class="outcome">No Time</span> &mdash; miss.`);
  }
}
function logChain(actor) {
  const name = actor === 'player' ? playerName() : enemyName();
  log('system', `<span class="actor">${name}</span> rolls again!`);
}
function logTurnPass(toActor) {
  const name = toActor === 'player' ? playerName() : enemyName();
  log('system', `Turn passes to <span class="actor">${name}</span>.`);
}
function logDeath(actor, isKillingBlow = false) {
  const name = actor === 'player' ? playerName() : enemyName();
  const kind = isKillingBlow ? 'killing-blow' : 'death';
  const text = actor === 'player'
    ? `<span class="actor">${name}</span> have fallen.`
    : `<span class="actor">${name}</span> falls!`;
  log(kind, text, isKillingBlow);
}

function renderCombatLog(targetId) {
  const el = document.getElementById(targetId);
  if (!el) return;
  if (!combatState.combatLog.length) {
    el.innerHTML = '<div class="combat-log-entry system">&mdash; Combat awaits &mdash;</div>';
    return;
  }
  el.innerHTML = combatState.combatLog.map(entry => {
    let cls = 'combat-log-entry ' + entry.kind;
    if (entry.isKillingBlow) cls += ' killing-blow';
    return `<div class="${cls}">${entry.html}</div>`;
  }).join('');
  // auto-scroll to keep newest entry visible at the bottom
  el.scrollTop = el.scrollHeight;
}

// ============================================================
//  HUB — entry point
// ============================================================
function initHub() {
  document.getElementById('hubKillCount').textContent = combatState.enemiesKilled;
  const btn = document.getElementById('btnBegin');
  btn.disabled = false;
  btn.innerHTML = 'Begin Combat';
  showScreen('hubScreen');
}

function updateKillCounter() {
  document.getElementById('combatKillCount').textContent = combatState.enemiesKilled;
  document.getElementById('hubKillCount').textContent    = combatState.enemiesKilled;
}

// ============================================================
//  BEGIN COMBAT — fetches roster (first time only), picks enemy,
//  goes directly into the unified combat screen in the 'initiative' phase.
// ============================================================
async function handleBegin() {
  const btn = document.getElementById('btnBegin');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-inline"></span> Summoning enemy&hellip;';

  await loadRoster();

  const enemy = selectRandomEnemy();
  const killTally = combatState.enemiesKilled;
  combatState = createFreshState();
  combatState.enemiesKilled = killTally;
  combatState.enemy = {
    name:         enemy.name,
    coins:        enemy.coins,
    artwork:      enemy.artwork,
    maxCoins:     enemy.coins,
    currentCoins: enemy.coins,
    isAlive:      true,
  };

  enterCombat(/* freshEncounter */ true);

  btn.disabled = false;
  btn.innerHTML = 'Begin Combat';
}

// ============================================================
//  ENTER COMBAT — sets up the unified screen for a new encounter.
//  Always begins in 'initiative' phase. Player rolls once for
//  initiative; a 50/50 RNG decides the winner (no enemy roll shown,
//  no tie-reroll loop — keeps the UI snappy).
// ============================================================
function enterCombat(freshEncounter) {
  const emoji  = document.getElementById('combatEmoji');
  const nameEl = document.getElementById('combatName');

  emoji.classList.remove('fallen', 'hit');
  nameEl.classList.remove('fallen');
  emoji.textContent  = combatState.enemy.artwork;
  nameEl.textContent = combatState.enemy.name;

  renderHP('enemyHP',  combatState.enemy.currentCoins,  combatState.enemy.maxCoins);
  renderHP('playerHP', combatState.player.currentCoins, combatState.player.maxCoins);

  setFace(document.getElementById('combatCoinFace'), 'mystery');
  hideResultBanner(document.getElementById('combatResult'));

  document.getElementById('combatTurnLabel').textContent = 'Roll for initiative';
  document.getElementById('combatSourceBadge').innerHTML = sourceBadgeHTML();

  updateKillCounter();

  // Reset log only for a brand-new encounter (fresh Begin Combat).
  // After an inline enemy death the log persists for continuity.
  if (freshEncounter) {
    combatState.combatLog = [];
    renderCombatLog('combatLogEntries');
  }

  logBattleBegin();
  logInitiativeCall();

  const btn = document.getElementById('btnCombatRoll');
  btn.disabled = false;
  btn.textContent = 'Roll for Initiative';

  combatState.phase = 'initiative';
  combatState.isRolling = false;

  showScreen('combatScreen');
  // Park the coin on the player's pip once the screen is laid out
  requestAnimationFrame(() => snapCoinToPip('player'));
}

// ============================================================
//  ROLL DISPATCH — phase-aware. Single button does everything.
// ============================================================
async function handleCombatRoll() {
  if (combatState.isRolling) return;
  if (combatState.phase === 'initiative') {
    await rollInitiative();
  } else if (combatState.currentTurn === 'player') {
    await doTurn('player');
  }
}

// ============================================================
//  INITIATIVE — one visible player roll; winner is a 50/50 RNG.
//  The player's roll outcome is displayed/logged for drama, but
//  the initiative winner is independent (per spec: save cycles).
// ============================================================
async function rollInitiative() {
  combatState.isRolling = true;

  const btn    = document.getElementById('btnCombatRoll');
  const coin   = document.getElementById('combatCoin');
  const face   = document.getElementById('combatCoinFace');
  const banner = document.getElementById('combatResult');
  const label  = document.getElementById('combatTurnLabel');

  btn.disabled = true;
  hideResultBanner(banner);
  label.textContent = 'Your initiative roll';

  const playerRoll = rollD2();
  await animateCoinRoll(coin, face, playerRoll, 'player');
  showResultBanner(banner, playerRoll);
  logInitiativeRoll('player', playerRoll);

  await sleep(900);

  // 50/50 RNG for winner — independent of the displayed roll
  const winner = Math.random() < 0.5 ? 'player' : 'enemy';
  combatState.initiativeWinner = winner;
  combatState.currentTurn = winner;
  combatState.phase = 'active';

  if (winner === 'player') {
    label.textContent = 'You strike first!';
    banner.className = 'result-banner visible pass';
    banner.textContent = 'Initiative: You';
  } else {
    label.textContent = `${combatState.enemy.name} strikes first!`;
    banner.className = 'result-banner visible fail';
    banner.textContent = `Initiative: ${combatState.enemy.name}`;
  }
  logInitiativeWinner(winner);

  await sleep(1400);
  hideResultBanner(banner);
  combatState.isRolling = false;

  updateCombatTurnUI();

  // If the enemy won initiative, auto-start their first turn
  if (winner === 'enemy') {
    await sleep(400);
    doTurn('enemy');
  }
}

function updateCombatTurnUI() {
  const label = document.getElementById('combatTurnLabel');
  const btn   = document.getElementById('btnCombatRoll');
  if (combatState.currentTurn === 'player') {
    label.textContent = 'Your turn';
    btn.textContent = 'Roll';
    btn.disabled = false;
  } else {
    label.textContent = `${combatState.enemy.name}'s turn`;
    btn.innerHTML = `${combatState.enemy.name} rolls&hellip;`;
    btn.disabled = true;
  }
  // Move the resting coin to the incoming actor's pip
  snapCoinToPip(combatState.currentTurn);
}

// ============================================================
//  ACTIVE TURN — player or enemy rolls one d2.
//  Pass: deal 1 damage, chain (player taps again, enemy auto).
//  Fail: turn passes.
//  Enemy coin animation is inverted (comes from above).
// ============================================================
async function doTurn(actor) {
  if (combatState.isRolling) return;
  combatState.isRolling = true;

  const btn    = document.getElementById('btnCombatRoll');
  const coin   = document.getElementById('combatCoin');
  const face   = document.getElementById('combatCoinFace');
  const banner = document.getElementById('combatResult');
  const label  = document.getElementById('combatTurnLabel');

  btn.disabled = true;
  hideResultBanner(banner);
  label.textContent = actor === 'player'
    ? 'You attack!'
    : `${combatState.enemy.name} swings!`;
  logAttack(actor);

  const outcome = rollD2();
  await animateCoinRoll(coin, face, outcome, actor);
  showResultBanner(banner, outcome);

  let damage = 0;
  let killed = false;

  if (outcome === 'pass') {
    damage = 1;
    if (actor === 'player') {
      combatState.enemy.currentCoins = Math.max(0, combatState.enemy.currentCoins - damage);
      renderHP('enemyHP', combatState.enemy.currentCoins, combatState.enemy.maxCoins);
      // visual hit shake on enemy emoji
      const emoji = document.getElementById('combatEmoji');
      emoji.classList.remove('hit'); void emoji.offsetWidth; emoji.classList.add('hit');
      if (combatState.enemy.currentCoins <= 0) {
        combatState.enemy.isAlive = false;
        killed = true;
      }
    } else {
      combatState.player.currentCoins = Math.max(0, combatState.player.currentCoins - damage);
      renderHP('playerHP', combatState.player.currentCoins, combatState.player.maxCoins);
      if (combatState.player.currentCoins <= 0) {
        combatState.player.isAlive = false;
        killed = true;
      }
    }
  }

  logRoll(actor, outcome, damage);

  await sleep(900);

  // Resolve
  if (killed) {
    combatState.isRolling = false;
    if (actor === 'player') {
      logDeath('enemy', /* isKillingBlow */ true);
      await runEnemyDeath();
    } else {
      logDeath('player', /* isKillingBlow */ true);
      showPlayerDeathScreen();
    }
    return;
  }

  hideResultBanner(banner);

  if (outcome === 'pass') {
    // Chain — same actor rolls again
    logChain(actor);
    combatState.isRolling = false;
    if (actor === 'player') {
      label.textContent = 'Roll again!';
      btn.textContent = 'Roll Again';
      btn.disabled = false;
    } else {
      await sleep(400);
      doTurn('enemy');
    }
  } else {
    // Turn passes
    const nextActor = actor === 'player' ? 'enemy' : 'player';
    combatState.currentTurn = nextActor;
    combatState.isRolling = false;
    logTurnPass(nextActor);
    updateCombatTurnUI();
    if (nextActor === 'enemy') {
      await sleep(600);
      doTurn('enemy');
    }
  }
}

// ============================================================
//  INLINE ENEMY DEATH
//  No screen change — emoji shakes + fades to gravestone, beat
//  of stillness, then next enemy materialises and we drop back
//  into the initiative phase on the same screen.
// ============================================================
async function runEnemyDeath() {
  const emoji  = document.getElementById('combatEmoji');
  const nameEl = document.getElementById('combatName');
  const label  = document.getElementById('combatTurnLabel');
  const banner = document.getElementById('combatResult');
  const btn    = document.getElementById('btnCombatRoll');

  btn.disabled = true;
  btn.textContent = 'Victory&hellip;';
  label.textContent = `${combatState.enemy.name} is slain`;
  hideResultBanner(banner);

  // 1. Jitter + fade + name strikethrough
  emoji.classList.add('fallen');
  nameEl.classList.add('fallen');

  await sleep(900);

  // 2. Swap to gravestone (still in fallen state — keeps the desaturation)
  emoji.textContent = '🪦';

  await sleep(1100);

  // 3. Increment tally, pick next enemy, reset player HP, back to initiative
  combatState.enemiesKilled++;

  const nextEnemy = selectRandomEnemy();
  combatState.enemy = {
    name:         nextEnemy.name,
    coins:        nextEnemy.coins,
    artwork:      nextEnemy.artwork,
    maxCoins:     nextEnemy.coins,
    currentCoins: nextEnemy.coins,
    isAlive:      true,
  };
  combatState.player.currentCoins = combatState.player.maxCoins;
  combatState.phase = 'initiative';
  combatState.currentTurn = 'player';
  combatState.initiativeWinner = null;

  // 4. Swap in the new enemy (log keeps scrolling, no reset)
  emoji.classList.remove('fallen');
  nameEl.classList.remove('fallen');
  enterCombat(/* freshEncounter */ false);
}

// ============================================================
//  PLAYER DEATH (full screen — per spec: killing blow, 3s delay,
//  holy glow "Rise Again")
// ============================================================
function showPlayerDeathScreen() {
  document.getElementById('pdKillCount').textContent = combatState.enemiesKilled;

  const killing = combatState.combatLog.find(e => e.isKillingBlow);
  const kbText = killing
    ? killing.html.replace(/<[^>]+>/g, '') // strip inline tags for plain-text summary
    : `${combatState.enemy.name} dealt the final blow.`;
  document.getElementById('killingBlowText').textContent = kbText;

  // Render the same log (reuses entry classes)
  const logEl = document.getElementById('playerDeathLog');
  if (logEl) {
    logEl.innerHTML = combatState.combatLog.map(entry => {
      let cls = 'combat-log-entry ' + entry.kind;
      if (entry.isKillingBlow) cls += ' killing-blow';
      return `<div class="${cls}">${entry.html}</div>`;
    }).join('');
  }

  // HOOK: [v1.5] Play down-tempo MIDI music
  // Options: tone.js, HTML5 <audio loop>, or Web Audio API
  // Call here so music cues with the gravestone reveal.

  showScreen('playerDeathScreen');

  // 3s delay before holy glow button appears
  const riseBtn = document.getElementById('btnRiseAgain');
  riseBtn.classList.remove('visible');
  setTimeout(() => riseBtn.classList.add('visible'), 3000);
}

function handleRiseAgain() {
  // Preserve session kill tally, return to hub.
  // On a full page reload, everything resets (no localStorage).
  initHub();
}

// ============================================================
//  EVENT BINDINGS
// ============================================================
document.getElementById('btnBegin')     .addEventListener('click', handleBegin);
document.getElementById('btnCombatRoll').addEventListener('click', handleCombatRoll);
document.getElementById('btnRiseAgain') .addEventListener('click', handleRiseAgain);

// ============================================================
//  BOOTSTRAP
// ============================================================
initHub();
