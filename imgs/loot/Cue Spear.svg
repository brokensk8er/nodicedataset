<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" stroke="#1a1a2e" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- billiard cue / spear shaft — tapered -->
  <path d="M14 70 Q16 68 60 36" stroke-width="3"/>
  <path d="M60 36 L68 26 L62 30 Z" stroke-width="1.8" fill="#e8e4dc"/>
  <!-- cue tip at wide end -->
  <ellipse cx="15" cy="70" rx="4" ry="2" stroke-width="1.4" fill="#e8e4dc" transform="rotate(-35 15 70)"/>
  <!-- billiard ball being struck -->
  <circle cx="54" cy="42" r="8" stroke-width="1.4" fill="#e8e4dc"/>
  <path d="M50 38 Q54 36 58 40" stroke-width="1"/><!-- number stripe -->
  <!-- extreme knockback arc -->
  <path d="M62 40 Q72 28 76 16" stroke-width="1.4" stroke-dasharray="2,2"/>
  <!-- target figure bouncing off walls -->
  <path d="M72 14 Q78 8 74 6 Q70 10 72 14 Q76 18 72 22" stroke-width="1.3"/>
</svg>