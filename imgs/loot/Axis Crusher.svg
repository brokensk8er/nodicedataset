  <rect x="44" y="30" width="14" height="3" rx="0" stroke-width="1.1"/>
  <!-- dimension squish lines -->
  <line x1="18" y1="30" x2="10" y2="28" stroke-width="1.2"/>
  <line x1="18" y1="36" x2="10" y2="36" stroke-width="1.2"/>
