<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" stroke="#1a1a2e" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- wand handle -->
  <line x1="40" y1="74" x2="40" y2="50" stroke-width="2.2"/>
  <!-- wand ring -->
  <circle cx="40" cy="46" r="8" stroke-width="1.8"/>
  <!-- soap film in ring (diagonal shimmer) -->
  <line x1="34" y1="40" x2="46" y2="52" stroke-width="0.9"/>
  <line x1="34" y1="44" x2="46" y2="48" stroke-width="0.9"/>
  <!-- large bubble above -->
  <circle cx="40" cy="28" r="16" stroke-width="1.6"/>
  <!-- bubble highlight -->
  <path d="M30 20 Q34 16 38 18" stroke-width="1.2"/>
  <!-- medium bubble -->
  <circle cx="60" cy="42" r="8" stroke-width="1.4"/>
  <!-- small bubble -->
  <circle cx="18" cy="36" r="5" stroke-width="1.2"/>
  <!-- all perfectly round, no burst -->
  <circle cx="54" cy="16" r="5" stroke-width="1.2"/>
</svg>