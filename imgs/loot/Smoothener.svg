<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" stroke="#1a1a2e" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- mace handle -->
  <rect x="36" y="48" width="8" height="24" rx="2" stroke-width="1.8" fill="#e8e4dc"/>
  <!-- perfectly smooth sphere head -->
  <circle cx="40" cy="34" r="18" stroke-width="1.8" fill="#e8e4dc"/>
  <!-- gloss highlight -->
  <path d="M30 24 Q34 20 38 22" stroke-width="1.3"/>
  <!-- before: pointy star shape off to side -->
  <path d="M66 20 L68 14 L70 20 L76 22 L70 24 L68 30 L66 24 L60 22 Z" stroke-width="1.3" fill="#e8e4dc"/>
  <!-- arrow pointing to smooth circle -->
  <line x1="60" y1="22" x2="56" y2="26" stroke-width="1.2"/>
  <path d="M54 28 L56 24 L60 26 Z" fill="#1a1a2e" stroke="none"/>
  <!-- after: small smooth oval -->
  <ellipse cx="8" cy="22" rx="5" ry="4" stroke-width="1.3" fill="#e8e4dc"/>
</svg>