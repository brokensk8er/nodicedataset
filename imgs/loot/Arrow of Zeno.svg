  <line x1="68" y1="52" x2="64" y2="60" stroke-width="1.6"/>
  <!-- freeze lines -->
  <line x1="54" y1="24" x2="52" y2="20" stroke-width="1.1"/>
  <line x1="58" y1="22" x2="57" y2="18" stroke-width="1.1"/>
