<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" stroke="#1a1a2e" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- left barrel -->
  <rect x="14" y="28" width="22" height="30" rx="5" stroke-width="1.8" fill="#e8e4dc"/>
  <!-- right barrel -->
  <rect x="44" y="28" width="22" height="30" rx="5" stroke-width="1.8" fill="#e8e4dc"/>
  <!-- bridge connecting barrels -->
  <rect x="34" y="36" width="12" height="10" rx="2" stroke-width="1.4" fill="#e8e4dc"/>
  <!-- left lens -->
  <circle cx="25" cy="44" r="7" stroke-width="1.4" fill="white"/>
  <!-- right lens -->
  <circle cx="55" cy="44" r="7" stroke-width="1.4" fill="white"/>
  <!-- crosshair in lenses -->
  <line x1="25" y1="40" x2="25" y2="48" stroke-width="0.9"/>
  <line x1="21" y1="44" x2="29" y2="44" stroke-width="0.9"/>
  <!-- teleport arc (user jumps to view) -->
  <path d="M30 62 Q40 72 54 64" stroke-width="1.4" stroke-dasharray="2,2"/>
  <path d="M52 62 L56 66 L50 66 Z" fill="#1a1a2e" stroke="none"/>
</svg>