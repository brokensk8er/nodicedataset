<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" stroke="#1a1a2e" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- rapier-sized quill shaft/blade -->
  <line x1="16" y1="66" x2="62" y2="20" stroke-width="2.2"/>
  <!-- feather barbs on upper half (quill vane) -->
  <path d="M62 20 Q68 10 72 8 Q66 14 62 20" stroke-width="1.4" fill="#e8e4dc"/>
  <path d="M56 26 Q64 18 70 14" stroke-width="1.3"/>
  <path d="M50 32 Q58 24 64 20" stroke-width="1.3"/>
  <path d="M44 38 Q52 30 58 26" stroke-width="1.3"/>
  <path d="M38 44 Q46 36 52 32" stroke-width="1.2"/>
  <!-- ink tip at bottom -->
  <path d="M16 66 Q12 70 14 74 Q18 76 20 72 Z" stroke-width="1.4" fill="#e8e4dc"/>
  <!-- magical ink drip -->
  <path d="M14 74 Q14 78 16 80 Q18 78 16 74" stroke-width="1.2" fill="#e8e4dc"/>
  <!-- crossguard (quill has a guard) -->
  <line x1="26" y1="56" x2="38" y2="44" stroke-width="1.8"/>
  <!-- armour being pierced (ink writing through it) -->
  <rect x="62" y="44" width="10" height="14" rx="1" stroke-width="1.3" fill="#e8e4dc"/>
  <path d="M66 44 Q64 50 66 56" stroke-width="1.1" stroke-dasharray="1.5,1.5"/>
</svg>