  <circle cx="37" cy="40" r="1" fill="#1a1a2e" stroke="none"/>
  <circle cx="40" cy="38" r="1" fill="#1a1a2e" stroke="none"/>
  <circle cx="43" cy="40" r="1" fill="#1a1a2e" stroke="none"/>
