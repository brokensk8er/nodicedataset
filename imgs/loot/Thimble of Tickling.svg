  <circle cx="40" cy="22" r="12" stroke-width="1.6" fill="#e8e4dc"/>
  <path d="M33 22 Q40 32 47 22" stroke-width="1.8"/>
  <line x1="35" y1="18" x2="36" y2="20" stroke-width="1.3"/>
  <line x1="45" y1="18" x2="44" y2="20" stroke-width="1.3"/>
  <!-- squiggly laugh lines -->
  <path d="M26 18 Q24 22 26 26" stroke-width="1.2"/>
  <path d="M54 18 Q56 22 54 26" stroke-width="1.2"/>
