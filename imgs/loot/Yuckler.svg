<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" stroke="#1a1a2e" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- buckler/platter shape — round shield -->
  <circle cx="40" cy="44" r="26" stroke-width="1.8" fill="#e8e4dc"/>
  <!-- boss/handle in centre -->
  <circle cx="40" cy="44" r="8" stroke-width="1.4" fill="#e8e4dc"/>
  <!-- platter decorative ring -->
  <circle cx="40" cy="44" r="20" stroke-width="1"/>
  <!-- handle straps on back (visible from front as cross) -->
  <line x1="40" y1="36" x2="40" y2="52" stroke-width="1.3"/>
  <line x1="32" y1="44" x2="48" y2="44" stroke-width="1.3"/>
  <!-- disgusting food icons in platter rings -->
  <path d="M26 36 Q28 32 30 36 Q28 40 26 36" stroke-width="1.1"/><!-- snail -->
  <path d="M48 36 Q52 34 52 38 Q50 40 48 38 Z" stroke-width="1.1"/><!-- bug -->
  <!-- nausea wavy lines above shield -->
  <path d="M30 18 Q36 12 40 18 Q44 12 50 18" stroke-width="1.3"/>
  <!-- green face expression at top -->
  <circle cx="40" cy="12" r="5" stroke-width="1.3" fill="#e8e4dc"/>
  <path d="M37 13 Q40 12 43 13" stroke-width="1.1"/>
  <path d="M38 15 Q40 17 42 15" stroke-width="1.2"/>
</svg>