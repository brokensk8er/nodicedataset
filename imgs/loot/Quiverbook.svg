<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" stroke="#1a1a2e" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- thick notebook -->
  <rect x="18" y="18" width="44" height="52" rx="3" stroke-width="1.8" fill="#e8e4dc"/>
  <!-- spine -->
  <line x1="18" y1="18" x2="18" y2="70" stroke-width="3"/>
  <!-- page lines -->
  <line x1="26" y1="28" x2="54" y2="28" stroke-width="1.1"/>
  <line x1="26" y1="34" x2="54" y2="34" stroke-width="1.1"/>
  <line x1="26" y1="40" x2="54" y2="40" stroke-width="1.1"/>
  <line x1="26" y1="46" x2="54" y2="46" stroke-width="1.1"/>
  <!-- page being torn -->
  <path d="M54 40 Q56 44 54 48" stroke-width="1.4" stroke-dasharray="2,1"/>
  <!-- paper plane flying from torn page -->
  <path d="M60 32 L72 26 L68 36 L60 32 Z" stroke-width="1.4" fill="#e8e4dc"/>
  <line x1="64" y1="32" x2="66" y2="34" stroke-width="1.1"/>
  <!-- arrow head at tip of plane -->
  <path d="M72 26 L76 22" stroke-width="1.3"/>
  <path d="M74 22 L76 22 L76 24" stroke-width="1.2"/>
  <!-- flight trail -->
  <line x1="68" y1="34" x2="62" y2="42" stroke-width="1.1" stroke-dasharray="1.5,2"/>
</svg>