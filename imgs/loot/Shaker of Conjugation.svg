  <circle cx="34" cy="22" r="1" fill="#1a1a2e" stroke="none"/>
  <circle cx="40" cy="22" r="1" fill="#1a1a2e" stroke="none"/>
  <circle cx="46" cy="22" r="1" fill="#1a1a2e" stroke="none"/>
