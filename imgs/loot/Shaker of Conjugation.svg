  <!-- chimera result below shaker -->
  <path d="M34 62 Q26 68 28 74 Q32 76 36 72 Q38 76 40 72 Q42 76 44 72 Q48 76 52 72 Q54 68 46 62" stroke-width="1.4" fill="#e8e4dc"/>
