<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" stroke="#1a1a2e" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- stool top -->
  <ellipse cx="40" cy="50" rx="18" ry="5" stroke-width="1.8" fill="#e8e4dc"/>
  <!-- stool legs (extending down, very long) -->
  <line x1="26" y1="54" x2="22" y2="76" stroke-width="1.8"/>
  <line x1="54" y1="54" x2="58" y2="76" stroke-width="1.8"/>
  <line x1="40" y1="55" x2="40" y2="78" stroke-width="1.8"/>
  <!-- rung -->
  <line x1="24" y1="66" x2="56" y2="66" stroke-width="1.4"/>
  <!-- person standing on top reaching high shelf -->
  <circle cx="40" cy="44" r="4" stroke-width="1.3" fill="#e8e4dc"/>
  <line x1="40" y1="48" x2="40" y2="52" stroke-width="1.4"/>
  <!-- arms reaching up -->
  <line x1="36" y1="49" x2="32" y2="44" stroke-width="1.3"/>
  <line x1="44" y1="49" x2="48" y2="44" stroke-width="1.3"/>
  <!-- high shelf way up top -->
  <line x1="12" y1="22" x2="68" y2="22" stroke-width="1.6"/>
  <line x1="12" y1="22" x2="12" y2="30" stroke-width="1.4"/>
  <line x1="68" y1="22" x2="68" y2="30" stroke-width="1.4"/>
  <!-- arrows on legs showing extension -->
  <path d="M20 74 L22 78 L24 74" stroke-width="1.1"/>
  <path d="M60 74 L58 78 L56 74" stroke-width="1.1"/>
</svg>