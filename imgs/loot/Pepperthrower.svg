<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" stroke="#1a1a2e" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- pepper mill body -->
  <path d="M28 22 Q26 18 28 14 Q34 10 40 10 Q46 10 52 14 Q54 18 52 22 L50 52 Q50 60 40 62 Q30 60 30 52 Z" stroke-width="1.8" fill="#e8e4dc"/>
