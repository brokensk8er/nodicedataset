  <circle cx="28" cy="68" r="1" fill="#1a1a2e" stroke="none"/>
  <circle cx="42" cy="70" r="1" fill="#1a1a2e" stroke="none"/>
  <circle cx="50" cy="68" r="1" fill="#1a1a2e" stroke="none"/>
</svg>