<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" stroke="#1a1a2e" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- heavy curtain cloak shape -->
  <path d="M20 14 Q16 20 14 36 Q12 52 18 70 L32 70 Q28 54 30 38 Q32 24 40 18 Q48 24 50 38 Q52 54 48 70 L62 70 Q68 52 66 36 Q64 20 60 14 Z" stroke-width="1.8" fill="#e8e4dc"/>
  <!-- curtain fold lines -->
  <path d="M30 18 Q28 32 30 48 Q32 62 32 70" stroke-width="1.1"/>
  <path d="M50 18 Q52 32 50 48 Q48 62 48 70" stroke-width="1.1"/>
  <!-- rings at top (curtain rings) -->
  <circle cx="28" cy="14" r="3" stroke-width="1.3"/>
  <circle cx="40" cy="12" r="3" stroke-width="1.3"/>
  <circle cx="52" cy="14" r="3" stroke-width="1.3"/>
  <!-- eye peeking from behind -->
  <ellipse cx="40" cy="38" rx="5" ry="4" stroke-width="1.4" fill="white"/>
  <circle cx="40" cy="38" r="2" fill="#1a1a2e" stroke="none"/>
  <!-- whisper lines from inside -->
  <path d="M46 42 Q54 40 58 44" stroke-width="1.1" stroke-dasharray="1.5,1.5"/>
</svg>