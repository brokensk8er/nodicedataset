<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" stroke="#1a1a2e" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- clothes iron body -->
  <path d="M16 52 Q16 40 30 36 L64 36 L64 52 Z" stroke-width="1.8" fill="#e8e4dc"/>
  <!-- handle -->
  <path d="M34 36 L34 28 Q34 24 40 24 Q46 24 46 28 L46 36" stroke-width="1.6" fill="#e8e4dc"/>
  <!-- sole plate holes -->
  <circle cx="30" cy="46" r="1.5" fill="#1a1a2e" stroke="none"/>
  <circle cx="38" cy="46" r="1.5" fill="#1a1a2e" stroke="none"/>
  <circle cx="46" cy="46" r="1.5" fill="#1a1a2e" stroke="none"/>
  <circle cx="54" cy="46" r="1.5" fill="#1a1a2e" stroke="none"/>
  <!-- steam blast cone -->
  <path d="M16 52 L4 44 M16 50 L4 46 M16 48 L4 48" stroke-width="1.3"/>
  <!-- heat lines on sole -->
  <path d="M22 44 Q20 40 22 38" stroke-width="1.2" stroke-dasharray="2,1"/>
  <path d="M60 44 Q62 40 60 38" stroke-width="1.2" stroke-dasharray="2,1"/>
  <!-- glow lines under iron -->
  <line x1="20" y1="54" x2="60" y2="54" stroke-width="1.1" stroke-dasharray="2,2"/>
</svg>