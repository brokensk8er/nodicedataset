<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" stroke="#1a1a2e" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- large crayon body -->
  <rect x="32" y="22" width="16" height="42" rx="2" stroke-width="1.8" fill="#e8e4dc"/>
  <!-- crayon tip -->
  <path d="M32 64 L40 74 L48 64 Z" stroke-width="1.6" fill="#e8e4dc"/>
  <!-- crayon top cap -->
  <rect x="32" y="16" width="16" height="8" rx="2" stroke-width="1.4" fill="#e8e4dc"/>
  <!-- label band -->
  <line x1="32" y1="44" x2="48" y2="44" stroke-width="1.1"/>
  <line x1="32" y1="48" x2="48" y2="48" stroke-width="1.1"/>
  <!-- floating drawn line in air (tangible) -->
  <path d="M16 30 Q20 20 28 22 Q36 24 34 32 Q28 38 20 36" stroke-width="2" stroke-dasharray="3,0"/>
  <!-- small figure climbing the line -->
  <circle cx="26" cy="24" r="3" stroke-width="1.3" fill="#e8e4dc"/>
  <line x1="26" y1="27" x2="26" y2="34" stroke-width="1.3"/>
  <line x1="22" y1="30" x2="30" y2="30" stroke-width="1.3"/>
</svg>