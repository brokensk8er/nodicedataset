<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<title>No Dice — The Poll</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<!-- Shared styles (colours, fonts, buttons, badges, animations) -->
<link rel="stylesheet" href="styles.css">
<!-- Prevent theme flash: apply saved theme before first paint -->
<script>try{var _t=localStorage.getItem('vaultTheme')||'dark';document.documentElement.setAttribute('data-theme',_t);}catch(e){document.documentElement.setAttribute('data-theme','dark');}</script>
</head>
<body>

<!-- Theme toggle — sun/moon light/dark switch (CSS in styles.css) -->
<button id="themeBtn" class="theme-toggle-btn" onclick="toggleTheme()" aria-label="Toggle light/dark mode"></button>

<!-- ============================================
     HEADER
     Edit: site-label eyebrow, h1 title. The
     subtitle (#headerSubtitle) is updated by JS
     to reflect admin vs audience mode.
     ============================================ -->
<header>
  <p class="site-label">No Dice &mdash; Improv RPG</p>
  <h1>The <span>Poll</span></h1>
  <p class="subtitle" id="headerSubtitle">The crowd decides</p>
</header>

<!-- ============================================
     MAIN CARD
     JavaScript fills #cardBody with the current
     screen (loading, admin form, vote buttons,
     results, or waiting state). Do not add
     static content here.

     Access modes:
       Audience: poll.html (default)
       Admin:    tap the <h1> title 5× quickly to toggle
     ============================================ -->
<main>
  <div class="card" id="card">
    <div class="card-body" id="cardBody">
      <span class="spinner">⚔</span>
    </div>
    <div class="card-footer" id="cardFooter" hidden></div>
  </div>
</main>

<!-- ============================================
     FOOTER
     ← Back to the Vault nav link.
     ============================================ -->
<footer>
  <a class="nav-link" href="index.html">← Back to the Vault</a>
</footer>

<!-- ============================================================
  FIREBASE CONFIG
  Replace these placeholder values with your Firebase project's
  config object. You can find it at:
    Firebase Console → Your Project → Project Settings → Your apps → SDK setup

  Steps to get a Firebase project:
  1. Go to https://console.firebase.google.com
  2. Create a new project (free, no billing required)
  3. In the project, click "Build" → "Realtime Database" → Create database
     Choose "Start in test mode" (you can lock it down later)
  4. Go to Project Settings (gear icon) → General → Your apps → Add app → Web
  5. Copy the firebaseConfig object values below
  6. In Realtime Database Rules, set:
     {
       "rules": {
         ".read": true,
         ".write": true
       }
     }
     (This is fine for a show night. For production, lock it down further.)
============================================================ -->

<script type="module">
import { mountProfileButton } from './profile-auth.js';
mountProfileButton();
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, get, onValue }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ============================================================
//  CONFIGURATION — FIREBASE PROJECT
//  ► Replace ALL values below with your own Firebase project.
//    See FIREBASE_SETUP.md for step-by-step instructions.
//  ► If these values start with "YOUR_", the tool runs in
//    demo mode (no live voting, just shows setup instructions).
//  ► The poll.html?admin URL is the showrunner's view.
//    Audience visits poll.html (no ?admin).
// ============================================================
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyAIwTgubmE9V1XrSF3BS4rxSIr3uNua1a8",
  authDomain:        "nodicetools.firebaseapp.com",
  databaseURL:       "https://nodicetools-default-rtdb.firebaseio.com",
  projectId:         "nodicetools",
  storageBucket:     "nodicetools.firebasestorage.app",
  messagingSenderId: "387258889697",
  appId:             "1:387258889697:web:5467488ab109ea67b74ea0",
};
// ============================================================

const IS_DEMO = Object.values(FIREBASE_CONFIG).some(v => v.startsWith('YOUR_'));

// ============================================================
//  IS ADMIN?
//  Visit poll.html?admin to enter showrunner mode.
//  State persists in sessionStorage for the tab's lifetime.
// ============================================================
if (new URLSearchParams(window.location.search).has('admin')) {
  sessionStorage.setItem('nodice_admin', '1');
}
let isAdmin = sessionStorage.getItem('nodice_admin') === '1';

// ============================================================
//  SESSION VOTER ID
//  A UUID stored in sessionStorage — survives refresh on the
//  same tab, cleared when the tab is closed. No names, no PII.
// ============================================================
function getVoterId() {
  let id = sessionStorage.getItem('nodice_voter_id');
  if (!id) {
    id = 'v_' + crypto.randomUUID().replace(/-/g, '').slice(0, 20);
    sessionStorage.setItem('nodice_voter_id', id);
  }
  return id;
}

// ============================================================
//  DOM REFS
// ============================================================
const cardBody   = document.getElementById('cardBody');
const cardFooter = document.getElementById('cardFooter');
const subtitle   = document.getElementById('headerSubtitle');

function showFooter(html) {
  cardFooter.innerHTML = html;
  cardFooter.hidden = false;
}

function hideFooter() {
  cardFooter.hidden = true;
  cardFooter.innerHTML = '';
}

// ============================================================
//  DEMO MODE — shown when Firebase config isn't filled in
// ============================================================
if (IS_DEMO) {
  const adminUrl = window.location.href.split('?')[0] + '?admin';
  const audienceUrl = window.location.href.split('?')[0];

  cardBody.innerHTML = `
    <span class="status-icon">🔧</span>
    <p class="status-heading">Firebase Setup Needed</p>
    <p class="status-body u-mb-14">
      This tool needs a free Firebase Realtime Database to sync votes across devices in real time.<br><br>
      <strong>Quick setup (~ 3 minutes):</strong>
    </p>
    <ol class="u-list-compact u-mb-14">
      <li>Go to <strong>console.firebase.google.com</strong></li>
      <li>Create a new project → Build → Realtime Database → Create (test mode)</li>
      <li>Project Settings → Add web app → copy the config object</li>
      <li>Paste your values into the <code>FIREBASE_CONFIG</code> block in <code>poll.html</code></li>
    </ol>
    <div class="divider"></div>
    <p class="status-body u-mt-10 u-mb-6 u-text-xs">
      Once configured, the showrunner opens:<br>
      <code>${adminUrl}</code>
    </p>
    <p class="status-body u-text-xs u-mb-14">
      Audience scans the QR code for:<br>
      <code>${audienceUrl}</code>
    </p>`;

  showFooter(`<div class="source-badge demo"><span class="dot"></span>Firebase not configured</div>`);

// ============================================================
//  FIREBASE CONNECTED — MAIN POLL LOGIC
//  Runs only when FIREBASE_CONFIG has real values.
//  Two paths:
//    isAdmin = true  → showrunner view (create/reveal polls)
//    isAdmin = false → audience view (vote + wait for reveal)
// ============================================================
} else {
  let app, db, pollRef, votesRef;
  let currentPollSnap = null;
  let myVote = null;
  let unsubPoll = null;
  let unsubVotes = null;

  // Option letter labels and constants — used by admin and audience renderers
  const LETTERS       = ['A', 'B', 'C', 'D', 'E'];
  const MIN_OPTIONS   = 2;
  const MAX_OPTIONS   = 5;
  const PLACEHOLDERS  = [
    'The first option…',
    'The second option…',
    'A third choice…',
    'Or maybe this…',
    'One more possibility…',
  ];
  let adminOptionCount = MIN_OPTIONS;

  try {
    app     = initializeApp(FIREBASE_CONFIG);
    db      = getDatabase(app);
    pollRef  = ref(db, 'nodice/poll');
    votesRef = ref(db, 'nodice/votes');
  } catch(e) {
    cardBody.innerHTML = `
      <span class="status-icon">⚠️</span>
      <p class="status-heading">Connection Error</p>
      <p class="status-body">Could not connect to Firebase.<br><br>
      Check that your API key and database URL are correct, and that your database rules allow read/write.</p>`;
    showFooter('');
    throw e;
  }

  const voterId = getVoterId();

  // ── RENDER: Admin form (no active poll) ──────────────────
  // activeCount tracks how many option rows are shown (2–5).
  // It lives outside so re-renders triggered by add/remove
  // can restore the right count.

  function renderAdminForm(preserveValues) {
    subtitle.textContent = 'Showrunner controls';

    // Build option rows HTML
    const optionRowsHtml = LETTERS.slice(0, adminOptionCount).map((letter, i) => {
      const isRequired = i < MIN_OPTIONS;
      const removeBtn = isRequired
        ? `<div class="btn-remove-placeholder"></div>`
        : `<button class="btn-remove-option" data-index="${i}" title="Remove option" aria-label="Remove option ${letter}">✕</button>`;
      return `
        <div class="option-row" id="option-row-${i}">
          <span class="option-letter-tag">${letter}</span>
          <input class="form-input" id="opt-${i}" type="text"
            placeholder="${PLACEHOLDERS[i]}" maxlength="80" autocomplete="off"
            value="${preserveValues && preserveValues[i] ? esc(preserveValues[i]) : ''}">
          ${removeBtn}
        </div>`;
    }).join('');

    const canAddMore = adminOptionCount < MAX_OPTIONS;
    const addBtnHtml = canAddMore
      ? `<button class="btn-add-option" id="add-option-btn">
           <span class="add-plus">＋</span>
           Add another option (${adminOptionCount}/${MAX_OPTIONS})
         </button>`
      : '';

    cardBody.innerHTML = `
      <div class="admin-badge">⚔ Showrunner</div>
      <div class="form-group">
        <label class="form-label" for="q-input">Question</label>
        <input class="form-input" id="q-input" type="text"
          placeholder="What does the crowd choose?" maxlength="120" autocomplete="off"
          value="${preserveValues && preserveValues.question ? esc(preserveValues.question) : ''}">
      </div>
      <div class="options-section-label">
        <span class="form-label poll-options-label-compact">Options</span>
        <span class="options-count-hint">Min 2 · Max 5</span>
      </div>
      <div id="options-container">
        ${optionRowsHtml}
      </div>
      ${addBtnHtml}`;

    showFooter(`
      <button class="btn-primary" id="launch-btn">⚔ Launch Poll</button>
      <div class="source-badge live"><span class="dot"></span>Connected</div>`);

    // Wire launch button
    document.getElementById('launch-btn').onclick = launchPoll;

    // Enter on question field moves to first option; enter on last option launches
    document.getElementById('q-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') { document.getElementById('opt-0')?.focus(); }
    });
    for (let i = 0; i < adminOptionCount; i++) {
      document.getElementById(`opt-${i}`).addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          const next = document.getElementById(`opt-${i + 1}`);
          if (next) { next.focus(); } else { launchPoll(); }
        }
      });
    }

    // Wire add button
    document.getElementById('add-option-btn')?.addEventListener('click', () => {
      const vals = gatherFormValues();
      adminOptionCount++;
      renderAdminForm(vals);
      // Focus the newly added input
      setTimeout(() => document.getElementById(`opt-${adminOptionCount - 1}`)?.focus(), 50);
    });

    // Wire remove buttons
    document.querySelectorAll('.btn-remove-option').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.index);
        const vals = gatherFormValues();
        // Shift values down to fill the removed slot
        vals.splice(idx, 1);
        adminOptionCount--;
        renderAdminForm(vals);
      });
    });
  }

  // Collect current question + option values from the form
  function gatherFormValues() {
    const vals = [];
    vals.question = document.getElementById('q-input')?.value ?? '';
    for (let i = 0; i < adminOptionCount; i++) {
      vals.push(document.getElementById(`opt-${i}`)?.value ?? '');
    }
    return vals;
  }

  // ── RENDER: Admin results — pre-reveal ───────────────────
  function renderAdminPreReveal(poll, votes) {
    const options = poll.options || [];
    const counts  = options.map((_, i) =>
      Object.values(votes).filter(v => v === String(i)).length
    );
    const total   = counts.reduce((a, b) => a + b, 0);
    const pcts    = counts.map(c => total ? Math.round(c / total * 100) : 0);
    const maxCount = Math.max(...counts);

    subtitle.textContent = 'Showrunner controls';

    const barsHtml = options.map((opt, i) => {
      const isWinner = counts[i] === maxCount && total > 0;
      return `
        <div class="result-row">
          <div class="result-label-row">
            <span class="result-option-name">${LETTERS[i]} — ${esc(opt)}</span>
            <span>
              <span class="result-pct">${pcts[i]}%</span>
              <span class="result-count">${counts[i]} vote${counts[i] !== 1 ? 's' : ''}</span>
            </span>
          </div>
          <div class="bar-track">
            <div class="bar-fill ${isWinner ? 'winner' : ''}" style="width:${pcts[i]}%"></div>
          </div>
        </div>`;
    }).join('');

    cardBody.innerHTML = `
      <div class="admin-badge">⚔ Showrunner</div>
      <div class="admin-results-header">
        <div class="question-label">Active Poll</div>
        <div class="live-indicator"><span class="live-dot"></span>Votes incoming</div>
      </div>
      <p class="question-text">${esc(poll.question)}</p>
      <div class="result-bar-wrap">${barsHtml}</div>
      <p class="total-votes u-mb-4">${total} vote${total !== 1 ? 's' : ''} cast — audience sees nothing yet</p>`;

    showFooter(`
      <button class="btn-primary" id="reveal-btn">🎲 Reveal Results to Audience</button>
      <div class="divider"></div>
      <button class="btn-danger" id="close-btn">Close Poll &amp; Clear</button>
      <div class="source-badge live"><span class="dot"></span>Connected</div>`);

    document.getElementById('reveal-btn').onclick = revealResults;
    document.getElementById('close-btn').onclick  = clearPoll;
  }

  // ── RENDER: Admin results — post-reveal ──────────────────
  function renderAdminPostReveal(poll, votes) {
    const options = poll.options || [];
    const counts  = options.map((_, i) =>
      Object.values(votes).filter(v => v === String(i)).length
    );
    const total    = counts.reduce((a, b) => a + b, 0);
    const pcts     = counts.map(c => total ? Math.round(c / total * 100) : 0);
    const maxCount = Math.max(...counts);

    subtitle.textContent = 'Showrunner controls';

    const barsHtml = options.map((opt, i) => {
      const isWinner = counts[i] === maxCount && total > 0;
      return `
        <div class="result-row">
          <div class="result-label-row">
            <span class="result-option-name">${LETTERS[i]} — ${esc(opt)}</span>
            <span>
              <span class="result-pct">${pcts[i]}%</span>
              <span class="result-count">${counts[i]} vote${counts[i] !== 1 ? 's' : ''}</span>
            </span>
          </div>
          <div class="bar-track">
            <div class="bar-fill ${isWinner ? 'winner' : ''}" style="width:${pcts[i]}%"></div>
          </div>
        </div>`;
    }).join('');

    cardBody.innerHTML = `
      <div class="admin-badge">⚔ Showrunner</div>
      <div class="admin-results-header">
        <div class="question-label">Results Revealed</div>
        <div class="live-indicator poll-live-indicator--gold">
          <span class="live-dot poll-live-dot--gold"></span>Visible to audience
        </div>
      </div>
      <p class="question-text">${esc(poll.question)}</p>
      <div class="result-bar-wrap">${barsHtml}</div>
      <p class="total-votes u-mb-4">${total} vote${total !== 1 ? 's' : ''} cast</p>`;

    showFooter(`
      <button class="btn-ghost" id="new-btn">New Poll</button>
      <button class="btn-danger" id="close-btn">Close Poll &amp; Clear</button>
      <div class="source-badge live"><span class="dot"></span>Connected</div>`);

    document.getElementById('new-btn').onclick   = clearPoll;
    document.getElementById('close-btn').onclick = clearPoll;
  }

  // ── RENDER: Audience — voted, waiting for reveal ─────────
  function renderAudienceAwaitingReveal(poll, myVoteIndex) {
    const options    = poll.options || [];
    const choiceText = options[myVoteIndex] ?? '';
    subtitle.textContent = 'The crowd decides';
    cardBody.innerHTML = `
      <div class="question-label">The Question</div>
      <p class="question-text">${esc(poll.question)}</p>
      <p class="voted-chip u-mt-4">✔ Voted — ${LETTERS[myVoteIndex]}: ${esc(choiceText)}</p>
      <span class="status-icon waiting-pulse u-mt-6">⚔</span>
      <p class="status-heading u-text-sm">Waiting for the reveal…</p>
      <p class="status-body u-mb-10">The showrunner will reveal the results shortly.</p>`;
    showFooter(`<div class="source-badge live"><span class="dot"></span>Connected</div>`);
  }

  // ── RENDER: Audience waiting ─────────────────────────────
  function renderAudienceWaiting() {
    subtitle.textContent = 'The crowd decides';
    cardBody.innerHTML = `
      <span class="status-icon waiting-pulse">🎲</span>
      <p class="status-heading">Standing by…</p>
      <p class="status-body">A poll will appear here when the showrunner starts one.<br>Stay on this page.</p>`;
    hideFooter();
    showFooter(`<div class="source-badge live"><span class="dot"></span>Connected</div>`);
  }

  // ── RENDER: Audience vote ────────────────────────────────
  function renderAudienceVote(poll) {
    const options = poll.options || [];
    subtitle.textContent = 'The crowd decides';

    const btnsHtml = options.map((opt, i) => `
      <button class="vote-btn" id="vote-btn-${i}">
        <span class="option-letter">${LETTERS[i]}</span>
        <span>${esc(opt)}</span>
      </button>`).join('');

    cardBody.innerHTML = `
      <div class="question-label">The Question</div>
      <p class="question-text">${esc(poll.question)}</p>
      <div class="vote-options">${btnsHtml}</div>`;
    hideFooter();

    options.forEach((_, i) => {
      document.getElementById(`vote-btn-${i}`).onclick = () => castVote(i, poll);
    });
  }

  // ── RENDER: Audience results (post-reveal) ───────────────
  function renderAudienceResults(poll, votes, myVoteIndex) {
    const options  = poll.options || [];
    const counts   = options.map((_, i) =>
      Object.values(votes).filter(v => v === String(i)).length
    );
    const total    = counts.reduce((a, b) => a + b, 0);
    const pcts     = counts.map(c => total ? Math.round(c / total * 100) : 0);
    const maxCount = Math.max(...counts);

    const choiceText = options[myVoteIndex] ?? '';
    subtitle.textContent = 'The crowd decides';

    const barsHtml = options.map((opt, i) => {
      const isWinner = counts[i] === maxCount && total > 0;
      return `
        <div class="result-row">
          <div class="result-label-row">
            <span class="result-option-name">${LETTERS[i]} — ${esc(opt)}</span>
            <span>
              <span class="result-pct">${pcts[i]}%</span>
              <span class="result-count">${counts[i]}</span>
            </span>
          </div>
          <div class="bar-track">
            <div class="bar-fill ${isWinner ? 'winner' : ''}" style="width:${pcts[i]}%"></div>
          </div>
        </div>`;
    }).join('');

    cardBody.innerHTML = `
      <div class="question-label">The Question</div>
      <p class="question-text">${esc(poll.question)}</p>
      <p class="voted-chip u-mt-2">✔ You voted ${LETTERS[myVoteIndex]}: ${esc(choiceText)}</p>
      <div class="result-bar-wrap">${barsHtml}</div>
      <p class="total-votes">${total} vote${total !== 1 ? 's' : ''} cast — results updating live</p>`;

    showFooter(`<div class="source-badge live"><span class="dot"></span>Connected</div>`);
  }

  // ── ACTIONS ──────────────────────────────────────────────

  async function launchPoll() {
    const q = document.getElementById('q-input')?.value.trim();

    // Collect all active option values
    const options = [];
    for (let i = 0; i < adminOptionCount; i++) {
      options.push((document.getElementById(`opt-${i}`)?.value ?? '').trim());
    }

    // Validate — question + all active options must be non-empty
    let hasError = false;
    if (!q) {
      const el = document.getElementById('q-input');
      el.style.borderColor = '#c0392b';
      el.focus();
      setTimeout(() => { el.style.borderColor = ''; }, 1200);
      hasError = true;
    }
    options.forEach((val, i) => {
      if (!val) {
        const el = document.getElementById(`opt-${i}`);
        if (el) {
          el.style.borderColor = '#c0392b';
          if (!hasError) { el.focus(); }
          setTimeout(() => { el.style.borderColor = ''; }, 1200);
        }
        hasError = true;
      }
    });
    if (hasError) return;

    const btn = document.getElementById('launch-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Launching…'; }

    // Store options as an array; votes will be stored as their index ("0", "1", …)
    await set(pollRef, { question: q, options, active: true, revealed: false, ts: Date.now() });
    await set(votesRef, {});  // clear any stale votes

    // Reset option count for next poll
    adminOptionCount = MIN_OPTIONS;
  }

  async function castVote(index, poll) {
    // index is a number (0–4); stored as a string key in Firebase
    const choice = String(index);
    myVote = choice;
    sessionStorage.setItem('nodice_poll_vote_ts', poll.ts);
    sessionStorage.setItem('nodice_poll_vote_choice', choice);

    // Disable all vote buttons immediately
    (poll.options || []).forEach((_, i) => {
      const btn = document.getElementById(`vote-btn-${i}`);
      if (btn) btn.disabled = true;
    });

    // Write to Firebase
    const voterRef = ref(db, `nodice/votes/${voterId}`);
    await set(voterRef, choice);

    // Show waiting screen
    renderAudienceAwaitingReveal(poll, index);

    // Watch for the reveal
    subscribeToVotes(poll, index);
  }

  async function revealResults() {
    const btn = document.getElementById('reveal-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Revealing…'; }
    await set(ref(db, 'nodice/poll/revealed'), true);
  }

  async function clearPoll() {
    await set(pollRef, { active: false });
    await set(votesRef, {});
    adminOptionCount = MIN_OPTIONS;
  }

  function subscribeToVotes(poll, myVoteIndex) {
    if (unsubVotes) unsubVotes();
    unsubVotes = onValue(votesRef, snap => {
      const latestPoll = currentPollSnap;
      const votes = snap.val() || {};
      if (latestPoll && latestPoll.revealed) {
        renderAudienceResults(latestPoll, votes, myVoteIndex);
      } else {
        renderAudienceAwaitingReveal(poll, myVoteIndex);
      }
    });
  }

  // ── MAIN REALTIME LISTENER ───────────────────────────────
  //
  // Both admin and audience listen to the poll document.
  // Poll document shape:
  //   { active: bool, question: string, options: string[], revealed: bool, ts: number }
  // Votes shape:
  //   { [voterId]: "0" | "1" | "2" | "3" | "4" }  (string index into options array)

  function startListening() {
    // Initial loading state
    cardBody.innerHTML = `<span class="spinner">⚔</span>`;
    hideFooter();

    onValue(pollRef, pollSnap => {
      const poll = pollSnap.val();
      currentPollSnap = poll;

      // ── ADMIN ──
      if (isAdmin) {
        if (!poll || !poll.active) {
          // No active poll — show the form
          if (unsubVotes) { unsubVotes(); unsubVotes = null; }
          renderAdminForm();
        } else {
          // Active poll — subscribe to votes and render correct state
          if (unsubVotes) unsubVotes();
          unsubVotes = onValue(votesRef, votesSnap => {
            const votes = votesSnap.val() || {};
            if (poll.revealed) {
              renderAdminPostReveal(poll, votes);
            } else {
              renderAdminPreReveal(poll, votes);
            }
          });
        }
        return;
      }

      // ── AUDIENCE ──
      if (!poll || !poll.active) {
        // Poll closed — clear any stored vote, show waiting screen
        sessionStorage.removeItem('nodice_poll_vote_ts');
        sessionStorage.removeItem('nodice_poll_vote_choice');
        myVote = null;
        if (unsubVotes) { unsubVotes(); unsubVotes = null; }
        renderAudienceWaiting();
        return;
      }

      // Check if this voter has already voted in THIS poll
      const storedTs     = sessionStorage.getItem('nodice_poll_vote_ts');
      const storedChoice = sessionStorage.getItem('nodice_poll_vote_choice');
      if (storedTs && parseInt(storedTs) === poll.ts && storedChoice !== null) {
        // storedChoice is a string like "0", "1", "2" — parse to number for renderers
        const storedIndex = parseInt(storedChoice);
        myVote = storedChoice;
        if (poll.revealed) {
          if (!unsubVotes) subscribeToVotes(poll, storedIndex);
          get(votesRef).then(snap => {
            renderAudienceResults(poll, snap.val() || {}, storedIndex);
          });
        } else {
          renderAudienceAwaitingReveal(poll, storedIndex);
          if (!unsubVotes) subscribeToVotes(poll, storedIndex);
        }
        return;
      }

      // Fresh vote needed
      if (unsubVotes) { unsubVotes(); unsubVotes = null; }
      myVote = null;
      renderAudienceVote(poll);
    }, (error) => {
      // Firebase read failed — show a clear error instead of freezing on spinner
      cardBody.innerHTML = `
        <span class="status-icon">⚠️</span>
        <p class="status-heading">Database Unreachable</p>
        <p class="status-body">
          Firebase returned: <code>${error.code}</code><br><br>
          Most likely your Realtime Database rules are blocking reads.<br><br>
          In Firebase Console → Realtime Database → Rules, set:<br>
          <code>{ "rules": { ".read": true, ".write": true } }</code>
        </p>`;
      showFooter(`<div class="source-badge demo"><span class="dot"></span>${error.code}</div>`);
    });
  }

  // ── RE-RENDER after admin toggle ─────────────────────────
  function rerenderForAdminChange() {
    const poll = currentPollSnap;
    if (unsubVotes) { unsubVotes(); unsubVotes = null; }
    if (isAdmin) {
      subtitle.textContent = 'Showrunner controls';
      if (!poll || !poll.active) {
        renderAdminForm();
      } else {
        unsubVotes = onValue(votesRef, snap => {
          const votes = snap.val() || {};
          if (poll.revealed) renderAdminPostReveal(poll, votes);
          else renderAdminPreReveal(poll, votes);
        });
      }
    } else {
      subtitle.textContent = 'The crowd decides';
      myVote = null;
      sessionStorage.removeItem('nodice_poll_vote_ts');
      sessionStorage.removeItem('nodice_poll_vote_choice');
      if (!poll || !poll.active) renderAudienceWaiting();
      else renderAudienceVote(poll);
    }
  }

  startListening();
}

// ============================================================
// HELPERS — utility functions used by both admin + audience
// ============================================================
function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Theme toggle ──────────────────────────────
function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  try { localStorage.setItem('vaultTheme', next); } catch(e) {}
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️' : '🌙';
}
(function(){
  const t = document.documentElement.getAttribute('data-theme') || 'dark';
  const btn = document.getElementById('themeBtn');
  if (btn) btn.textContent = t === 'dark' ? '☀️' : '🌙';
})();
</script>
</body>
</html>
