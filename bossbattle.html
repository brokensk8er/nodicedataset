<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <title>No Dice — Boss Battle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script>try{var _t=localStorage.getItem('vaultTheme')||'dark';if(_t!=='dark'&&_t!=='light'&&_t!=='nodice')_t='dark';document.documentElement.setAttribute('data-theme',_t);}catch(e){document.documentElement.setAttribute('data-theme','dark');}</script>
  <style>
    /* ── Page shell ──────────────────────────────────────────────────── */
    body.bossbattle-page {
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      min-height: 100vh; padding: 1rem;
    }

    /* ── Result glow from beneath (matches coinflip2) ────────────────── */
    body.bossbattle-page::before {
      content: ''; position: fixed; bottom: 0; left: 0; right: 0; height: 65vh;
      pointer-events: none; z-index: 0; opacity: 0; transition: opacity 0.9s ease;
    }
    body.bossbattle-page[data-result="pass"]::before {
      background: radial-gradient(ellipse 90% 70% at 50% 100%, rgba(0,166,81,0.42) 0%, transparent 100%);
      opacity: 1;
    }
    body.bossbattle-page[data-result="fail"]::before {
      background: radial-gradient(ellipse 90% 70% at 50% 100%, rgba(235,46,46,0.42) 0%, transparent 100%);
      opacity: 1;
    }

    /* ── Smoke (matches coinflip2) ───────────────────────────────────── */
    .smoke-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .smoke { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0; }
    .s1 { width:60vw; height:38vh; bottom:-8%; left:12%; background:radial-gradient(ellipse,rgba(255,255,255,0.055) 0%,transparent 70%); animation:smokeRise 18s ease-in-out infinite; }
    .s2 { width:48vw; height:30vh; bottom:-6%; left:42%; background:radial-gradient(ellipse,rgba(255,255,255,0.038) 0%,transparent 70%); animation:smokeRise 22s ease-in-out infinite -7s; }
    .s3 { width:36vw; height:24vh; bottom:-10%; left:62%; background:radial-gradient(ellipse,rgba(255,255,255,0.028) 0%,transparent 70%); animation:smokeRise 26s ease-in-out infinite -13s; }
    @keyframes smokeRise {
      0%   { opacity:0; transform:translateY(0) scaleX(1); }
      20%  { opacity:1; }
      65%  { opacity:0.5; transform:translateY(-22%) scaleX(1.18); }
      100% { opacity:0; transform:translateY(-40%) scaleX(0.88); }
    }

    /* ── Coin (ported from coinflip2, size reduced for in-page use) ──── */
    .bb-coin-stage { width:min(72vw,280px); height:min(72vw,280px); position:relative; margin:0.5rem auto; visibility:hidden; }
    .bb-coin { width:100%; height:100%; position:relative; }
    .bb-face {
      position:absolute; inset:0; border-radius:50%;
      display:flex; align-items:center; justify-content:center; overflow:hidden;
    }
    .bb-face-mystery {
      background: radial-gradient(circle at 38% 32%, #e2bc6a, rgba(156,123,46,1) 55%, rgba(120,95,35,1));
      box-shadow: inset 0 0 0 6px rgba(255,255,255,.18), inset 0 -8px 24px rgba(0,0,0,.3), 0 6px 28px rgba(201,168,76,.5);
    }
    .bb-face-fail { background:#000; box-shadow:0 6px 32px rgba(235,46,46,.55); }
    .bb-face-pass { background:#000; box-shadow:0 6px 28px rgba(0,166,81,.55); }
    .bb-face::before {
      content:''; position:absolute; inset:5px; border-radius:50%;
      border:2px solid rgba(255,255,255,.18); pointer-events:none; z-index:1;
    }
    .bb-face img { width:100%; height:100%; object-fit:cover; border-radius:50%; position:relative; z-index:2; }
    .bb-face-mystery svg { width:100%; height:100%; position:relative; z-index:2; }

    @keyframes bbCoinFlip {
      0%   { transform:scaleX(1); }
      50%  { transform:scaleX(0); }
      100% { transform:scaleX(1); }
    }
    .bb-coin.spinning { animation:bbCoinFlip var(--half-duration,0.2s) ease-in-out var(--flip-count,8) forwards; }
    @keyframes bbWobble {
      0%,100% { transform:scaleX(1) rotateZ(0deg); }
      20%     { transform:scaleX(1) rotateZ(2deg); }
      40%     { transform:scaleX(1) rotateZ(-1.5deg); }
      60%     { transform:scaleX(1) rotateZ(1deg); }
    }
    .bb-coin.wobbling { animation:bbWobble .5s ease-out forwards; }

    /* ── Cooldown sweep overlay (WoW-style clock wipe) ──────────────── */
    .bb-coin-overlay {
      position:absolute; inset:0; border-radius:50%;
      background: conic-gradient(rgba(0,0,0,0.65) 0deg 360deg);
      visibility:hidden; pointer-events:none; z-index:3;
    }

    /* ── Stacking: content above smoke/glow ─────────────────────────── */
    header, .attack-panel, footer { position:relative; z-index:1; }

    /* ── Game UI ─────────────────────────────────────────────────────── */
    .attack-panel   { max-width:500px; text-align:center; }
    .attack-status  { font-size:1.2rem; margin:1rem 0; min-height:3rem; }
    .result-text    { font-size:1.3rem; margin:1rem 0; font-weight:bold; min-height:2rem; }
    .btn-attack { padding:1rem 2rem; font-size:1.2rem; font-weight:bold; margin:1rem 0; cursor:pointer; border:2px solid var(--color-accent); background:transparent; color:var(--color-accent); border-radius:4px; transition:all 0.3s; }
    .btn-attack:hover:not(:disabled) { background:var(--color-accent); color:var(--color-bg); }
    .btn-attack:disabled  { opacity:0.5; cursor:not-allowed; }
    .btn-attack.rolling   { opacity:0.7; }

    /* ── Strike banner (shown to all players when dragon strikes) ── */
    #strikeBanner {
      position: fixed; top: 0; left: 0; right: 0; z-index: 400;
      background: linear-gradient(135deg, rgba(80,0,0,0.97), rgba(40,0,0,0.97));
      border-bottom: 2px solid #cc2200;
      color: #fff; font-family: 'Cinzel', serif; font-weight: 700;
      font-size: clamp(0.9rem, 3vw, 1.15rem);
      text-align: center; padding: 0.9rem 1.5rem;
      text-shadow: 0 0 10px rgba(255,80,0,0.7);
      transform: translateY(-110%); transition: transform 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
      pointer-events: none;
    }
    #strikeBanner.visible { transform: translateY(0); }

    /* ── Fire Bath overlay ─────────────────────────────────────── */
    #fireBathOverlay {
      position: fixed; inset: 0; z-index: 500;
      display: none; flex-direction: column;
      justify-content: center; align-items: center; gap: 1.2rem;
      animation: fire-bg-pulse 0.5s ease-in-out infinite alternate;
    }
    #fireBathOverlay.active { display: flex; }

    @keyframes fire-bg-pulse {
      from { background: radial-gradient(ellipse at 50% 110%, rgba(255,50,0,0.55) 0%, rgba(0,0,0,0.88) 100%); }
      to   { background: radial-gradient(ellipse at 50% 110%, rgba(255,120,0,0.75) 0%, rgba(70,0,0,0.93) 100%); }
    }

    /* CSS flame pillars at the bottom */
    .flames-row {
      position: absolute; bottom: 0; left: 0; right: 0; height: 45vh;
      overflow: hidden; pointer-events: none;
    }
    .flame {
      position: absolute; bottom: 0;
      border-radius: 50% 50% 20% 20% / 60% 60% 40% 40%;
      transform-origin: 50% 100%;
      filter: blur(2px);
      animation: flicker linear infinite;
    }
    @keyframes flicker {
      0%   { transform: scaleX(1.0) scaleY(1.0) rotate(-2deg); }
      20%  { transform: scaleX(1.1) scaleY(0.92) rotate(1.5deg); }
      45%  { transform: scaleX(0.9) scaleY(1.08) rotate(-1deg); }
      70%  { transform: scaleX(1.05) scaleY(0.96) rotate(2deg); }
      100% { transform: scaleX(1.0) scaleY(1.0) rotate(-2deg); }
    }
    .fl1  { left:3%;  width:90px;  height:170px; background:linear-gradient(to top,#ff0000,#ff6600,#ffcc00 80%,transparent); animation-duration:0.75s; }
    .fl2  { left:10%; width:140px; height:240px; background:linear-gradient(to top,#cc0000,#ff4400,#ff9900 80%,transparent); animation-duration:1.05s; animation-delay:-0.2s; }
    .fl3  { left:20%; width:100px; height:190px; background:linear-gradient(to top,#ff0000,#ff5500,#ffaa00 80%,transparent); animation-duration:0.85s; animation-delay:-0.5s; }
    .fl4  { left:30%; width:160px; height:270px; background:linear-gradient(to top,#dd0000,#ff3300,#ff8800 80%,transparent); animation-duration:1.2s;  animation-delay:-0.1s; }
    .fl5  { left:42%; width:120px; height:210px; background:linear-gradient(to top,#ff0000,#ff6600,#ffcc00 80%,transparent); animation-duration:0.9s;  animation-delay:-0.35s; }
    .fl6  { left:54%; width:150px; height:255px; background:linear-gradient(to top,#cc0000,#ff4400,#ff9900 80%,transparent); animation-duration:1.1s;  animation-delay:-0.6s; }
    .fl7  { left:66%; width:110px; height:195px; background:linear-gradient(to top,#ff0000,#ff5500,#ffaa00 80%,transparent); animation-duration:0.8s;  animation-delay:-0.15s; }
    .fl8  { left:76%; width:145px; height:235px; background:linear-gradient(to top,#dd0000,#ff3300,#ff8800 80%,transparent); animation-duration:1.0s;  animation-delay:-0.45s; }
    .fl9  { left:88%; width:100px; height:175px; background:linear-gradient(to top,#ff0000,#ff6600,#ffcc00 80%,transparent); animation-duration:0.7s;  animation-delay:-0.25s; }

    /* Fire bath content */
    .fire-title {
      font-family: 'Cinzel', serif; font-size: clamp(1.4rem, 5vw, 2.2rem);
      font-weight: 900; color: #fff;
      text-shadow: 0 0 20px rgba(255,80,0,1), 0 0 40px rgba(255,40,0,0.7);
      z-index: 1; text-align: center; padding: 0 1rem;
      animation: fire-text-flicker 0.4s ease-in-out infinite alternate;
    }
    @keyframes fire-text-flicker {
      from { text-shadow: 0 0 20px rgba(255,80,0,1),  0 0 40px rgba(255,40,0,0.7); }
      to   { text-shadow: 0 0 30px rgba(255,140,0,1), 0 0 60px rgba(255,80,0,0.9); }
    }

    .fire-cooldown-bar-wrap {
      width: min(80vw, 340px); z-index: 1;
      background: rgba(0,0,0,0.5); border-radius: 6px; overflow: hidden;
      border: 1px solid rgba(255,100,0,0.5); height: 12px;
    }
    #fireCooldownBar {
      height: 100%; width: 100%;
      background: linear-gradient(90deg, #ff2200, #ff8800);
      transition: width 0.1s linear;
    }
    .fire-cooldown-label {
      font-family: 'Cinzel', serif; color: rgba(255,200,100,0.9);
      font-size: 0.85rem; z-index: 1;
    }

    .btn-smash {
      z-index: 1; padding: 1.2rem 2.8rem;
      font-family: 'Cinzel', serif; font-size: clamp(1.2rem, 4vw, 1.7rem);
      font-weight: 900; color: #fff; letter-spacing: 0.05em;
      background: linear-gradient(135deg, #ff4400, #cc1100);
      border: 3px solid #ff8800; border-radius: 8px; cursor: pointer;
      text-shadow: 0 0 12px rgba(255,120,0,0.9);
      box-shadow: 0 0 30px rgba(255,60,0,0.7), inset 0 1px 0 rgba(255,200,0,0.3);
      animation: smash-pulse 0.55s ease-in-out infinite alternate;
      user-select: none; -webkit-user-select: none; touch-action: manipulation;
      transition: transform 0.08s ease, box-shadow 0.08s ease;
    }
    @keyframes smash-pulse {
      from { transform: scale(1);    box-shadow: 0 0 30px rgba(255,60,0,0.7); }
      to   { transform: scale(1.04); box-shadow: 0 0 55px rgba(255,100,0,0.95); }
    }
    .btn-smash:active { transform: scale(0.94) !important; box-shadow: 0 0 15px rgba(255,60,0,0.5) !important; }
    .smash-counter {
      font-family: 'Cinzel', serif; color: rgba(255,200,100,0.8);
      font-size: 0.9rem; z-index: 1;
    }
  </style>
</head>
<body class="bossbattle-page">

<div class="smoke-wrap" aria-hidden="true">
  <div class="smoke s1"></div>
  <div class="smoke s2"></div>
  <div class="smoke s3"></div>
</div>

<button id="themeBtn" class="theme-toggle-btn" onclick="toggleTheme()" aria-label="Toggle light/dark mode"></button>

<header>
  <p class="site-label">No Dice &mdash; Improv RPG</p>
  <h1>Boss <span>Battle</span></h1>
  <p class="subtitle">Attack the dragon. Work together to bring it down.</p>
  <div class="divider"></div>
</header>

<main class="attack-panel">
  <div id="authPanel" style="visibility:hidden; position:absolute; width:100%; text-align:center;"><p>Loading authentication...</p></div>
  <div id="gamePanel" style="visibility:hidden;">
    <p class="attack-status" id="attackStatus">Ready to attack!</p>

    <div class="bb-coin-stage" id="coinStage" aria-live="polite" aria-label="Coin result">
      <div class="bb-coin" id="coin">
        <div class="bb-face bb-face-mystery" id="coinFace" aria-hidden="true">
          <svg viewBox="0 0 110 110" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="55,22 86,39 86,71 55,88 24,71 24,39"
              stroke="rgba(255,255,255,0.20)" stroke-width="1.5" fill="none"/>
            <text x="55" y="70" text-anchor="middle"
              font-family="Georgia, serif" font-size="52" font-weight="bold"
              fill="rgba(26,26,46,0.75)">?</text>
          </svg>
        </div>
      </div>
      <div class="bb-coin-overlay" id="coinOverlay" aria-hidden="true"></div>
    </div>

    <div id="resultText" class="result-text" style="visibility:hidden;"></div>
    <button class="btn-roll btn-attack" id="btnAttack">&#9876; Attack the Dragon</button>
  </div>
</main>

<!-- ── Strike banner ─────────────────────────────────── -->
<div id="strikeBanner" aria-live="assertive"></div>

<!-- ── Fire Bath overlay ─────────────────────────────── -->
<div id="fireBathOverlay" role="alert" aria-live="assertive">
  <div class="flames-row" aria-hidden="true">
    <div class="flame fl1"></div><div class="flame fl2"></div><div class="flame fl3"></div>
    <div class="flame fl4"></div><div class="flame fl5"></div><div class="flame fl6"></div>
    <div class="flame fl7"></div><div class="flame fl8"></div><div class="flame fl9"></div>
  </div>
  <div class="fire-title">🔥 THE DRAGON BREATHES FIRE! 🔥</div>
  <div class="fire-cooldown-bar-wrap"><div id="fireCooldownBar"></div></div>
  <div class="fire-cooldown-label" id="fireCooldownLabel">Recovering…</div>
  <button class="btn-smash" id="btnSmash">⚡ SMASH! ⚡</button>
  <div class="smash-counter" id="smashCounter"></div>
</div>

<footer><a class="nav-link" href="index.html">← Back to the Vault</a></footer>

<script type="module">
  import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getDatabase, ref, set, get, update, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
  import { MYSTERY_SVG, FAIL_IMG, PASS_IMG } from './coin-asset.js';

  const ENCOUNTER_ID = 'dragon';
  const DB_ROOT      = 'nodice/encounters';
  const FAIL_LINES   = ["The fates are unmoved.","Even heroes stumble.","The dice gods demand drama.","Not today, adventurer.","The stars were otherwise engaged."];
  const PASS_LINES   = ["Fortune favours the bold.","The fates smile upon thee.","A hero's moment — take it.","The stars aligned for you.","Victory tastes sweet today."];

  const FIREBASE_CONFIG = {
    apiKey:"AIzaSyAXcvi644izGZhK8nPGlkfV4vAc3ZWPH8w",authDomain:"nodicetools.firebaseapp.com",
    databaseURL:"https://nodicetools-default-rtdb.firebaseio.com",projectId:"nodicetools",
    storageBucket:"nodicetools.firebasestorage.app",messagingSenderId:"387258889697",
    appId:"1:387258889697:web:5467488ab109ea67b74ea0",
  };

  const _appName = 'ndt-profile';
  const _app  = getApps().find(a => a.name === _appName) ?? initializeApp(FIREBASE_CONFIG, _appName);
  const _auth = getAuth(_app);
  const _db   = getDatabase(_app);

  const authPanel    = document.getElementById('authPanel');
  const gamePanel    = document.getElementById('gamePanel');
  const btnAttack    = document.getElementById('btnAttack');
  const attackStatus = document.getElementById('attackStatus');
  const coinStage    = document.getElementById('coinStage');
  const coin         = document.getElementById('coin');
  const coinFace     = document.getElementById('coinFace');
  const resultText   = document.getElementById('resultText');
  const coinOverlay   = document.getElementById('coinOverlay');

  // ── Coin face helpers ─────────────────────────────────────────────────
  function setFaceMystery() {
    coinFace.className = 'bb-face bb-face-mystery';
    coinFace.innerHTML = MYSTERY_SVG;
  }
  function setFaceFail() {
    coinFace.className = 'bb-face bb-face-fail';
    coinFace.innerHTML = `<img src="${FAIL_IMG}" alt="fail" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
  }
  function setFacePass() {
    coinFace.className = 'bb-face bb-face-pass';
    coinFace.innerHTML = `<img src="${PASS_IMG}" alt="pass" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
  }

  // ── Auth ──────────────────────────────────────────────────────────────
  let currentUserId = null, isRolling = false, cooldownUntil = 0;

  onAuthStateChanged(_auth, user => {
    if (!user) {
      authPanel.style.visibility = 'visible';
      authPanel.innerHTML = '<p>Please <a href="profile.html">sign in</a> to join the battle.</p>';
      gamePanel.style.visibility = 'hidden';
      return;
    }
    currentUserId = user.uid;
    authPanel.style.visibility = 'hidden';
    gamePanel.style.visibility = 'visible';
    const displayName = user.displayName || user.email?.split('@')[0] || 'An adventurer';
    set(ref(_db, `${DB_ROOT}/${ENCOUNTER_ID}/activePlayers/${user.uid}`),
      { lastAttackTime: Date.now(), onCooldown: false, cooldownUntil: 0, displayName }).catch(console.error);
    listenToBossEvents();
  });

  // ── Attack handler ────────────────────────────────────────────────────
  btnAttack.addEventListener('click', async () => {
    if (isRolling || !currentUserId) return;
    if (Date.now() < cooldownUntil) { attackStatus.textContent = 'You are still recovering...'; return; }

    isRolling = true;
    btnAttack.disabled = true;
    btnAttack.classList.add('rolling');
    resultText.style.visibility = 'hidden';
    attackStatus.textContent = 'Rolling...';
    document.body.removeAttribute('data-result');

    const rollResult = Math.random() < 0.5 ? 'go_time' : 'no_time';
    await animateCoinFlip(rollResult === 'go_time');

    try {
      const snap = await get(ref(_db, `${DB_ROOT}/${ENCOUNTER_ID}`));
      if (!snap.exists()) {
        attackStatus.textContent = 'Encounter not found!';
        isRolling = false; btnAttack.disabled = false; btnAttack.classList.remove('rolling');
        return;
      }
      const encounter = snap.val(), updates = {};
      if (rollResult === 'go_time') {
        const newHP = Math.max(0, encounter.dragonHP - 1);
        updates[`${DB_ROOT}/${ENCOUNTER_ID}/dragonHP`] = newHP;
        if (newHP <= 0) updates[`${DB_ROOT}/${ENCOUNTER_ID}/status`] = 'defeated';
        resultText.textContent = PASS_LINES[Math.floor(Math.random() * PASS_LINES.length)];
        attackStatus.textContent = 'Hit! The dragon takes damage!';
      } else {
        resultText.textContent = FAIL_LINES[Math.floor(Math.random() * FAIL_LINES.length)];
        attackStatus.textContent = 'Miss! The dragon is unimpressed.';
      }
      resultText.style.visibility = 'visible';
      cooldownUntil = Date.now() + 2000;
      startCooldownTimer();
      if (Object.keys(updates).length > 0) await update(ref(_db), updates);
    } catch (err) {
      console.error('Attack error:', err);
      attackStatus.textContent = 'Error sending attack. Try again.';
    }

    isRolling = false;
    btnAttack.classList.remove('rolling');
  });

  // ── Coin flip animation (coinflip2 logic, setTimeout-based) ──────────
  function animateCoinFlip(isPass) {
    return new Promise(resolve => {
      // Reset
      document.body.removeAttribute('data-result');
      coin.classList.remove('spinning', 'wobbling');
      coin.style.transform = '';
      setFaceMystery();
      coinStage.style.visibility = 'visible';

      // Randomise duration exactly as coinflip2 does
      const flips   = 5 + Math.floor(Math.random() * 4);   // 5–8 full flips
      const halfDur = 0.13 + Math.random() * 0.04;          // 0.13–0.17 s per cycle
      const iters   = flips - 0.5;                           // land face-down mid-cycle
      const totalMs = Math.round(halfDur * iters * 1000);

      coin.style.setProperty('--half-duration', halfDur + 's');
      coin.style.setProperty('--flip-count',    iters);

      // Force reflow so removing/adding classes restarts animation cleanly
      void coin.offsetWidth;
      coin.classList.add('spinning');

      // Wait for the exact animation duration, then reveal face
      setTimeout(() => {
        coin.classList.remove('spinning');
        coin.style.transform = '';

        if (isPass) setFacePass(); else setFaceFail();

        // Brief pause then wobble + glow
        setTimeout(() => {
          void coin.offsetWidth;
          coin.classList.add('wobbling');
          document.body.setAttribute('data-result', isPass ? 'pass' : 'fail');
          setTimeout(() => {
            coin.classList.remove('wobbling');
            resolve();
          }, 520);
        }, 60);

      }, totalMs);
    });
  }

  // ── Cooldown sweep (WoW-style clock wipe) ────────────────────────────
  // 0–500ms: face visible, no overlay; then sweep clears from 12 o'clock
  function startCooldownTimer(durationMs = 1500) {
    btnAttack.disabled = true;
    cooldownUntil = Date.now() + durationMs;
    const sweepDuration = Math.max(0, durationMs - 500);
    setTimeout(() => {
      if (sweepDuration <= 0) { btnAttack.disabled = false; attackStatus.textContent = 'Ready to attack!'; return; }
      coinOverlay.style.visibility = 'visible';
      const start = Date.now();
      (function frame() {
        const progress = Math.min((Date.now() - start) / sweepDuration, 1);
        const deg = progress * 360;
        coinOverlay.style.background =
          `conic-gradient(transparent 0deg ${deg}deg, rgba(0,0,0,0.65) ${deg}deg 360deg)`;
        if (progress < 1) {
          requestAnimationFrame(frame);
        } else {
          coinOverlay.style.visibility = 'hidden';
          btnAttack.disabled = false;
          attackStatus.textContent = 'Ready to attack!';
        }
      })();
    }, 500);
  }

  // ── Boss event listener ───────────────────────────────────────────────
  let lastHandledEventId = null;

  function listenToBossEvents() {
    onValue(ref(_db, `${DB_ROOT}/${ENCOUNTER_ID}/bossEvent`), snapshot => {
      if (!snapshot.exists()) return;
      const event = snapshot.val();

      // Ignore stale events (cooldown already expired) and duplicates
      if (!event?.id) return;
      if (event.id === lastHandledEventId) return;
      if (Date.now() > event.cooldownUntil) return;
      lastHandledEventId = event.id;

      if (event.type === 'strike') handleStrike(event);
      else if (event.type === 'fireBath') handleFireBath(event);
    });
  }

  // ── Strike: one targeted player gets 10s cooldown ─────────────────────
  function handleStrike(event) {
    showStrikeBanner(`⚔️ ${event.targetName} was struck a mighty blow by the dragon!`);
    if (event.target === currentUserId) {
      attackStatus.textContent = 'You were struck! Recovering…';
      cooldownUntil = event.cooldownUntil;
      startCooldownTimer(event.cooldownMs ?? 10_000);
    }
  }

  function showStrikeBanner(msg) {
    const banner = document.getElementById('strikeBanner');
    banner.textContent = msg;
    banner.classList.add('visible');
    setTimeout(() => banner.classList.remove('visible'), 5000);
  }

  // ── Fire Bath: all players, 5s cooldown with smash-to-reduce ─────────
  let fireBathCooldownUntil = 0;
  let fireBathRafId         = null;
  let smashCount            = 0;
  let fireBathOriginalMs    = 5000;

  function handleFireBath(event) {
    fireBathOriginalMs    = event.cooldownMs ?? 5_000;
    fireBathCooldownUntil = event.cooldownUntil;
    smashCount            = 0;
    cooldownUntil         = fireBathCooldownUntil;
    btnAttack.disabled    = true;
    attackStatus.textContent = '🔥 Scorched by dragonfire!';

    document.getElementById('smashCounter').textContent = '';
    document.getElementById('fireBathOverlay').classList.add('active');
    document.getElementById('btnSmash').focus();

    runFireBathBar(event.smashReductionMs ?? 200);
  }

  function runFireBathBar(reductionMs) {
    cancelAnimationFrame(fireBathRafId);
    const bar   = document.getElementById('fireCooldownBar');
    const label = document.getElementById('fireCooldownLabel');

    (function frame() {
      const remaining = Math.max(0, fireBathCooldownUntil - Date.now());
      const pct       = (remaining / fireBathOriginalMs) * 100;
      bar.style.width = pct + '%';
      const secs = (remaining / 1000).toFixed(1);
      label.textContent = remaining > 0 ? `${secs}s remaining` : 'Recovered!';

      if (remaining > 0) {
        fireBathRafId = requestAnimationFrame(frame);
      } else {
        endFireBath();
      }
    })();

    // Smash button
    const btnSmash    = document.getElementById('btnSmash');
    const smashCnt    = document.getElementById('smashCounter');
    // Remove previous listener by cloning
    const newSmash = btnSmash.cloneNode(true);
    btnSmash.parentNode.replaceChild(newSmash, btnSmash);
    newSmash.addEventListener('click', () => {
      fireBathCooldownUntil = Math.max(Date.now(), fireBathCooldownUntil - reductionMs);
      smashCount++;
      smashCnt.textContent = `Smashed ${smashCount}×  (−${(smashCount * reductionMs / 1000).toFixed(1)}s)`;
    });
  }

  function endFireBath() {
    document.getElementById('fireBathOverlay').classList.remove('active');
    coinOverlay.style.visibility = 'hidden';
    cooldownUntil  = 0;
    btnAttack.disabled = false;
    attackStatus.textContent = 'Ready to attack!';
  }
</script>
<script src="theme-toggle.js"></script>
</body>
</html>
