<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<title>No Dice — QR Code</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<!-- Shared styles (colours, fonts, buttons, badges, animations) -->
<link rel="stylesheet" href="styles.css">
<!-- Prevent theme flash: apply saved theme before first paint -->
<script>try{var _t=localStorage.getItem('vaultTheme')||'dark';document.documentElement.setAttribute('data-theme',_t);}catch(e){document.documentElement.setAttribute('data-theme','dark');}</script>
<style>
  /* ── Page layout ── */
  html, body { height: 100%; }

  body {
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  /* ── Header ── */
  header {
    text-align: center;
    padding: 10px 16px 6px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  /* ── Main ── */
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    overflow: hidden;
  }

  /* ── QR card ── */
  .qr-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 24px 24px 20px;
    box-shadow: 0 6px 32px var(--shadow);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    width: 100%;
    max-width: 320px;
  }

  .qr-title {
    font-family: 'Cinzel', serif;
    font-size: .7rem;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--gold-dim);
    text-align: center;
  }

  .qr-img {
    width: 100%;
    max-height: 60vh;
    object-fit: contain;
    border-radius: 10px;
    cursor: pointer;
    display: block;
  }

  .qr-hint {
    font-size: .72rem;
    color: var(--muted);
    text-align: center;
    line-height: 1.5;
    margin: 0;
  }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 10px 16px 14px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
</style>
</head>
<body>

<!-- Theme toggle — sun/moon light/dark switch (CSS in styles.css) -->
<button id="themeBtn" class="theme-toggle-btn" onclick="toggleTheme()" aria-label="Toggle light/dark mode"></button>

<header>
  <p class="site-label">No Dice &mdash; Improv RPG</p>
  <h1>The <span>QR Code</span></h1>
  <p class="subtitle">One scan. The whole Vault.</p>
  <div class="header-divider"></div>
</header>

<main>
  <div class="qr-card">
    <p class="qr-title">Scan to Open the Vault</p>
    <img class="qr-img" src="qr.png" alt="No Dice QR Code" onclick="document.getElementById('qr-lightbox').style.display='flex'">
    <p class="qr-hint">Tap to enlarge &middot; Scan to open the Vault on your phone.</p>
  </div>
</main>

<footer>
  <a class="nav-link" href="index.html">&larr; Back to the Vault</a>
</footer>

<!-- QR lightbox overlay — tap anywhere to dismiss -->
<div id="qr-lightbox" onclick="this.style.display='none'" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;align-items:center;justify-content:center;cursor:pointer;">
  <img src="qr.png" alt="No Dice QR Code" style="max-width:95vmin;max-height:95vmin;border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6);">
</div>

<script>
// ── Theme toggle ──────────────────────────────
function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  try { localStorage.setItem('vaultTheme', next); } catch(e) {}
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️' : '🌙';
}
(function(){
  const t = document.documentElement.getAttribute('data-theme') || 'dark';
  const btn = document.getElementById('themeBtn');
  if (btn) btn.textContent = t === 'dark' ? '☀️' : '🌙';
})();
</script>
<script type="module">
import { mountProfileButton } from './profile-auth.js';
mountProfileButton();
</script>
</body>
</html>
