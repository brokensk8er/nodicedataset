<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>No Dice — QR Code</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<!-- Shared styles (colours, fonts, buttons, badges, animations) -->
<link rel="stylesheet" href="styles.css">
<style>
  /* ── Page layout ── */
  html, body { height: 100%; }

  body {
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  /* ── Header ── */
  header {
    text-align: center;
    padding: 10px 16px 6px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  /* ── Main ── */
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  /* ── QR card ── */
  .qr-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px 24px 24px;
    box-shadow: 0 6px 32px var(--shadow);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    width: 100%;
    max-width: 320px;
  }

  .qr-canvas-wrap {
    border-radius: 50%;
    overflow: hidden;
    box-shadow: 0 0 0 6px #d42020, 0 4px 24px rgba(212,32,32,.35);
    line-height: 0;
  }

  .qr-title {
    font-family: 'Cinzel', serif;
    font-size: .7rem;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--gold-dim);
    text-align: center;
  }

  .qr-hint {
    font-size: .72rem;
    color: var(--muted);
    text-align: center;
    line-height: 1.5;
    margin: 0;
  }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 10px 16px 14px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
</style>
</head>
<body>

<header>
  <p class="site-label">No Dice &mdash; Improv D&amp;D</p>
  <h1>The <span>QR Code</span></h1>
  <p class="tagline">One scan. The whole Vault.</p>
  <div class="header-divider"></div>
</header>

<main>
  <div class="qr-card">
    <p class="qr-title">Scan to Open the Vault</p>
    <div class="qr-canvas-wrap"><canvas id="qr-canvas"></canvas></div>
    <p class="qr-hint">Point your phone camera here<br>to jump straight to the tools.</p>
  </div>
</main>

<footer>
  <a class="nav-link" href="index.html">&larr; Back to the Vault</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  const qrCanvas = document.getElementById('qr-canvas');
  const qrUrl = window.location.href;
  QRCode.toCanvas(qrCanvas, qrUrl, {
    width: 240, margin: 1,
    errorCorrectionLevel: 'H',
    color: { dark: '#111111', light: '#d42020' }
  }, function() {
    const qrCtx = qrCanvas.getContext('2d');
    const cx = qrCanvas.width / 2, cy = qrCanvas.height / 2;
    const r = qrCanvas.width * 0.17;
    qrCtx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (i * 60 - 30) * Math.PI / 180;
      i === 0 ? qrCtx.moveTo(cx + r * Math.cos(a), cy + r * Math.sin(a))
              : qrCtx.lineTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
    }
    qrCtx.closePath();
    qrCtx.fillStyle = '#ffffff'; qrCtx.fill();
    qrCtx.fillStyle = '#111111';
    qrCtx.font = `bold ${Math.round(r * 1.3)}px Georgia, serif`;
    qrCtx.textAlign = 'center'; qrCtx.textBaseline = 'middle';
    qrCtx.fillText('!', cx, cy - r * 0.05);
  });
});
</script>
</body>
</html>
