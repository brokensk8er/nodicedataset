<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
  <title>No Dice — Dragon Lair (Backdrop)</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@4.0.0/dist/phaser.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    .hidden { display: none !important; }
    body {
      font-family: 'Cinzel', serif;
      overflow: hidden;
      background: #0a0005;
      /* pixel art background support — properties are no-ops until backgroundImage is set */
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #gameContainer {
      width: 100vw;
      height: 100vh;
    }

    /* ── Vignette overlay — intensifies at low HP via JS class ── */
    #vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(120,0,0,0) 100%);
      transition: background 1s ease;
    }
    #vignette.low-hp {
      background: radial-gradient(ellipse at center, transparent 30%, rgba(120,0,0,0.45) 100%);
    }
    #vignette.critical-hp {
      background: radial-gradient(ellipse at center, transparent 20%, rgba(160,0,0,0.7) 100%);
      animation: vignette-pulse 1.2s ease-in-out infinite alternate;
    }
    @keyframes vignette-pulse {
      from { opacity: 0.7; }
      to   { opacity: 1.0; }
    }

    /* ── HUD top-left ── */
    .ui-overlay {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #daa520;
      font-family: 'Cinzel', serif;
      font-size: 16px;
      background: rgba(0,0,0,0.65);
      padding: 10px 16px;
      border-radius: 4px;
      border: 1px solid rgba(218,165,32,0.3);
      z-index: 50;
    }

    /* ── Status banner ── */
    .status-text {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: #daa520;
      font-family: 'Cinzel', serif;
      font-size: 20px;
      text-align: center;
      background: rgba(0,0,0,0.8);
      padding: 15px 25px;
      border-radius: 4px;
      display: none;
      z-index: 100;
    }

    /* ── Victory screen ── */
    .victory-screen {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, #2a0000 0%, #000000 100%);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #daa520;
      font-family: 'Cinzel', serif;
      z-index: 200;
    }
    .victory-screen.active {
      display: flex;
    }
    .victory-skull {
      font-size: 120px;
      animation: skull-drop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }
    .victory-title {
      font-size: 52px;
      font-weight: 900;
      margin: 20px 0 10px;
      text-shadow: 0 0 30px rgba(218,165,32,0.8), 0 0 60px rgba(218,165,32,0.4);
      animation: text-glow-in 0.8s 0.4s ease both;
    }
    .victory-sub {
      font-size: 22px;
      opacity: 0.7;
      animation: text-glow-in 0.8s 0.8s ease both;
    }
    @keyframes skull-drop {
      from { transform: scale(0) rotate(-20deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg);   opacity: 1; }
    }
    @keyframes text-glow-in {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    /* ── Boss speech bubble ─────────────────────────────────────── */
    .boss-speech-bubble {
      position: absolute;
      top: 12%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 60;
      background: rgba(20, 10, 0, 0.93);
      border: 2px solid rgba(218, 165, 32, 0.7);
      border-radius: 16px;
      padding: 16px 28px;
      max-width: min(500px, 80vw);
      color: #f5e6c8;
      font-family: 'Cinzel', serif;
      font-size: clamp(16px, 2.4vw, 24px);
      text-align: center;
      line-height: 1.45;
      box-shadow: 0 0 40px rgba(218, 165, 32, 0.22), inset 0 0 20px rgba(0,0,0,0.5);
      pointer-events: none;
      animation: speech-in 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }
    /* Bubble tail pointing down (toward dragon) */
    .boss-speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -16px;
      left: 50%;
      transform: translateX(-50%);
      border: 9px solid transparent;
      border-top-color: rgba(218, 165, 32, 0.7);
    }
    .boss-speech-bubble::before {
      content: '';
      position: absolute;
      bottom: -13px;
      left: 50%;
      transform: translateX(-50%);
      border: 7px solid transparent;
      border-top-color: rgba(20, 10, 0, 0.93);
      z-index: 1;
    }
    @keyframes speech-in {
      from { opacity: 0; transform: translateX(-50%) scale(0.85) translateY(8px); }
      to   { opacity: 1; transform: translateX(-50%) scale(1)    translateY(0); }
    }

    /* ── Boss name display ──────────────────────────────────────── */
    .boss-name-display {
      position: absolute;
      top: 62%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      color: #daa520;
      font-family: 'Cinzel', serif;
      font-size: clamp(20px, 3vw, 30px);
      font-weight: 700;
      text-shadow: 0 0 20px rgba(218, 165, 32, 0.55), 0 2px 8px rgba(0,0,0,0.9);
      pointer-events: none;
      white-space: nowrap;
    }

    /* ── Ability flash overlay ──────────────────────────────────── */
    .boss-ability-flash {
      position: absolute;
      inset: 0;
      z-index: 80;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      animation: ability-bg 2.5s ease-out forwards;
    }
    @keyframes ability-bg {
      0%   { background: rgba(255, 100, 0, 0.28); }
      25%  { background: rgba(255, 100, 0, 0.08); }
      100% { background: rgba(0,   0,   0, 0); }
    }
    .ability-flash-name {
      font-family: 'Cinzel', serif;
      font-size: clamp(36px, 7vw, 68px);
      font-weight: 700;
      color: #ffcc00;
      text-shadow: 0 0 40px rgba(255, 165, 0, 0.9), 0 0 80px rgba(255, 80, 0, 0.5);
      text-align: center;
      padding: 0 1rem;
      animation: ability-text 2.5s ease-out forwards;
    }
    @keyframes ability-text {
      0%   { opacity: 1;   transform: scale(1.3); }
      20%  { opacity: 1;   transform: scale(1);   }
      70%  { opacity: 0.8; transform: scale(1);   }
      100% { opacity: 0;   transform: scale(0.9); }
    }
  </style>
</head>
<body>

<div id="gameContainer"></div>
<div id="vignette"></div>

<!-- Boss control display elements (driven by bosscontrol.html via Firebase) -->
<div id="boss-speech" class="boss-speech-bubble hidden">
  <span id="boss-speech-text"></span>
</div>
<div id="boss-name-display" class="boss-name-display hidden"></div>
<div id="ability-flash" class="boss-ability-flash hidden">
  <div class="ability-flash-name"></div>
</div>

<div class="ui-overlay" id="uiOverlay">
  <div>Players: <span id="playerCount">0</span></div>
  <div>Dragon HP: <span id="dragonHP">100</span> / <span id="dragonMaxHP">100</span></div>
</div>

<div class="status-text" id="statusText"></div>

<div class="victory-screen" id="victoryScreen">
  <div class="victory-skull">💀</div>
  <div class="victory-title">The Dragon is Defeated!</div>
  <div class="victory-sub">Redirecting…</div>
</div>

<script type="module">
  import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

  // ── Firebase ──────────────────────────────────────────────────
  const FIREBASE_CONFIG = {
    apiKey:            "AIzaSyAXcvi644izGZhK8nPGlkfV4vAc3ZWPH8w",
    authDomain:        "nodicetools.firebaseapp.com",
    databaseURL:       "https://nodicetools-default-rtdb.firebaseio.com",
    projectId:         "nodicetools",
    storageBucket:     "nodicetools.firebasestorage.app",
    messagingSenderId: "387258889697",
    appId:             "1:387258889697:web:5467488ab109ea67b74ea0",
  };
  const _appName = 'ndt-boss-display';
  const _app = getApps().find(a => a.name === _appName) ?? initializeApp(FIREBASE_CONFIG, _appName);
  const _db  = getDatabase(_app);

  // ── Constants ─────────────────────────────────────────────────
  const ENCOUNTER_ID  = 'dragon';
  const DB_ROOT       = 'nodice/encounters';
  const DRAGON_EMOJI  = '🐉';
  const BAR_W         = 420;
  const BAR_H         = 38;
  const BAR_SEGMENTS  = 10;

  // ── Scene state ───────────────────────────────────────────────
  let phaserScene;
  let dragonSprite;
  let dragonImageSprite = null;
  let bgMain, bgLava, bgRocks, bgStals;
  let healthBarBg, healthBarGhost, healthBarFg, healthBarBorder;
  let healthBarText;
  let dragonMaxHP         = 500;
  let dragonCurrentHP     = 500;
  let dragonGhostHP       = 500;   // lags behind for ghost bar
  let animationQueue      = [];
  let isAnimating         = false;
  let lastAbilityTimestamp = 0;

  // ── Pixel art backgrounds ──────────────────────────────────────
  // To add a new background:
  //   1. Drop a PNG into the backgrounds/ folder
  //   2. Add an entry here and in BOSS_BACKGROUNDS in bosscontrol.html
  // scale: 'cover' fills the screen (may crop); 'contain' letterboxes (shows full image)
  const PIXEL_BACKGROUNDS = {
    // 'ff6-narshe':  { src: 'backgrounds/ff6-narshe.png',   scale: 'cover' },
    // 'ff6-opera':   { src: 'backgrounds/ff6-opera.png',    scale: 'cover' },
    // 'ff4-baron':   { src: 'backgrounds/ff4-baron.png',    scale: 'cover' },
    // 'ct-zeal':     { src: 'backgrounds/ct-zeal.png',      scale: 'cover' },
    // 'ct-magus':    { src: 'backgrounds/ct-magus.png',     scale: 'cover' },
    // 'loz-dungeon': { src: 'backgrounds/loz-dungeon.png',  scale: 'cover' },
  };

  // ── Background theme palettes ─────────────────────────────────
  const BACKGROUND_THEMES = {
    cave:    { top: 0x0a0015, bot: 0x1a0500, lava: 0xcc2200, lavaAlpha: 0.55 },
    volcano: { top: 0x1a0000, bot: 0x3a0400, lava: 0xff4400, lavaAlpha: 0.70 },
    ice:     { top: 0x000820, bot: 0x001428, lava: 0x0088cc, lavaAlpha: 0.30 },
    ruins:   { top: 0x0e0a00, bot: 0x1a1200, lava: 0x886600, lavaAlpha: 0.40 },
    abyss:   { top: 0x000008, bot: 0x080015, lava: 0x6600cc, lavaAlpha: 0.40 },
    forest:  { top: 0x000800, bot: 0x001a00, lava: 0x003300, lavaAlpha: 0.30 },
  };

  // ── Phaser setup ──────────────────────────────────────────────
  const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    parent: 'gameContainer',
    transparent: true,          // let CSS body bg show through
    scene: { create, update },
  };
  const game = new Phaser.Game(config);

  // ─────────────────────────────────────────────────────────────
  // CREATE
  // ─────────────────────────────────────────────────────────────
  function create() {
    phaserScene = this;
    const { centerX: cx, centerY: cy } = this.cameras.main;

    buildBackground(cx, cy);
    buildEmbers();
    buildFog(cx, cy);
    buildDragon(cx, cy);
    buildHealthBar(cx, cy);
    startDragonIdle();
    listenToDragonState();
  }

  // ── Background: cave gradient via Graphics ────────────────────
  function buildBackground(cx, cy) {
    bgMain = phaserScene.add.graphics();
    const w = phaserScene.scale.width;
    const h = phaserScene.scale.height;

    // deep cave gradient: dark purple top → near-black mid → lava glow bottom
    bgMain.fillGradientStyle(0x0a0015, 0x0a0015, 0x1a0500, 0x1a0500, 1);
    bgMain.fillRect(0, 0, w, h);

    // lava glow at the very bottom
    bgLava = phaserScene.add.graphics();
    bgLava.fillGradientStyle(0x000000, 0x000000, 0xcc2200, 0xcc2200, 0, 0, 0.55, 0.55);
    bgLava.fillRect(0, h * 0.72, w, h * 0.28);

    // subtle rock silhouette stalactites at top
    bgRocks = phaserScene.add.graphics();
    bgRocks.fillStyle(0x050008, 1);
    const stalactites = [
      [0, 0, 80, 0, 40, 90],
      [60, 0, 160, 0, 110, 120],
      [140, 0, 220, 0, 180, 75],
      [w - 200, 0, w - 120, 0, w - 160, 100],
      [w - 110, 0, w - 30, 0, w - 70, 80],
      [w - 30, 0, w + 10, 0, w - 10, 60],
    ];
    stalactites.forEach(([x1, y1, x2, y2, tx, ty]) => {
      bgRocks.fillTriangle(x1, y1, x2, y2, tx, ty);
    });

    // stalagmites at bottom
    bgStals = phaserScene.add.graphics();
    bgStals.fillStyle(0x050008, 1);
    const stalagmites = [
      [0, h, 70, h, 35, h - 80],
      [55, h, 130, h, 92, h - 110],
      [w - 130, h, w - 50, h, w - 90, h - 95],
      [w - 60, h, w, h, w - 30, h - 70],
    ];
    stalagmites.forEach(([x1, y1, x2, y2, tx, ty]) => {
      bgStals.fillTriangle(x1, y1, x2, y2, tx, ty);
    });
  }

  // ── Ember particles ───────────────────────────────────────────
  function buildEmbers() {
    const w = phaserScene.scale.width;
    const h = phaserScene.scale.height;

    // create a tiny circle texture for embers
    const gfx = phaserScene.make.graphics({ x: 0, y: 0, add: false });
    gfx.fillStyle(0xffffff, 1);
    gfx.fillCircle(4, 4, 4);
    gfx.generateTexture('ember', 8, 8);
    gfx.destroy();

    phaserScene.add.particles(w / 2, h + 10, 'ember', {
      x: { min: -w / 2, max: w / 2 },
      y: { min: 0, max: 20 },
      lifespan: { min: 2500, max: 5000 },
      speedY: { min: -120, max: -40 },
      speedX: { min: -25, max: 25 },
      scale: { start: 0.6, end: 0 },
      alpha: { start: 0.9, end: 0 },
      tint: [0xff4400, 0xff8800, 0xffcc00, 0xff2200],
      frequency: 55,
      blendMode: 'ADD',
    });
  }

  // ── Fog / mist near the bottom ────────────────────────────────
  function buildFog(cx, cy) {
    const h = phaserScene.scale.height;
    const w = phaserScene.scale.width;

    const fogGfx = phaserScene.make.graphics({ x: 0, y: 0, add: false });
    fogGfx.fillStyle(0xffffff, 1);
    fogGfx.fillEllipse(60, 20, 120, 40);
    fogGfx.generateTexture('fog-puff', 120, 40);
    fogGfx.destroy();

    phaserScene.add.particles(0, h * 0.78, 'fog-puff', {
      x: { min: 0, max: w },
      y: { min: 0, max: 60 },
      lifespan: { min: 6000, max: 10000 },
      speedX: { min: 8, max: 30 },
      speedY: { min: -5, max: 5 },
      scale: { start: 0.6, end: 1.4 },
      alpha: { start: 0.12, end: 0 },
      tint: [0xcc3300, 0x881100, 0xaa2200],
      frequency: 300,
      blendMode: 'NORMAL',
    });
  }

  // ── Dragon sprite ─────────────────────────────────────────────
  function buildDragon(cx, cy) {
    dragonSprite = phaserScene.add.text(cx, cy - 120, DRAGON_EMOJI, {
      fontSize: '200px',
    }).setOrigin(0.5, 0.5);

    // soft glow behind dragon using a blurred circle
    const glow = phaserScene.add.graphics();
    glow.fillStyle(0xff3300, 0.18);
    glow.fillCircle(cx, cy - 120, 130);
    glow.setBlendMode('ADD');
    dragonSprite.setDepth(2);
    phaserScene.tweens.add({
      targets: glow, alpha: { from: 0.18, to: 0.38 },
      duration: 2200, yoyo: true, repeat: -1, ease: 'Sine.easeInOut',
    });
  }

  // ── Segmented health bar ───────────────────────────────────────
  function buildHealthBar(cx, cy) {
    const barY = cy + 90;

    healthBarBg     = phaserScene.add.graphics();
    healthBarGhost  = phaserScene.add.graphics();
    healthBarFg     = phaserScene.add.graphics();
    healthBarBorder = phaserScene.add.graphics();

    // static backing
    healthBarBg.fillStyle(0x1a0000, 1);
    healthBarBg.fillRoundedRect(cx - BAR_W / 2 - 3, barY - 3, BAR_W + 6, BAR_H + 6, 6);

    drawHealthBar(cx, barY, true);

    healthBarText = phaserScene.add.text(cx, barY + BAR_H + 10,
      `HP: ${dragonCurrentHP} / ${dragonMaxHP}`, {
        fontSize: '17px',
        color: '#daa520',
        fontFamily: 'Cinzel, serif',
        stroke: '#000000',
        strokeThickness: 3,
      }
    ).setOrigin(0.5, 0).setDepth(3);
  }

  function hpColor(ratio) {
    if (ratio > 0.5) return 0x22cc44;
    if (ratio > 0.25) return 0xdd8800;
    return 0xcc1100;
  }

  function drawHealthBar(cx, barY, snap = false) {
    if (!phaserScene) return;
    const currentRatio = Math.max(0, dragonCurrentHP / dragonMaxHP);
    const ghostRatio   = Math.max(0, dragonGhostHP  / dragonMaxHP);

    // ghost bar (trailing yellow)
    healthBarGhost.clear();
    if (ghostRatio > currentRatio) {
      healthBarGhost.fillStyle(0xddaa00, 0.55);
      healthBarGhost.fillRoundedRect(
        cx - BAR_W / 2, barY,
        BAR_W * ghostRatio, BAR_H, 4
      );
    }

    // foreground bar
    healthBarFg.clear();
    healthBarFg.fillStyle(hpColor(currentRatio), 1);
    healthBarFg.fillRoundedRect(
      cx - BAR_W / 2, barY,
      Math.max(0, BAR_W * currentRatio), BAR_H, 4
    );

    // segment dividers
    healthBarBorder.clear();
    healthBarBorder.lineStyle(1, 0x000000, 0.5);
    for (let i = 1; i < BAR_SEGMENTS; i++) {
      const x = cx - BAR_W / 2 + (BAR_W / BAR_SEGMENTS) * i;
      healthBarBorder.lineBetween(x, barY, x, barY + BAR_H);
    }
    // outer border — golden at high HP, red at critical
    const borderColor = currentRatio < 0.25 ? 0xff2200 : 0x886622;
    healthBarBorder.lineStyle(2, borderColor, 1);
    healthBarBorder.strokeRoundedRect(cx - BAR_W / 2, barY, BAR_W, BAR_H, 4);
  }

  // ── Idle bob ──────────────────────────────────────────────────
  function startDragonIdle() {
    phaserScene.tweens.add({
      targets: dragonSprite,
      y: dragonSprite.y + 18,
      duration: 2000,
      yoyo: true,
      repeat: -1,
      ease: 'Sine.easeInOut',
    });
  }

  // ── Boss control helpers (driven by bosscontrol.html) ────────

  function setBackground(themeKey) {
    if (!phaserScene || !bgMain || !bgLava) return;

    // ── Pixel art background ──────────────────────────────────────
    if (PIXEL_BACKGROUNDS[themeKey]) {
      const pb = PIXEL_BACKGROUNDS[themeKey];
      document.body.style.backgroundImage = `url('${pb.src}')`;
      document.body.style.backgroundSize  = pb.scale ?? 'cover';
      bgMain.setVisible(false);
      bgLava.setVisible(false);
      bgRocks?.setVisible(false);
      bgStals?.setVisible(false);
      return;
    }

    // ── Gradient background ───────────────────────────────────────
    document.body.style.backgroundImage = '';
    document.body.style.backgroundSize  = '';
    bgMain.setVisible(true);
    bgLava.setVisible(true);
    bgRocks?.setVisible(true);
    bgStals?.setVisible(true);

    const theme = BACKGROUND_THEMES[themeKey] ?? BACKGROUND_THEMES.cave;
    const w = phaserScene.scale.width;
    const h = phaserScene.scale.height;
    bgMain.clear();
    bgMain.fillGradientStyle(theme.top, theme.top, theme.bot, theme.bot, 1);
    bgMain.fillRect(0, 0, w, h);
    bgLava.clear();
    bgLava.fillGradientStyle(0x000000, 0x000000, theme.lava, theme.lava,
      0, 0, theme.lavaAlpha, theme.lavaAlpha);
    bgLava.fillRect(0, h * 0.72, w, h * 0.28);
  }

  function setDragonGraphic(g) {
    if (!phaserScene || !dragonSprite) return;
    if (g.type === 'emoji') {
      dragonSprite.setText(g.value);
      dragonSprite.setVisible(true);
      if (dragonImageSprite) { dragonImageSprite.destroy(); dragonImageSprite = null; }
    } else {
      // dynamically load image asset at runtime
      const key = 'boss-img-' + Date.now();
      phaserScene.load.image(key, g.value);
      phaserScene.load.once('complete', () => {
        if (dragonImageSprite) dragonImageSprite.destroy();
        dragonImageSprite = phaserScene.add.image(dragonSprite.x, dragonSprite.y, key)
          .setOrigin(0.5, 0.5).setDepth(2).setDisplaySize(200, 200);
        dragonSprite.setVisible(false);
      });
      phaserScene.load.start();
    }
  }

  function showSpeech(text) {
    const bubble = document.getElementById('boss-speech');
    const textEl = document.getElementById('boss-speech-text');
    textEl.textContent = text;
    bubble.classList.remove('hidden');
    // Restart entrance animation on each new message
    bubble.style.animation = 'none';
    void bubble.offsetWidth;
    bubble.style.animation = '';
  }

  function clearSpeech() {
    document.getElementById('boss-speech').classList.add('hidden');
  }

  function triggerAbilityFlash(name) {
    const overlay = document.getElementById('ability-flash');
    const nameEl  = overlay.querySelector('.ability-flash-name');
    nameEl.textContent = '⚡ ' + name;
    overlay.classList.remove('hidden');
    // Restart animations
    overlay.style.animation = 'none';
    nameEl.style.animation  = 'none';
    void overlay.offsetWidth;
    overlay.style.animation = '';
    nameEl.style.animation  = '';
    setTimeout(() => overlay.classList.add('hidden'), 2500);
  }

  // ── Firebase listener ─────────────────────────────────────────
  function listenToDragonState() {
    // Main encounter data (HP, players, defeat)
    onValue(ref(_db, `${DB_ROOT}/${ENCOUNTER_ID}`), snapshot => {
      if (!snapshot.exists()) { console.warn('Encounter not found'); return; }

      const encounter = snapshot.val();
      const newHP     = encounter.dragonHP    ?? 0;
      const newMaxHP  = encounter.dragonMaxHP ?? 500;
      const players   = encounter.activePlayers
        ? Object.keys(encounter.activePlayers).length : 0;

      document.getElementById('dragonHP').textContent    = Math.max(0, newHP);
      document.getElementById('dragonMaxHP').textContent = newMaxHP;
      document.getElementById('playerCount').textContent = players;

      if (newHP !== dragonCurrentHP) {
        const damage = dragonCurrentHP - newHP;
        animationQueue.push({ type: 'damage', fromHP: dragonCurrentHP, toHP: newHP, maxHP: newMaxHP, damage });
        dragonCurrentHP = newHP;
        dragonMaxHP     = newMaxHP;
        updateVignette(newHP, newMaxHP);
      }

      if (newHP <= 0 && encounter.status === 'defeated') showVictoryScreen();
    });

    // Boss name
    onValue(ref(_db, `${DB_ROOT}/${ENCOUNTER_ID}/name`), snap => {
      const el = document.getElementById('boss-name-display');
      if (snap.exists() && snap.val()) {
        el.textContent = snap.val();
        el.classList.remove('hidden');
      } else {
        el.classList.add('hidden');
      }
    });

    // Boss graphic
    onValue(ref(_db, `${DB_ROOT}/${ENCOUNTER_ID}/graphic`), snap => {
      if (snap.exists()) setDragonGraphic(snap.val());
    });

    // Background / scene
    onValue(ref(_db, `${DB_ROOT}/${ENCOUNTER_ID}/background`), snap => {
      if (snap.exists()) setBackground(snap.val());
    });

    // Speech bubble
    onValue(ref(_db, `${DB_ROOT}/${ENCOUNTER_ID}/speech`), snap => {
      if (snap.exists() && snap.val()?.text) showSpeech(snap.val().text);
      else clearSpeech();
    });

    // Ability activation — deduplicate by timestamp to avoid replay on reconnect
    onValue(ref(_db, `${DB_ROOT}/${ENCOUNTER_ID}/ability`), snap => {
      if (!snap.exists()) return;
      const { name, timestamp } = snap.val();
      if (timestamp && timestamp !== lastAbilityTimestamp) {
        lastAbilityTimestamp = timestamp;
        triggerAbilityFlash(name);
      }
    });
  }

  // ─────────────────────────────────────────────────────────────
  // UPDATE
  // ─────────────────────────────────────────────────────────────
  function update() {
    // drift ghost bar toward current HP
    if (dragonGhostHP > dragonCurrentHP) {
      dragonGhostHP = Math.max(dragonCurrentHP, dragonGhostHP - 0.4);
      const cx  = phaserScene.cameras.main.centerX;
      const cy  = phaserScene.cameras.main.centerY;
      const barY = cy - 80 + 90;
      drawHealthBar(cx, barY);
    }

    if (!isAnimating && animationQueue.length > 0) {
      playAnimation(animationQueue.shift());
    }
  }

  // ─────────────────────────────────────────────────────────────
  // ANIMATIONS
  // ─────────────────────────────────────────────────────────────
  async function playAnimation(anim) {
    isAnimating = true;
    if (anim.type === 'damage') await animateDamage(anim);
    isAnimating = false;
  }

  async function animateDamage({ fromHP, toHP, maxHP, damage }) {
    if (!phaserScene) return;
    const cx    = phaserScene.cameras.main.centerX;
    const cy    = phaserScene.cameras.main.centerY;
    const barY  = cy - 80 + 90;

    // screen shake
    phaserScene.cameras.main.shake(180, 0.009);

    // dragon flash red
    phaserScene.tweens.add({
      targets: dragonSprite,
      alpha: { from: 1, to: 0.25 },
      duration: 80,
      yoyo: true,
      repeat: 2,
    });

    // floating damage number
    if (damage > 0) spawnDamageNumber(cx, cy - 120, damage, maxHP);

    // animate HP bar
    const duration = 480;
    const start    = Date.now();
    const startHP  = fromHP;
    return new Promise(resolve => {
      const tick = () => {
        const progress = Math.min((Date.now() - start) / duration, 1);
        const ease     = 1 - Math.pow(1 - progress, 3);
        const current  = startHP + (toHP - startHP) * ease;
        // update display HP (ghost handled in update loop)
        const displayHP = Math.ceil(current);
        healthBarText?.setText(`HP: ${Math.max(0, displayHP)} / ${maxHP}`);
        // temporarily override dragonCurrentHP for drawing
        const savedHP = dragonCurrentHP;
        dragonCurrentHP = current;
        drawHealthBar(cx, barY);
        dragonCurrentHP = savedHP;
        if (progress < 1) requestAnimationFrame(tick);
        else {
          dragonCurrentHP = toHP;
          drawHealthBar(cx, barY);
          healthBarText?.setText(`HP: ${Math.max(0, toHP)} / ${maxHP}`);
          resolve();
        }
      };
      tick();
    });
  }

  function spawnDamageNumber(cx, baseY, damage, maxHP) {
    const ratio    = damage / maxHP;
    const big      = ratio > 0.1;
    const fontSize = big ? '52px' : '34px';
    const color    = big ? '#ff4400' : '#ffcc00';
    const spread   = (Math.random() - 0.5) * 140;

    const txt = phaserScene.add.text(cx + spread, baseY, `-${damage}`, {
      fontSize,
      color,
      fontFamily: 'Cinzel, serif',
      stroke: '#000000',
      strokeThickness: 4,
    }).setOrigin(0.5, 1).setDepth(10);

    phaserScene.tweens.add({
      targets: txt,
      y: baseY - (big ? 120 : 80),
      alpha: { from: 1, to: 0 },
      scaleX: big ? { from: 1.3, to: 1 } : 1,
      scaleY: big ? { from: 1.3, to: 1 } : 1,
      duration: big ? 1300 : 900,
      ease: 'Power2',
      onComplete: () => txt.destroy(),
    });
  }

  // ── Vignette CSS class swap ───────────────────────────────────
  function updateVignette(hp, maxHP) {
    const v     = document.getElementById('vignette');
    const ratio = hp / maxHP;
    v.classList.remove('low-hp', 'critical-hp');
    if (ratio <= 0.20)      v.classList.add('critical-hp');
    else if (ratio <= 0.40) v.classList.add('low-hp');
  }

  // ── Victory ───────────────────────────────────────────────────
  function showVictoryScreen() {
    // particle burst from dragon position before overlay
    if (phaserScene) {
      const cx = phaserScene.cameras.main.centerX;
      const cy = phaserScene.cameras.main.centerY - 120;
      phaserScene.add.particles(cx, cy, 'ember', {
        lifespan: 1200,
        speed: { min: 80, max: 320 },
        scale: { start: 1.2, end: 0 },
        alpha: { start: 1, end: 0 },
        tint: [0xffcc00, 0xff4400, 0xffffff, 0xff0000],
        quantity: 80,
        blendMode: 'ADD',
        emitting: false,
      }).explode(80, cx, cy);
    }

    setTimeout(() => {
      document.getElementById('victoryScreen').classList.add('active');
      setTimeout(() => { window.location.href = 'coinflip2.html'; }, 3500);
    }, 400);
  }

  // ── Resize ────────────────────────────────────────────────────
  window.addEventListener('resize', () => {
    game.scale.resize(window.innerWidth, window.innerHeight);
  });
</script>
