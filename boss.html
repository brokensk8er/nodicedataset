<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <title>No Dice — Dragon Lair (Backdrop)</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@4.0.0/dist/phaser.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: Arial, sans-serif;
      overflow: hidden;
      background: #1a1a2e;
    }
    #gameContainer {
      width: 100vw;
      height: 100vh;
    }
    .ui-overlay {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #daa520;
      font-family: 'Cinzel', serif;
      font-size: 18px;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px 15px;
      border-radius: 4px;
      max-width: 300px;
    }
    .status-text {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: #daa520;
      font-family: 'Cinzel', serif;
      font-size: 20px;
      text-align: center;
      background: rgba(0, 0, 0, 0.8);
      padding: 15px 25px;
      border-radius: 4px;
      display: none;
      z-index: 100;
    }
    .victory-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #daa520;
      font-family: 'Cinzel', serif;
      z-index: 200;
    }
    .victory-screen.active {
      display: flex;
    }
    .victory-text {
      font-size: 48px;
      margin: 20px 0;
      text-align: center;
    }
    .victory-emoji {
      font-size: 120px;
      margin: 20px 0;
    }
  </style>
</head>
<body>

<div id="gameContainer"></div>

<div class="ui-overlay" id="uiOverlay">
  <div>Players: <span id="playerCount">0</span></div>
  <div>Dragon HP: <span id="dragonHP">100</span> / <span id="dragonMaxHP">100</span></div>
</div>

<div class="status-text" id="statusText"></div>

<div class="victory-screen" id="victoryScreen">
  <div class="victory-emoji">💀</div>
  <div class="victory-text">The Dragon is Defeated!</div>
  <div class="victory-text" style="font-size: 24px;">Redirecting...</div>
</div>

<script type="module">
  import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getDatabase, ref, onValue, off } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

  // ============================================================
  // FIREBASE CONFIG
  // ============================================================
  const FIREBASE_CONFIG = {
    apiKey:            "AIzaSyAXcvi644izGZhK8nPGlkfV4vAc3ZWPH8w",
    authDomain:        "nodicetools.firebaseapp.com",
    databaseURL:       "https://nodicetools-default-rtdb.firebaseio.com",
    projectId:         "nodicetools",
    storageBucket:     "nodicetools.firebasestorage.app",
    messagingSenderId: "387258889697",
    appId:             "1:387258889697:web:5467488ab109ea67b74ea0",
  };

  const _appName = 'ndt-boss-display';
  const _app = getApps().find(a => a.name === _appName) ?? initializeApp(FIREBASE_CONFIG, _appName);
  const _db = getDatabase(_app);

  // ============================================================
  // PHASER CONFIG
  // ============================================================
  const ENCOUNTER_ID = 'dragon';
  const DB_ROOT      = 'nodice/encounters';
  const DRAGON_EMOJI = '🐉';

  const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    parent: 'gameContainer',
    scene: {
      create: create,
      update: update,
    },
    backgroundColor: '#1a1a2e',
  };

  const game = new Phaser.Game(config);

  // ============================================================
  // SCENE STATE
  // ============================================================
  let phaserScene;   // stored in create(), used everywhere
  let dragonSprite;
  let healthBarBg;
  let healthBarFg;
  let healthBarText;
  let dragonMaxHP     = 500;
  let dragonCurrentHP = 500;
  let animationQueue  = [];
  let isAnimating     = false;

  function create() {
    phaserScene = this;                         // store reference
    const cx = this.cameras.main.centerX;
    const cy = this.cameras.main.centerY - 80;

    dragonSprite = this.add.text(cx, cy - 100, DRAGON_EMOJI, { fontSize: '180px' })
                           .setOrigin(0.5, 0.5);

    // Red background bar
    healthBarBg = this.add.graphics();
    healthBarBg.fillStyle(0xcc0000, 1);
    healthBarBg.fillRect(cx - 150, cy + 50, 300, 40);

    // Green foreground bar
    healthBarFg = this.add.graphics();
    drawHealthBar(cx, cy);

    healthBarText = this.add.text(cx, cy + 100, `HP: ${dragonCurrentHP} / ${dragonMaxHP}`, {
      fontSize: '18px', color: '#daa520',
    }).setOrigin(0.5, 0);

    listenToDragonState();
  }

  function update() {
    if (!isAnimating && animationQueue.length > 0) {
      const anim = animationQueue.shift();
      playAnimation(anim);
    }
  }

  function drawHealthBar(cx, cy) {
    if (!phaserScene) return;
    const barWidth = Math.max(0, (dragonCurrentHP / dragonMaxHP) * 300);
    healthBarFg.clear();
    healthBarFg.fillStyle(0x00cc00, 1);
    healthBarFg.fillRect(cx - 150, cy + 50, barWidth, 40);
  }

  function listenToDragonState() {
    onValue(ref(_db, `${DB_ROOT}/${ENCOUNTER_ID}`), snapshot => {
      if (!snapshot.exists()) { console.warn('Encounter not found at', `${DB_ROOT}/${ENCOUNTER_ID}`); return; }

      const encounter  = snapshot.val();
      const newHP      = encounter.dragonHP    ?? 0;
      const newMaxHP   = encounter.dragonMaxHP ?? 500;
      const players    = encounter.activePlayers ? Object.keys(encounter.activePlayers).length : 0;

      document.getElementById('dragonHP').textContent    = Math.max(0, newHP);
      document.getElementById('dragonMaxHP').textContent = newMaxHP;
      document.getElementById('playerCount').textContent = players;

      if (newHP !== dragonCurrentHP) {
        animationQueue.push({ type: 'damage', fromHP: dragonCurrentHP, toHP: newHP, maxHP: newMaxHP });
        dragonCurrentHP = newHP;
        dragonMaxHP     = newMaxHP;
      }

      if (newHP <= 0 && encounter.status === 'defeated') showVictoryScreen();
    });
  }

  async function playAnimation(anim) {
    isAnimating = true;
    if (anim.type === 'damage') await animateDamage(anim.fromHP, anim.toHP, anim.maxHP);
    if (anim.type === 'attack') await animateAttackCoin(anim.rollResult);
    isAnimating = false;
  }

  async function animateDamage(fromHP, toHP, maxHP) {
    if (!phaserScene) return;
    const cx       = phaserScene.cameras.main.centerX;
    const cy       = phaserScene.cameras.main.centerY - 80;
    const duration = 500;
    const start    = Date.now();

    return new Promise(resolve => {
      const tick = () => {
        const progress    = Math.min((Date.now() - start) / duration, 1);
        const ease        = 1 - Math.pow(1 - progress, 3);
        dragonCurrentHP   = fromHP + (toHP - fromHP) * ease;
        drawHealthBar(cx, cy);
        healthBarText.setText(`HP: ${Math.ceil(dragonCurrentHP)} / ${maxHP}`);
        if (progress < 1) requestAnimationFrame(tick);
        else { dragonCurrentHP = toHP; drawHealthBar(cx, cy); resolve(); }
      };
      tick();
    });
  }

  async function animateAttackCoin(rollResult) {
    if (!phaserScene) return;
    const cx    = phaserScene.cameras.main.centerX;
    const cy    = phaserScene.cameras.main.centerY + 60;
    const emoji = rollResult === 'go_time' ? '✓' : '✗';
    const color = rollResult === 'go_time' ? '#00cc00' : '#cc0000';

    return new Promise(resolve => {
      const txt = phaserScene.add.text(cx, cy - 60, emoji, { fontSize: '60px', color }).setOrigin(0.5, 0.5);
      phaserScene.tweens.add({
        targets: txt, y: cy - 160, alpha: 0, duration: 1000,
        ease: 'Power2',
        onComplete: () => { txt.destroy(); resolve(); },
      });
    });
  }

  function showVictoryScreen() {
    document.getElementById('victoryScreen').classList.add('active');
    setTimeout(() => { window.location.href = 'coinflip2.html'; }, 3000);
  }

  // ============================================================
  // HANDLE WINDOW RESIZE
  // ============================================================
  window.addEventListener('resize', () => {
    game.scale.resize(window.innerWidth, window.innerHeight);
  });
</script>

</body>
</html>
